<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Space Attack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  #controls { display: none; }
  body.mobile {
    flex-direction: column;
    justify-content: flex-start;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body.mobile canvas {
    touch-action: none;
  }
  body.mobile #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    flex: 1;
    padding: 12px 24px;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    border-top: 2px solid #333;
    touch-action: none;
    max-height: 45vh;
    min-height: 180px;
  }
  /* D-Pad */
  #dpad {
    display: grid;
    grid-template-areas:
      ".    up    ."
      "left center right"
      ".    down  .";
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px);
    gap: 4px;
  }
  .dpad-up    { grid-area: up; }
  .dpad-left  { grid-area: left; }
  .dpad-center{ grid-area: center; }
  .dpad-right { grid-area: right; }
  .dpad-down  { grid-area: down; }
  .dpad-btn {
    width: 64px;
    height: 64px;
    border: 2px solid #555;
    background: #222;
    color: #999;
    font-size: 26px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  .dpad-btn.pressed {
    background: #555;
    color: #fff;
    border-color: #999;
    box-shadow: 0 0 12px rgba(255,255,255,0.2);
  }
  .dpad-center-dot {
    width: 64px;
    height: 64px;
    background: #1a1a1a;
    border-radius: 10px;
    border: 2px solid #333;
  }
  /* Action buttons */
  #action-btns {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
  }
  .action-btn {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 3px solid;
    font-family: monospace;
    font-weight: bold;
    font-size: 15px;
    line-height: 1.2;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    transition: box-shadow 0.1s;
  }
  #btn-fire {
    background: radial-gradient(circle at 35% 35%, #662222, #331111);
    border-color: #ff4444;
    color: #ff6666;
  }
  #btn-fire.pressed {
    background: radial-gradient(circle at 35% 35%, #ff4444, #aa2222);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,68,68,0.6);
  }
  #btn-rail {
    background: radial-gradient(circle at 35% 35%, #1a3344, #0d1a22);
    border-color: #00ccff;
    color: #00ccff;
  }
  #btn-rail.pressed {
    background: radial-gradient(circle at 35% 35%, #00ccff, #006688);
    color: #fff;
    box-shadow: 0 0 20px rgba(0,204,255,0.6);
  }
  #btn-rail .ammo {
    display: block;
    font-size: 20px;
  }
  #btn-esc {
    width: 44px;
    height: 44px;
    border-radius: 8px;
    border: 1px solid #555;
    background: #222;
    color: #888;
    font-family: monospace;
    font-size: 11px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    position: absolute;
    top: -8px;
    right: -52px;
  }
  #btn-esc.pressed {
    background: #555;
    color: #fff;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="controls">
  <div id="action-btns">
    <button class="action-btn" id="btn-fire" data-key="Space">FIRE</button>
    <button class="action-btn" id="btn-rail" data-key="RailFire">RAIL<span class="ammo" id="rail-count"></span></button>
    <button id="btn-esc" data-key="Escape">ESC</button>
  </div>
  <div id="dpad">
    <button class="dpad-btn dpad-up" data-key="ArrowUp">&#9650;</button>
    <button class="dpad-btn dpad-left" data-key="ArrowLeft">&#9664;</button>
    <div class="dpad-center-dot"></div>
    <button class="dpad-btn dpad-right" data-key="ArrowRight">&#9654;</button>
    <button class="dpad-btn dpad-down" data-key="ArrowDown">&#9660;</button>
  </div>
</div>
<script>
"use strict";

// ── Canvas setup ─────────────────────────────────────────────────────
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = 780, H = 580;
canvas.width = W;
canvas.height = H;

let touchActive = false;

function fitCanvas() {
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  if (touchActive) {
    const availH = vh * 0.55;
    const scaleX = vw / W;
    const scaleY = availH / H;
    const scale = Math.min(scaleX, scaleY);
    canvas.style.width = (W * scale) + "px";
    canvas.style.height = (H * scale) + "px";
  } else {
    const scaleX = vw / W;
    const scaleY = vh / H;
    const scale = Math.min(scaleX, scaleY);
    canvas.style.width = (W * scale) + "px";
    canvas.style.height = (H * scale) + "px";
  }
}
fitCanvas();
window.addEventListener("resize", fitCanvas);

// ── Sound (Web Audio API) ────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playSound(type) {
  // Resume context on first user interaction
  if (audioCtx.state === "suspended") audioCtx.resume();

  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);

  switch (type) {
    case "shoot":
      osc.type = "square";
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(440, t + 0.1);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.start(t);
      osc.stop(t + 0.1);
      break;

    case "hit":
      osc.type = "square";
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.15);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t);
      osc.stop(t + 0.15);
      break;

    case "explode": {
      // Noise burst for explosion
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.3);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.start(t);
      osc.stop(t + 0.3);
      // Second voice for crunch
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = "square";
      osc2.frequency.setValueAtTime(200, t);
      osc2.frequency.exponentialRampToValueAtTime(20, t + 0.25);
      gain2.gain.setValueAtTime(0.1, t);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      osc2.start(t);
      osc2.stop(t + 0.25);
      break;
    }

    case "playerDeath": {
      // Descending sweep
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.8);
      gain.gain.setValueAtTime(0.2, t);
      gain.gain.linearRampToValueAtTime(0.15, t + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc.start(t);
      osc.stop(t + 0.8);
      // Second voice
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = "square";
      osc2.frequency.setValueAtTime(400, t);
      osc2.frequency.exponentialRampToValueAtTime(20, t + 0.7);
      gain2.gain.setValueAtTime(0.12, t);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      osc2.start(t);
      osc2.stop(t + 0.7);
      break;
    }

    case "win": {
      // Rising arpeggio
      osc.type = "square";
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.setValueAtTime(0.12, t + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      osc.frequency.setValueAtTime(523, t);        // C5
      osc.frequency.setValueAtTime(659, t + 0.12);  // E5
      osc.frequency.setValueAtTime(784, t + 0.24);  // G5
      osc.frequency.setValueAtTime(1047, t + 0.36); // C6
      osc.start(t);
      osc.stop(t + 0.7);
      break;
    }

    case "menuSelect":
      osc.type = "square";
      osc.frequency.setValueAtTime(660, t);
      gain.gain.setValueAtTime(0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      osc.start(t);
      osc.stop(t + 0.05);
      break;

    case "menuConfirm":
      osc.type = "square";
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.setValueAtTime(1100, t + 0.08);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t);
      osc.stop(t + 0.15);
      break;

    case "powerup": {
      // Rising sparkly tone
      osc.type = "sine";
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(2400, t + 0.3);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t);
      osc.stop(t + 0.35);
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = "triangle";
      osc2.frequency.setValueAtTime(900, t + 0.05);
      osc2.frequency.exponentialRampToValueAtTime(3200, t + 0.3);
      gain2.gain.setValueAtTime(0.08, t + 0.05);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc2.start(t + 0.05);
      osc2.stop(t + 0.35);
      break;
    }

    case "railgun": {
      // Heavy bass zap with sustained rumble
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(80, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.5);
      gain.gain.setValueAtTime(0.25, t);
      gain.gain.linearRampToValueAtTime(0.15, t + 0.2);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      osc.start(t);
      osc.stop(t + 0.5);
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.connect(gain2);
      gain2.connect(audioCtx.destination);
      osc2.type = "square";
      osc2.frequency.setValueAtTime(200, t);
      osc2.frequency.exponentialRampToValueAtTime(40, t + 0.15);
      gain2.gain.setValueAtTime(0.2, t);
      gain2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc2.start(t);
      osc2.stop(t + 0.15);
      break;
    }
  }
}

// ── Colors ───────────────────────────────────────────────────────────
const COL = {
  player:     "#00ff00",
  fighterA:   "#ff4444",
  fighterB:   "#ffff00",
  bomber:     "#ff44ff",
  bunker:     "#00cccc",
  projPlayer: "#ffff00",
  projAlien:  "#ff4444",
  bomb:       "#ff44ff",
  border:     "#888888",
  status:     "#ffffff",
  msg:        "#ffff00",
  hpMid:      "#ffff00",
  hpLow:      "#ffffff",
  explosion:  "#ff2200",
  logo:       "#00cccc",
  menuSel:    "#00ff00",
  menu:       "#cccccc",
  bg:         "#000000",
};

// ── Game constants ───────────────────────────────────────────────────
const FPS = 30;
const FIELD_X = 15, FIELD_Y = 30;
const FIELD_W = W - 30, FIELD_H = H - 45;

const DIFFICULTIES = {
  easy:      { label: "EASY",      shootChance: 0.04,  moveInterval: 6,  desc: "Relaxed pace, slow aliens" },
  medium:    { label: "MEDIUM",    shootChance: 0.08,  moveInterval: 4,  desc: "Balanced challenge" },
  difficult: { label: "DIFFICULT", shootChance: 0.14,  moveInterval: 2,  desc: "Fast and aggressive" },
  insane:    { label: "INSANE",    shootChance: 0.26,  moveInterval: 1,  desc: "Pure chaos" },
};
const DIFF_ORDER = ["easy", "medium", "difficult", "insane"];

const PROJ_SPEED = 4;
const BOMB_SPEED = 2.5;
const PLAYER_SPEED = 5;
const PLAYER_SHOOT_COOLDOWN = 10;
const FIGHTER_HP = 2;
const BOMBER_HP = 3;
const BOMB_BLAST_RADIUS = 30;
const LASER_BLAST_RADIUS = 6;

// ── Sprite definitions (drawn procedurally) ──────────────────────────

// ── Input ────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Space"].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener("keyup", e => { keys[e.code] = false; });

// ── Mobile touch controls ───────────────────────────────────────────
function setupMobileControls() {
  if (!('ontouchstart' in window || navigator.maxTouchPoints > 0)) return;

  touchActive = true;
  document.body.classList.add('mobile');
  fitCanvas();

  document.addEventListener('contextmenu', e => e.preventDefault());

  const allBtns = document.querySelectorAll('.dpad-btn, .action-btn, #btn-esc');
  allBtns.forEach(btn => {
    const key = btn.dataset.key;
    if (!key) return;

    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      keys[key] = true;
      btn.classList.add('pressed');
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }, { passive: false });

    btn.addEventListener('touchend', e => {
      e.preventDefault();
      keys[key] = false;
      btn.classList.remove('pressed');
    }, { passive: false });

    btn.addEventListener('touchcancel', e => {
      keys[key] = false;
      btn.classList.remove('pressed');
    });
  });

  // Prevent scroll/zoom on the controls area
  const ctrl = document.getElementById('controls');
  ctrl.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  // Prevent accidental canvas touches from scrolling
  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }, { passive: false });
}

// ── Utility ──────────────────────────────────────────────────────────
function drawText(text, x, y, color, size, align) {
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align || "left";
  ctx.textBaseline = "middle";
  ctx.fillText(text, x, y);
}

function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ── Entity classes ───────────────────────────────────────────────────

class Player {
  constructor() {
    this.w = 30;
    this.h = 20;
    this.x = FIELD_X + (FIELD_W - this.w) / 2;
    this.y = FIELD_Y + FIELD_H - this.h - 5;
    this.cooldown = 0;
    this.alive = true;
  }

  update() {
    if (keys["ArrowLeft"] || keys["KeyA"])  this.x -= PLAYER_SPEED;
    if (keys["ArrowRight"] || keys["KeyD"]) this.x += PLAYER_SPEED;
    this.x = Math.max(FIELD_X, Math.min(FIELD_X + FIELD_W - this.w, this.x));
    if (this.cooldown > 0) this.cooldown--;
  }

  shoot() {
    if (this.cooldown > 0) return null;
    this.cooldown = PLAYER_SHOOT_COOLDOWN;
    return new Projectile(this.x + this.w / 2 - 1, this.y - 4, -1);
  }

  draw() {
    ctx.fillStyle = COL.player;
    // ship body
    ctx.beginPath();
    ctx.moveTo(this.x + this.w / 2, this.y);
    ctx.lineTo(this.x + this.w, this.y + this.h);
    ctx.lineTo(this.x, this.y + this.h);
    ctx.closePath();
    ctx.fill();
    // cockpit
    ctx.fillStyle = "#003300";
    ctx.fillRect(this.x + this.w / 2 - 3, this.y + 8, 6, 6);
  }
}

class Alien {
  constructor(x, y, hp, shootChance, isBomber, variant) {
    this.x = x;
    this.y = y;
    this.w = 28;
    this.h = 22;
    this.hp = hp;
    this.maxHp = hp;
    this.shootChance = shootChance;
    this.isBomber = isBomber;
    this.variant = variant || 0;
    this.alive = true;
    this.points = isBomber ? 150 : 100;
  }

  get color() {
    const ratio = this.hp / this.maxHp;
    if (ratio > 0.6) {
      if (this.isBomber) return COL.bomber;
      return this.variant === 0 ? COL.fighterA : COL.fighterB;
    }
    if (ratio > 0.3) return COL.hpMid;
    return COL.hpLow;
  }

  takeHit() {
    this.hp--;
    if (this.hp <= 0) { this.alive = false; return true; }
    return false;
  }

  tryShoot() {
    if (Math.random() < this.shootChance) {
      const px = this.x + this.w / 2;
      const py = this.y + this.h;
      if (this.isBomber) return new Bomb(px, py);
      return new Projectile(px, py, 1);
    }
    return null;
  }

  draw() {
    const c = this.color;
    ctx.fillStyle = c;
    if (this.isBomber) {
      // bomber: wider square with details
      ctx.fillRect(this.x + 2, this.y + 2, this.w - 4, this.h - 4);
      ctx.fillStyle = "#000";
      ctx.fillRect(this.x + 7, this.y + 6, 5, 5);
      ctx.fillRect(this.x + this.w - 12, this.y + 6, 5, 5);
      ctx.fillStyle = c;
      ctx.fillRect(this.x, this.y + this.h - 6, this.w, 3);
    } else if (this.variant === 0) {
      // fighter A: triangle-ish
      ctx.beginPath();
      ctx.moveTo(this.x + this.w / 2, this.y);
      ctx.lineTo(this.x + this.w, this.y + this.h);
      ctx.lineTo(this.x, this.y + this.h);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#000";
      ctx.fillRect(this.x + 9, this.y + 10, 4, 4);
      ctx.fillRect(this.x + 15, this.y + 10, 4, 4);
    } else {
      // fighter B: diamond-ish
      ctx.beginPath();
      ctx.moveTo(this.x + this.w / 2, this.y);
      ctx.lineTo(this.x + this.w, this.y + this.h / 2);
      ctx.lineTo(this.x + this.w / 2, this.y + this.h);
      ctx.lineTo(this.x, this.y + this.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#000";
      ctx.fillRect(this.x + 10, this.y + 8, 3, 3);
      ctx.fillRect(this.x + 15, this.y + 8, 3, 3);
    }
  }
}

class Projectile {
  constructor(x, y, dir) {
    this.x = x;
    this.y = y;
    this.w = 3;
    this.h = 8;
    this.dir = dir;
    this.alive = true;
    this.isBomb = false;
  }

  update() {
    this.y += this.dir * PROJ_SPEED;
    if (this.y < FIELD_Y || this.y > FIELD_Y + FIELD_H) this.alive = false;
  }

  draw() {
    ctx.fillStyle = this.dir === -1 ? COL.projPlayer : COL.projAlien;
    ctx.fillRect(this.x, this.y, this.w, this.h);
  }
}

class Bomb extends Projectile {
  constructor(x, y) {
    super(x, y, 1);
    this.w = 6;
    this.h = 6;
    this.isBomb = true;
  }

  update() {
    this.y += BOMB_SPEED;
    if (this.y > FIELD_Y + FIELD_H) this.alive = false;
  }

  draw() {
    ctx.fillStyle = COL.bomb;
    ctx.beginPath();
    ctx.arc(this.x + 3, this.y + 3, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

class Bunker {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.w = 48;
    this.h = 30;
    // pixel grid (6x5 blocks of 8x6 each)
    this.cols = 8;
    this.rows = 5;
    this.blockW = this.w / this.cols;
    this.blockH = this.h / this.rows;
    this.grid = [];
    for (let r = 0; r < this.rows; r++) {
      this.grid[r] = [];
      for (let c = 0; c < this.cols; c++) {
        // archway in bottom center
        if (r >= 3 && (c === 3 || c === 4)) {
          this.grid[r][c] = false;
        } else {
          this.grid[r][c] = true;
        }
      }
    }
  }

  get isDestroyed() {
    for (let r = 0; r < this.rows; r++)
      for (let c = 0; c < this.cols; c++)
        if (this.grid[r][c]) return false;
    return true;
  }

  damageAt(gx, gy, radius) {
    let hit = false;
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (!this.grid[r][c]) continue;
        const bx = this.x + c * this.blockW + this.blockW / 2;
        const by = this.y + r * this.blockH + this.blockH / 2;
        const dx = gx - bx, dy = gy - by;
        if (Math.sqrt(dx * dx + dy * dy) < radius) {
          this.grid[r][c] = false;
          hit = true;
        }
      }
    }
    return hit;
  }

  draw() {
    ctx.fillStyle = COL.bunker;
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (this.grid[r][c]) {
          ctx.fillRect(
            this.x + c * this.blockW,
            this.y + r * this.blockH,
            this.blockW - 1,
            this.blockH - 1
          );
        }
      }
    }
  }
}

class Explosion {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.frame = 0;
    this.maxFrames = 12;
    this.alive = true;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxFrames) this.alive = false;
  }

  draw() {
    const progress = this.frame / this.maxFrames;
    const radius = 8 + progress * 10;
    const alpha = 1 - progress;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = COL.explosion;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ffaa00";
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class PowerUp {
  constructor() {
    this.w = 20;
    this.h = 20;
    this.x = FIELD_X + 50 + Math.random() * (FIELD_W - 100);
    // Middle third of field vertically
    const thirdH = FIELD_H / 3;
    this.y = FIELD_Y + thirdH + Math.random() * thirdH;
    this.alive = true;
    this.frame = 0;
    this.maxLife = 300;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxLife) this.alive = false;
  }

  draw() {
    const pulse = 0.7 + 0.3 * Math.sin(this.frame * 0.15);
    const hue = (this.frame * 4) % 360;
    const size = this.w * pulse;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;

    // Outer glow
    ctx.globalAlpha = 0.3 * pulse;
    ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
    ctx.beginPath();
    ctx.arc(cx, cy, size * 0.8, 0, Math.PI * 2);
    ctx.fill();

    // Diamond shape
    ctx.globalAlpha = 1;
    ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
    const hs = size * 0.5;
    ctx.beginPath();
    ctx.moveTo(cx, cy - hs);
    ctx.lineTo(cx + hs, cy);
    ctx.moveTo(cx, cy - hs);
    ctx.lineTo(cx - hs, cy);
    ctx.lineTo(cx, cy + hs);
    ctx.lineTo(cx + hs, cy);
    ctx.closePath();
    ctx.fill();

    // "R" label
    ctx.fillStyle = "#fff";
    ctx.font = "bold 11px monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText("R", cx, cy);
    ctx.globalAlpha = 1;
  }
}

class RailBeam {
  constructor(x) {
    this.x = x;
    this.frame = 0;
    this.maxFrames = 21;
    this.alive = true;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxFrames) this.alive = false;
  }

  draw() {
    const cx = this.x;
    const top = FIELD_Y;
    const bot = FIELD_Y + FIELD_H;
    const f = this.frame;

    let width, alpha;
    if (f <= 5) {
      // Thin line appears
      width = 2;
      alpha = 0.7 + 0.3 * (f / 5);
    } else if (f <= 12) {
      // Expand to thick beam
      const t = (f - 5) / 7;
      width = 2 + 18 * t;
      alpha = 1;
    } else {
      // Shrink and fade
      const t = (f - 12) / 8;
      width = 20 * (1 - t);
      alpha = 1 - t;
    }

    if (width < 0.5 || alpha < 0.01) return;

    // Outer layer (blue)
    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = "#0044ff";
    ctx.fillRect(cx - width / 2, top, width, bot - top);

    // Middle layer (cyan)
    ctx.globalAlpha = alpha * 0.6;
    ctx.fillStyle = "#00ccff";
    const midW = width * 0.6;
    ctx.fillRect(cx - midW / 2, top, midW, bot - top);

    // Core (white)
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#ffffff";
    const coreW = Math.max(1, width * 0.25);
    ctx.fillRect(cx - coreW / 2, top, coreW, bot - top);

    ctx.globalAlpha = 1;
  }
}

// ── Alien grid builder ───────────────────────────────────────────────
function makeAlienGrid(shootChance) {
  const cols = 8, rows = 5;
  const alienW = 28, hGap = 14, vGap = 6;
  const gridW = cols * alienW + (cols - 1) * hGap;
  const startX = FIELD_X + (FIELD_W - gridW) / 2;
  const startY = FIELD_Y + 15;
  const aliens = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const ax = startX + c * (alienW + hGap);
      const ay = startY + r * (22 + vGap);
      if (r < 2) {
        aliens.push(new Alien(ax, ay, BOMBER_HP, shootChance * 0.5, true, 0));
      } else {
        aliens.push(new Alien(ax, ay, FIGHTER_HP, shootChance, false, c % 2));
      }
    }
  }
  return aliens;
}

// ── Star field background ────────────────────────────────────────────
const stars = [];
for (let i = 0; i < 100; i++) {
  stars.push({
    x: Math.random() * W,
    y: Math.random() * H,
    size: Math.random() * 1.5 + 0.5,
    speed: Math.random() * 0.3 + 0.1,
    brightness: Math.random() * 0.5 + 0.3,
  });
}

function drawStars() {
  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

// ════════════════════════════════════════════════════════════════════════
//  Game states
// ════════════════════════════════════════════════════════════════════════

let gameState = "title"; // title | playing | won | lost
let selectedDiff = 1;
let difficulty = "medium";

let player, aliens, bunkers, projectiles, explosions;
let alienDir, alienMoveTimer, baseMoveInterval, totalAliens, score;
let railAmmo, powerUp, powerUpTimer, powerUpInterval;

function startGame(diffKey) {
  difficulty = diffKey;
  const diff = DIFFICULTIES[diffKey];
  baseMoveInterval = diff.moveInterval;
  player = new Player();
  aliens = makeAlienGrid(diff.shootChance);
  const bunkY = FIELD_Y + FIELD_H - 60;
  const spacing = FIELD_W / 5;
  bunkers = [
    new Bunker(FIELD_X + spacing * 1 - 24, bunkY),
    new Bunker(FIELD_X + spacing * 2 - 24, bunkY),
    new Bunker(FIELD_X + spacing * 3 - 24, bunkY),
    new Bunker(FIELD_X + spacing * 4 - 24, bunkY),
  ];
  projectiles = [];
  explosions = [];
  alienDir = 1;
  alienMoveTimer = 0;
  totalAliens = aliens.length;
  score = 0;
  railAmmo = 0;
  powerUp = null;
  powerUpTimer = 0;
  powerUpInterval = 500 + Math.floor(Math.random() * 200);
  gameState = "playing";
}

// ── Title screen ─────────────────────────────────────────────────────
let titleKeyDebounce = {};

function updateTitle() {
  const upPressed = keys["ArrowUp"] || keys["KeyW"];
  const downPressed = keys["ArrowDown"] || keys["KeyS"];
  const enterPressed = keys["Enter"] || keys["Space"];

  if (upPressed && !titleKeyDebounce.up) {
    selectedDiff = (selectedDiff - 1 + DIFF_ORDER.length) % DIFF_ORDER.length;
    playSound("menuSelect");
  }
  if (downPressed && !titleKeyDebounce.down) {
    selectedDiff = (selectedDiff + 1) % DIFF_ORDER.length;
    playSound("menuSelect");
  }
  if (enterPressed && !titleKeyDebounce.enter) {
    playSound("menuConfirm");
    startGame(DIFF_ORDER[selectedDiff]);
  }

  titleKeyDebounce.up = upPressed;
  titleKeyDebounce.down = downPressed;
  titleKeyDebounce.enter = enterPressed;
}

function drawTitle() {
  // Logo
  const logoText = "SPACE ATTACK";
  drawText(logoText, W / 2, 100, COL.logo, 48, "center");

  // Subtitle
  drawText("~ Defend Earth from the alien invasion ~", W / 2, 155, COL.menu, 16, "center");

  // Decorative ships
  ctx.fillStyle = COL.player;
  for (const ox of [-120, 120]) {
    ctx.beginPath();
    ctx.moveTo(W / 2 + ox, 80);
    ctx.lineTo(W / 2 + ox + 12, 100);
    ctx.lineTo(W / 2 + ox - 12, 100);
    ctx.closePath();
    ctx.fill();
  }

  // Difficulty menu
  drawText("SELECT DIFFICULTY", W / 2, 220, COL.msg, 20, "center");

  for (let i = 0; i < DIFF_ORDER.length; i++) {
    const d = DIFFICULTIES[DIFF_ORDER[i]];
    const y = 270 + i * 45;
    const selected = i === selectedDiff;
    const color = selected ? COL.menuSel : COL.menu;
    const prefix = selected ? "> " : "  ";
    const size = selected ? 18 : 16;
    drawText(`${prefix}${d.label}`, W / 2 - 140, y, color, size, "left");
    drawText(d.desc, W / 2 + 20, y, selected ? COL.menuSel : "#777777", 14, "left");
  }

  // Controls
  drawText("UP/DOWN = Select    ENTER/SPACE = Start", W / 2, 480, COL.status, 14, "center");
  drawText("ARROWS/WASD = Move    SPACE = Shoot    ESC = Menu", W / 2, 505, "#666666", 12, "center");
}

// ── Gameplay ─────────────────────────────────────────────────────────
function updateGame() {
  if (gameState !== "playing") return;

  player.update();

  // shooting — RailFire is the mobile RAIL button; on desktop Space auto-fires rail
  const wantsRail = keys["RailFire"] || (!touchActive && keys["Space"] && railAmmo > 0);
  if (wantsRail && railAmmo > 0 && player.cooldown <= 0) {
    railAmmo--;
    player.cooldown = PLAYER_SHOOT_COOLDOWN;
    const beamX = player.x + player.w / 2;
    explosions.push(new RailBeam(beamX));
    playSound("railgun");
    const beamHalf = 10;
    const beamAlive = aliens.filter(a => a.alive);
    for (const a of beamAlive) {
      const aCx = a.x + a.w / 2;
      if (Math.abs(aCx - beamX) < beamHalf + a.w / 2) {
        a.alive = false;
        score += a.points;
        explosions.push(new Explosion(a.x + a.w / 2, a.y + a.h / 2));
      }
    }
  } else if (keys["Space"]) {
    const p = player.shoot();
    if (p) { projectiles.push(p); playSound("shoot"); }
  }

  // power-up spawning
  if (powerUp === null) {
    powerUpTimer++;
    if (powerUpTimer >= powerUpInterval) {
      powerUp = new PowerUp();
      powerUpTimer = 0;
      powerUpInterval = 500 + Math.floor(Math.random() * 200);
    }
  } else {
    powerUp.update();
    if (!powerUp.alive) powerUp = null;
  }

  // alien movement — speed up as aliens are destroyed
  alienMoveTimer++;
  const alive = aliens.filter(a => a.alive);
  const ratio = alive.length / totalAliens;
  const moveInterval = Math.max(1, Math.round(baseMoveInterval * ratio * ratio));
  // Scale movement speed: 2px at full count, up to 12px for the last alien
  const speed = Math.min(6, Math.max(2, Math.round(2 / (ratio * ratio + 0.04))));
  if (alienMoveTimer >= moveInterval && alive.length > 0) {
    alienMoveTimer = 0;
    let reverse = false;
    for (const a of alive) {
      const nx = a.x + alienDir * speed;
      if (nx <= FIELD_X || nx >= FIELD_X + FIELD_W - a.w) {
        reverse = true;
        break;
      }
    }
    if (reverse) {
      alienDir *= -1;
      for (const a of alive) a.y += 16;
    } else {
      for (const a of alive) a.x += alienDir * speed;
    }
  }

  // aliens reached bottom?
  for (const a of alive) {
    if (a.y + a.h >= FIELD_Y + FIELD_H) {
      playSound("playerDeath");
      gameState = "lost";
      return;
    }
  }

  // random alien shoot
  if (alive.length > 0) {
    const shooter = alive[Math.floor(Math.random() * alive.length)];
    const ap = shooter.tryShoot();
    if (ap) projectiles.push(ap);
  }

  // update projectiles
  for (const p of projectiles) p.update();
  projectiles = projectiles.filter(p => p.alive);

  // update explosions
  for (const e of explosions) e.update();
  explosions = explosions.filter(e => e.alive);

  // collision: player projectiles -> aliens
  const remaining = [];
  for (const p of projectiles) {
    let hit = false;
    if (p.dir === -1) {
      // Check power-up first
      if (powerUp && powerUp.alive && rectCollide(p.x, p.y, p.w, p.h, powerUp.x, powerUp.y, powerUp.w, powerUp.h)) {
        railAmmo++;
        explosions.push(new Explosion(powerUp.x + powerUp.w / 2, powerUp.y + powerUp.h / 2));
        powerUp = null;
        playSound("powerup");
        hit = true;
      }
      if (!hit) for (const a of alive) {
        if (a.alive && rectCollide(p.x, p.y, p.w, p.h, a.x, a.y, a.w, a.h)) {
          const dead = a.takeHit();
          explosions.push(new Explosion(p.x, p.y));
          playSound(dead ? "explode" : "hit");
          if (dead) score += a.points;
          hit = true;
          break;
        }
      }
      if (!hit) {
        for (const b of bunkers) {
          if (!b.isDestroyed && rectCollide(p.x, p.y, p.w, p.h, b.x, b.y, b.w, b.h)) {
            if (b.damageAt(p.x, p.y, LASER_BLAST_RADIUS)) {
              explosions.push(new Explosion(p.x, p.y));
              playSound("hit");
              hit = true;
              break;
            }
          }
        }
      }
    } else {
      // alien projectile -> player
      if (rectCollide(p.x, p.y, p.w, p.h, player.x, player.y, player.w, player.h)) {
        explosions.push(new Explosion(player.x + player.w / 2, player.y + player.h / 2));
        playSound("playerDeath");
        gameState = "lost";
        hit = true;
      }
      // alien projectile -> bunkers
      if (!hit) {
        for (const b of bunkers) {
          if (!b.isDestroyed && rectCollide(p.x, p.y, p.w, p.h, b.x, b.y, b.w, b.h)) {
            const radius = p.isBomb ? BOMB_BLAST_RADIUS : LASER_BLAST_RADIUS;
            if (b.damageAt(p.x, p.y, radius)) {
              explosions.push(new Explosion(p.x, p.y));
              playSound("hit");
              hit = true;
              break;
            }
          }
        }
      }
    }
    if (!hit) remaining.push(p);
  }
  projectiles = remaining;

  // win condition
  if (aliens.filter(a => a.alive).length === 0) {
    playSound("win");
    gameState = "won";
  }

  if (bunkers.every(b => b.isDestroyed)) {
    playSound("playerDeath");
    gameState = "lost";
  }
}

function drawGame() {
  // field border
  ctx.strokeStyle = COL.border;
  ctx.lineWidth = 2;
  ctx.strokeRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);

  // bunkers
  for (const b of bunkers) {
    if (!b.isDestroyed) b.draw();
  }

  // aliens
  for (const a of aliens) {
    if (a.alive) a.draw();
  }

  // player
  if (gameState === "playing" || gameState === "won") {
    player.draw();
  }

  // power-up
  if (powerUp && powerUp.alive) powerUp.draw();

  // projectiles
  for (const p of projectiles) p.draw();

  // explosions
  for (const e of explosions) e.draw();

  // status bar
  const aliveCount = aliens.filter(a => a.alive).length;
  const diffLabel = DIFFICULTIES[difficulty].label;
  drawText(`SPACE ATTACK  [${diffLabel}]`, FIELD_X + 5, FIELD_Y - 10, COL.status, 14, "left");
  drawText(`Score: ${score}`, FIELD_X + 300, FIELD_Y - 10, COL.status, 14, "left");
  drawText(`Aliens: ${aliveCount}`, FIELD_X + 450, FIELD_Y - 10, COL.status, 14, "left");
  if (railAmmo > 0) drawText(`RAIL: ${railAmmo}`, FIELD_X + 560, FIELD_Y - 10, "#00ccff", 14, "left");
  drawText("Arrows=Move  Space=Shoot  Esc=Menu", FIELD_X + 640, FIELD_Y - 10, "#666666", 11, "left");

  // Update mobile RAIL button ammo display
  if (touchActive) {
    const rc = document.getElementById('rail-count');
    if (rc) rc.textContent = railAmmo > 0 ? railAmmo : '';
  }

  // end-state overlay
  if (gameState === "won" || gameState === "lost") {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);
    const msg1 = gameState === "won" ? "YOU WIN!" : "GAME OVER";
    drawText(msg1, W / 2, H / 2 - 30, COL.msg, 36, "center");
    drawText(`Score: ${score}`, W / 2, H / 2 + 10, COL.msg, 20, "center");
    const restartHint = touchActive ? "FIRE = Restart    ESC = Menu" : "R = Restart    M / ESC = Menu";
    drawText(restartHint, W / 2, H / 2 + 50, COL.status, 16, "center");
  }
}

// ── End-state input ──────────────────────────────────────────────────
let endKeyDebounce = {};

function updateEndState() {
  const rPressed = keys["KeyR"] || (touchActive && keys["Space"]);
  const mPressed = keys["KeyM"] || keys["Escape"];

  if (rPressed && !endKeyDebounce.r) {
    startGame(difficulty);
  }
  if (mPressed && !endKeyDebounce.m) {
    gameState = "title";
  }

  endKeyDebounce.r = rPressed;
  endKeyDebounce.m = mPressed;
}

// ── Escape to menu during gameplay ───────────────────────────────────
let escDebounce = false;

// ── Main loop ────────────────────────────────────────────────────────
function gameLoop() {
  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (gameState === "title") {
    updateTitle();
    drawTitle();
    escDebounce = false;
  } else if (gameState === "playing") {
    // escape to menu
    if (keys["Escape"] && !escDebounce) {
      gameState = "title";
    }
    escDebounce = !!keys["Escape"];

    updateGame();
    drawGame();
  } else {
    // won or lost
    updateGame(); // still animate explosions
    drawGame();
    updateEndState();
  }

  requestAnimationFrame(gameLoop);
}

// Throttle to target FPS
let lastFrame = 0;
function throttledLoop(timestamp) {
  const elapsed = timestamp - lastFrame;
  if (elapsed >= 1000 / FPS) {
    lastFrame = timestamp - (elapsed % (1000 / FPS));
    gameLoop();
  } else {
    requestAnimationFrame(throttledLoop);
  }
}

// Actually just use requestAnimationFrame directly for smoother feel
setupMobileControls();
gameLoop();
</script>
