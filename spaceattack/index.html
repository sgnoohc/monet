<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Space Attack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100dvh; height: 100vh; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  @supports (height: 100dvh) {
    html, body { height: 100dvh; }
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  #controls { display: none; }
  body.mobile {
    flex-direction: column;
    justify-content: flex-start;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body.mobile canvas {
    touch-action: none;
    flex-shrink: 0;
  }
  body.mobile #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    flex: 1;
    padding: 12px 24px;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    border-top: 2px solid #333;
    touch-action: none;
    max-height: 45dvh;
    max-height: 45vh;
    min-height: 180px;
  }
  /* D-Pad */
  #dpad {
    display: grid;
    grid-template-areas:
      ".    up    ."
      "left center right"
      ".    down  .";
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px);
    gap: 4px;
  }
  .dpad-up    { grid-area: up; }
  .dpad-left  { grid-area: left; }
  .dpad-center{ grid-area: center; }
  .dpad-right { grid-area: right; }
  .dpad-down  { grid-area: down; }
  .dpad-btn {
    width: 64px;
    height: 64px;
    border: 2px solid #555;
    background: #222;
    color: #999;
    font-size: 26px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  .dpad-btn.pressed {
    background: #555;
    color: #fff;
    border-color: #999;
    box-shadow: 0 0 12px rgba(255,255,255,0.2);
  }
  .dpad-center-dot {
    grid-area: center;
    width: 64px;
    height: 64px;
    background: #1a1a1a;
    border-radius: 10px;
    border: 2px solid #333;
  }
  /* Action buttons */
  #action-btns {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
  }
  .action-btn {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 3px solid;
    font-family: monospace;
    font-weight: bold;
    font-size: 15px;
    line-height: 1.2;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    transition: box-shadow 0.1s;
  }
  #btn-fire {
    background: radial-gradient(circle at 35% 35%, #662222, #331111);
    border-color: #ff4444;
    color: #ff6666;
  }
  #btn-fire.pressed {
    background: radial-gradient(circle at 35% 35%, #ff4444, #aa2222);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,68,68,0.6);
  }
  #btn-special {
    background: radial-gradient(circle at 35% 35%, #1a3344, #0d1a22);
    border-color: #00ccff;
    color: #00ccff;
  }
  #btn-special.pressed {
    background: radial-gradient(circle at 35% 35%, #00ccff, #006688);
    color: #fff;
    box-shadow: 0 0 20px rgba(0,204,255,0.6);
  }
  #btn-special .ammo {
    display: block;
    font-size: 20px;
  }
  #btn-select {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid #888;
    background: radial-gradient(circle at 35% 35%, #444, #222);
    color: #ccc;
    font-family: monospace;
    font-size: 14px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    position: absolute;
    top: 12px;
    right: -72px;
  }
  #btn-select.pressed {
    background: radial-gradient(circle at 35% 35%, #888, #444);
    color: #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
  }
  #btn-esc {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid #777;
    background: radial-gradient(circle at 35% 35%, #444, #222);
    color: #888;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    position: absolute;
    bottom: 12px;
    right: -72px;
  }
  #btn-esc.pressed {
    background: radial-gradient(circle at 35% 35%, #888, #444);
    color: #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
  }
  /* Debug bar */
  #debug-bar {
    display: none;
    width: 100%;
    justify-content: center;
    gap: 8px;
    padding: 6px 12px;
    background: #1a1200;
    border-top: 2px solid #cc8800;
    touch-action: none;
  }
  body.mobile.debug-on #debug-bar {
    display: flex;
  }
  .dbg-btn {
    flex: 1;
    max-width: 72px;
    height: 36px;
    border: 2px solid #cc8800;
    border-radius: 6px;
    background: #2a1a00;
    color: #cc8800;
    font-family: monospace;
    font-size: 12px;
    font-weight: bold;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  .dbg-btn.active {
    background: #cc8800;
    color: #000;
  }
  /* Name input overlay */
  #name-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    font-family: monospace;
  }
  #name-overlay.show { display: flex; }
  #name-overlay .prompt-box {
    background: #111;
    border: 2px solid #00cccc;
    padding: 30px 40px;
    text-align: center;
    border-radius: 8px;
    box-shadow: 0 0 30px rgba(0,204,204,0.3);
  }
  #name-overlay h2 {
    color: #00cccc;
    font-size: 22px;
    margin: 0 0 8px 0;
    font-family: monospace;
  }
  #name-overlay .score-line {
    color: #ffff00;
    font-size: 16px;
    margin-bottom: 16px;
  }
  #name-overlay input {
    background: #000;
    border: 2px solid #00ff66;
    color: #00ff66;
    font-family: monospace;
    font-size: 20px;
    padding: 8px 12px;
    width: 200px;
    text-align: center;
    text-transform: uppercase;
    outline: none;
    border-radius: 4px;
  }
  #name-overlay input::placeholder { color: #336633; }
  #name-overlay input:focus { border-color: #00ff99; box-shadow: 0 0 10px rgba(0,255,102,0.3); }
  #name-overlay button {
    display: block;
    margin: 14px auto 0;
    background: #003322;
    border: 2px solid #00ff66;
    color: #00ff66;
    font-family: monospace;
    font-size: 16px;
    font-weight: bold;
    padding: 8px 32px;
    cursor: pointer;
    border-radius: 4px;
  }
  #name-overlay button:hover { background: #00ff66; color: #000; }
  #name-overlay .skip-link {
    color: #666;
    font-size: 12px;
    margin-top: 10px;
    cursor: pointer;
  }
  #name-overlay .skip-link:hover { color: #999; }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>
<body>
<div id="name-overlay">
  <div class="prompt-box">
    <h2>ENTER YOUR NAME</h2>
    <div class="score-line" id="overlay-score"></div>
    <input type="text" id="player-name" maxlength="12" placeholder="PILOT" autocomplete="off" spellcheck="false">
    <button id="submit-name">SUBMIT SCORE</button>
    <div class="skip-link" id="skip-name">skip</div>
  </div>
</div>
<canvas id="game"></canvas>
<div id="debug-bar">
  <button class="dbg-btn" data-dbg="ammo">+ALL</button>
  <button class="dbg-btn" data-dbg="spawn">SPAWN</button>
  <button class="dbg-btn" data-dbg="inv" id="dbg-inv">INV</button>
  <button class="dbg-btn" data-dbg="kill50">K50%</button>
  <button class="dbg-btn" data-dbg="killall">KILL</button>
</div>
<div id="controls">
  <div id="action-btns">
    <button class="action-btn" id="btn-fire" data-key="Space">FIRE</button>
    <button class="action-btn" id="btn-special" data-key="ShiftLeft" style="border-color:#333;color:#444;opacity:0.4"><span id="special-name">SPEC</span><span class="ammo" id="special-count"></span></button>
    <button id="btn-select" data-key="Tab">SEL</button>
    <button id="btn-esc" data-key="Escape">ESC</button>
  </div>
  <div id="dpad">
    <button class="dpad-btn dpad-up" data-key="ArrowUp">&#9650;</button>
    <button class="dpad-btn dpad-left" data-key="ArrowLeft">&#9664;</button>
    <div class="dpad-center-dot"></div>
    <button class="dpad-btn dpad-right" data-key="ArrowRight">&#9654;</button>
    <button class="dpad-btn dpad-down" data-key="ArrowDown">&#9660;</button>
  </div>
</div>
<script>
"use strict";

// ── Firebase + Leaderboard ───────────────────────────────────────────
const firebaseConfig = {
  // TODO: Replace with your Firebase project config
  // Go to https://console.firebase.google.com/ → Project Settings → Your apps → Web
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "000000000000",
  appId: "YOUR_APP_ID"
};

let firebaseReady = false;
try {
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  firebaseReady = firebaseConfig.apiKey !== "YOUR_API_KEY";

  var submitScore = function(name, sc, diff, lvl) {
    if (!firebaseReady) return Promise.resolve();
    return db.ref("leaderboard/" + diff).push({
      name: name.toUpperCase().slice(0, 12),
      score: sc,
      level: lvl,
      timestamp: firebase.database.ServerValue.TIMESTAMP
    }).then(() => {});
  };

  var fetchLeaderboard = function(diff, limit, callback) {
    if (!firebaseReady) { callback([]); return; }
    db.ref("leaderboard/" + diff)
      .orderByChild("score")
      .limitToLast(limit || 10)
      .once("value")
      .then(snap => {
        const entries = [];
        snap.forEach(child => {
          entries.push(child.val());
        });
        // Sort descending by score
        entries.sort((a, b) => b.score - a.score);
        callback(entries);
      })
      .catch(() => callback([]));
  };
} catch(e) {
  firebaseReady = false;
  var submitScore = function() { return Promise.resolve(); };
  var fetchLeaderboard = function(d, l, cb) { cb([]); };
}

let leaderboardData = [];
let leaderboardLoaded = false;
let playerName = localStorage.getItem("spaceattack_name") || "";
let scoreSubmitted = false;
let showingNameInput = false;

// Leaderboard viewer state (title screen)
let lbViewDiff = 1; // index into DIFF_ORDER
let lbViewData = [];
let lbViewLoaded = false;
let lbViewDebounce = {};

// ── Canvas setup ─────────────────────────────────────────────────────
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = 780, H = 580;
canvas.width = W;
canvas.height = H;

let touchActive = false;

function fitCanvas() {
  const vw = window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  if (touchActive) {
    const ctrl = document.getElementById('controls');
    const dbgBar = document.getElementById('debug-bar');
    const ctrlH = ctrl && ctrl.offsetHeight > 0 ? ctrl.offsetHeight : vh * 0.4;
    const dbgH = dbgBar && dbgBar.offsetHeight > 0 ? dbgBar.offsetHeight : 0;
    const availH = vh - ctrlH - dbgH;
    const scaleX = vw / W;
    const scaleY = availH / H;
    const scale = Math.min(scaleX, scaleY);
    canvas.style.width = (W * scale) + "px";
    canvas.style.height = (H * scale) + "px";
  } else {
    const scaleX = vw / W;
    const scaleY = vh / H;
    const scale = Math.min(scaleX, scaleY);
    canvas.style.width = (W * scale) + "px";
    canvas.style.height = (H * scale) + "px";
  }
}
fitCanvas();
window.addEventListener("resize", fitCanvas);
if (window.visualViewport) window.visualViewport.addEventListener("resize", fitCanvas);

// ── Sound (Web Audio API) ────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// Helper: white noise buffer source
function makeNoise(duration) {
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr * duration, sr);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  return src;
}

// Helper: sigmoid distortion curve
function makeDistortion(amount) {
  const ws = audioCtx.createWaveShaper();
  const k = amount;
  const n = 256;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x));
  }
  ws.curve = curve;
  ws.oversample = "2x";
  return ws;
}

function playSound(type) {
  if (audioCtx.state === "suspended") audioCtx.resume();
  const t = audioCtx.currentTime;
  const dest = audioCtx.destination;

  switch (type) {
    case "shoot": {
      // Main square with highpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.setValueAtTime(2000, t);
      hp.frequency.exponentialRampToValueAtTime(500, t + 0.1);
      osc.type = "square";
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(440, t + 0.1);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.connect(hp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.1);
      // Noise attack transient
      const ns = makeNoise(0.05);
      const ng = audioCtx.createGain();
      const nhp = audioCtx.createBiquadFilter();
      nhp.type = "highpass";
      nhp.frequency.value = 8000;
      ng.gain.setValueAtTime(0.08, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      ns.connect(nhp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.05);
      break;
    }

    case "hit": {
      // Main impact with distortion + lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = makeDistortion(30);
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(1500, t);
      lp.frequency.exponentialRampToValueAtTime(300, t + 0.15);
      osc.type = "square";
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.15);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.connect(dist).connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.15);
      // Percussive noise crack
      const ns = makeNoise(0.08);
      const ng = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.value = 2000;
      bp.Q.value = 2;
      ng.gain.setValueAtTime(0.1, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      ns.connect(bp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.08);
      break;
    }

    case "explode": {
      // Main body with distortion + lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = makeDistortion(40);
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(2000, t);
      lp.frequency.exponentialRampToValueAtTime(100, t + 0.3);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.3);
      gain.gain.setValueAtTime(0.16, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.connect(dist).connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.3);
      // Bandpass noise sweep (fireball texture)
      const ns = makeNoise(0.25);
      const ng = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(4000, t);
      bp.frequency.exponentialRampToValueAtTime(400, t + 0.25);
      bp.Q.value = 3;
      ng.gain.setValueAtTime(0.12, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      ns.connect(bp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.25);
      // Sub-bass sine for weight
      const sub = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      sub.type = "sine";
      sub.frequency.setValueAtTime(80, t);
      sub.frequency.exponentialRampToValueAtTime(20, t + 0.3);
      sg.gain.setValueAtTime(0.15, t);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      sub.connect(sg).connect(dest);
      sub.start(t);
      sub.stop(t + 0.3);
      break;
    }

    case "playerDeath": {
      // Main descent with distortion + lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = makeDistortion(35);
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(3000, t);
      lp.frequency.exponentialRampToValueAtTime(200, t + 0.8);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.8);
      gain.gain.setValueAtTime(0.16, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc.connect(dist).connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.8);
      // Detuned oscillator for chorusing warble
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.type = "sawtooth";
      osc2.frequency.setValueAtTime(607, t);
      osc2.frequency.exponentialRampToValueAtTime(43, t + 0.8);
      g2.gain.setValueAtTime(0.1, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc2.connect(lp).connect(gain); // share filter chain
      osc2.start(t);
      osc2.stop(t + 0.8);
      // Bandpass noise for chaos/breakup
      const ns = makeNoise(0.7);
      const ng = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(5000, t);
      bp.frequency.exponentialRampToValueAtTime(500, t + 0.7);
      bp.Q.value = 2;
      ng.gain.setValueAtTime(0.08, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      ns.connect(bp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.7);
      // Bright alarm ping at start
      const ping = audioCtx.createOscillator();
      const pg = audioCtx.createGain();
      const pbp = audioCtx.createBiquadFilter();
      pbp.type = "bandpass";
      pbp.frequency.value = 1200;
      pbp.Q.value = 15;
      ping.type = "sine";
      ping.frequency.value = 1200;
      pg.gain.setValueAtTime(0.14, t);
      pg.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      ping.connect(pbp).connect(pg).connect(dest);
      ping.start(t);
      ping.stop(t + 0.15);
      break;
    }

    case "win": {
      // Lead with bandpass filter for horn-like quality
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.value = 1000;
      bp.Q.value = 3;
      osc.type = "square";
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.setValueAtTime(0.1, t + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.12);
      osc.frequency.setValueAtTime(784, t + 0.24);
      osc.frequency.setValueAtTime(1047, t + 0.36);
      osc.connect(bp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.7);
      // Triangle octave below for body
      const oct = audioCtx.createOscillator();
      const og = audioCtx.createGain();
      oct.type = "triangle";
      og.gain.setValueAtTime(0.06, t);
      og.gain.setValueAtTime(0.06, t + 0.5);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      oct.frequency.setValueAtTime(261, t);
      oct.frequency.setValueAtTime(329, t + 0.12);
      oct.frequency.setValueAtTime(392, t + 0.24);
      oct.frequency.setValueAtTime(523, t + 0.36);
      oct.connect(og).connect(dest);
      oct.start(t);
      oct.stop(t + 0.7);
      // Detuned sine for shimmer chorus
      const det = audioCtx.createOscillator();
      const dg = audioCtx.createGain();
      det.type = "sine";
      dg.gain.setValueAtTime(0.04, t);
      dg.gain.setValueAtTime(0.04, t + 0.5);
      dg.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      det.frequency.setValueAtTime(528, t);
      det.frequency.setValueAtTime(664, t + 0.12);
      det.frequency.setValueAtTime(789, t + 0.24);
      det.frequency.setValueAtTime(1052, t + 0.36);
      det.connect(dg).connect(dest);
      det.start(t);
      det.stop(t + 0.7);
      // Highpass noise flourish on final note (cymbal)
      const ns = makeNoise(0.3);
      const ng = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.value = 6000;
      ng.gain.setValueAtTime(0.001, t + 0.36);
      ng.gain.linearRampToValueAtTime(0.06, t + 0.4);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.68);
      ns.connect(hp).connect(ng).connect(dest);

      ns.stop(t + 0.68);

    case "menuSelect": {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain).connect(dest);
      osc.type = "square";
      osc.frequency.setValueAtTime(660, t);
      gain.gain.setValueAtTime(0.08, t);

    case "menuConfirm": {

      osc.frequency.setValueAtTime(1100, t + 0.08);
      gain.gain.setValueAtTime(0.1, t);

    }

    case "powerup": {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain).connect(dest);
      osc.type = "sine";
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(2400, t + 0.3);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t);
      osc.stop(t + 0.35);
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.connect(g2).connect(dest);
      osc2.type = "triangle";
      osc2.frequency.setValueAtTime(900, t + 0.05);
      osc2.frequency.exponentialRampToValueAtTime(3200, t + 0.3);
      g2.gain.setValueAtTime(0.08, t + 0.05);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);

    case "railgun": {
      // Main zap: sawtooth → distortion → bandpass sweep

      const gain = audioCtx.createGain();
      const dist = makeDistortion(50);
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(3000, t);
      bp.frequency.exponentialRampToValueAtTime(8000, t + 0.05);
      bp.frequency.exponentialRampToValueAtTime(2000, t + 0.35);
      bp.Q.value = 4;
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(1200, t);
      osc.frequency.exponentialRampToValueAtTime(4800, t + 0.05);
      osc.frequency.exponentialRampToValueAtTime(800, t + 0.35);
      gain.gain.setValueAtTime(0.14, t);
      gain.gain.linearRampToValueAtTime(0.1, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.connect(dist).connect(bp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.35);
      // Noise crackle through highpass for electric sizzle
      const ns = makeNoise(0.2);
      const ng = audioCtx.createGain();
      const nhp = audioCtx.createBiquadFilter();
      nhp.type = "highpass";
      nhp.frequency.value = 4000;
      ng.gain.setValueAtTime(0.08, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      ns.connect(nhp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.2);
      // Shimmer tail through delay for reverberant ring
      const osc3 = audioCtx.createOscillator();
      const g3 = audioCtx.createGain();
      const delay = audioCtx.createDelay();
      const dg = audioCtx.createGain();
      delay.delayTime.value = 0.06;
      dg.gain.value = 0.3;
      osc3.type = "sine";
      osc3.frequency.setValueAtTime(2400, t + 0.05);
      osc3.frequency.exponentialRampToValueAtTime(5000, t + 0.15);
      osc3.frequency.exponentialRampToValueAtTime(1800, t + 0.4);
      g3.gain.setValueAtTime(0.001, t);
      g3.gain.linearRampToValueAtTime(0.06, t + 0.06);
      g3.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc3.connect(g3).connect(dest);
      g3.connect(delay).connect(dg).connect(delay); // feedback loop
      dg.connect(dest);
      osc3.start(t);
      osc3.stop(t + 0.4);
      // FM synthesis layer for metallic zing
      const mod = audioCtx.createOscillator();
      const modGain = audioCtx.createGain();
      const carrier = audioCtx.createOscillator();
      const cg = audioCtx.createGain();
      mod.type = "sine";
      mod.frequency.setValueAtTime(3200, t);
      mod.frequency.exponentialRampToValueAtTime(800, t + 0.25);
      modGain.gain.setValueAtTime(600, t);
      modGain.gain.exponentialRampToValueAtTime(50, t + 0.25);
      carrier.type = "sine";
      carrier.frequency.setValueAtTime(1600, t);
      cg.gain.setValueAtTime(0.05, t);
      cg.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      mod.connect(modGain).connect(carrier.frequency);
      carrier.connect(cg).connect(dest);
      mod.start(t);
      mod.stop(t + 0.25);
      carrier.start(t);
      carrier.stop(t + 0.25);
      break;

    case "torpedoBlast": {
      // Main body: sawtooth → distortion → lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = makeDistortion(45);
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(2000, t);
      lp.frequency.exponentialRampToValueAtTime(200, t + 0.6);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(25, t + 0.6);
      gain.gain.setValueAtTime(0.24, t);
      gain.gain.linearRampToValueAtTime(0.16, t + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.connect(dist).connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.6);
      // Bandpass noise sweep for debris
      const ns = makeNoise(0.4);
      const ng = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(3000, t);
      bp.frequency.exponentialRampToValueAtTime(300, t + 0.4);
      bp.Q.value = 3;
      ng.gain.setValueAtTime(0.1, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      ns.connect(bp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.4);
      // Detuned sub-bass pair for chorus thickness
      const sub1 = audioCtx.createOscillator();
      const sub2 = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      sub1.type = "sine";
      sub1.frequency.setValueAtTime(60, t);
      sub1.frequency.exponentialRampToValueAtTime(20, t + 0.5);
      sub2.type = "sine";
      sub2.frequency.setValueAtTime(62, t);
      sub2.frequency.exponentialRampToValueAtTime(21, t + 0.5);
      sg.gain.setValueAtTime(0.2, t);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      sub1.connect(sg);
      sub2.connect(sg);
      sg.connect(dest);
      sub1.start(t);
      sub1.stop(t + 0.5);
      sub2.start(t);
      sub2.stop(t + 0.5);
      // Shrapnel sparkle (highpass noise)
      const ns2 = makeNoise(0.15);
      const ng2 = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.value = 5000;
      ng2.gain.setValueAtTime(0.06, t);
      ng2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      ns2.connect(hp).connect(ng2).connect(dest);
      ns2.start(t);
      ns2.stop(t + 0.15);
      // Resonant impact ping
      const ping = audioCtx.createOscillator();
      const pg = audioCtx.createGain();
      const pbp = audioCtx.createBiquadFilter();
      pbp.type = "bandpass";
      pbp.frequency.value = 800;
      pbp.Q.value = 20;
      ping.type = "sine";
      ping.frequency.value = 800;
      pg.gain.setValueAtTime(0.1, t);
      pg.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      ping.connect(pbp).connect(pg).connect(dest);
      ping.start(t);
      ping.stop(t + 0.12);
      break;
    }

    case "heal": {
      // Sparkle chimes through bandpass + delay
      const notes = [1200, 1600, 2000, 2400, 2800];
      const delay = audioCtx.createDelay();
      const dfb = audioCtx.createGain();
      delay.delayTime.value = 0.08;
      dfb.gain.value = 0.25;
      delay.connect(dfb).connect(delay); // feedback loop
      delay.connect(dest);
      for (let i = 0; i < notes.length; i++) {
        const hOsc = audioCtx.createOscillator();
        const hGain = audioCtx.createGain();
        const hBp = audioCtx.createBiquadFilter();
        hBp.type = "bandpass";
        hBp.frequency.value = notes[i];
        hBp.Q.value = 12;
        hOsc.type = i % 2 === 0 ? "sine" : "triangle";
        const offset = i * 0.07;
        hOsc.frequency.setValueAtTime(notes[i], t + offset);
        hOsc.frequency.exponentialRampToValueAtTime(notes[i] * 1.5, t + offset + 0.15);
        hGain.gain.setValueAtTime(0.001, t + offset);
        hGain.gain.linearRampToValueAtTime(0.07, t + offset + 0.02);
        hGain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.18);
        hOsc.connect(hBp).connect(hGain);
        hGain.connect(dest);
        hGain.connect(delay);
        hOsc.start(t + offset);
        hOsc.stop(t + offset + 0.18);
      }
      // Fairy dust shimmer (highpass noise)
      const ns = makeNoise(0.5);
      const ng = audioCtx.createGain();
      const nhp = audioCtx.createBiquadFilter();
      nhp.type = "highpass";
      nhp.frequency.value = 6000;
      ng.gain.setValueAtTime(0.001, t);
      ng.gain.linearRampToValueAtTime(0.04, t + 0.05);
      ng.gain.linearRampToValueAtTime(0.03, t + 0.3);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      ns.connect(nhp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.5);
      // Sub-harmonic warm body
      const sub = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      sub.type = "sine";
      sub.frequency.value = 600;
      sg.gain.setValueAtTime(0.001, t);
      sg.gain.linearRampToValueAtTime(0.05, t + 0.05);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      sub.connect(sg).connect(dest);
      sub.start(t);
      sub.stop(t + 0.45);
      break;
    }

    case "slowmo": {
      // Deep drone through lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(800, t);
      lp.frequency.exponentialRampToValueAtTime(200, t + 0.8);
      lp.Q.value = 8;
      osc.type = "sine";
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(110, t + 0.8);
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.1);
      gain.gain.linearRampToValueAtTime(0.1, t + 0.4);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc.connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.8);
      // 3 detuned oscillators for thick chorus
      const freqs = [220, 227, 215];
      for (let i = 0; i < freqs.length; i++) {
        const co = audioCtx.createOscillator();
        const cg = audioCtx.createGain();
        co.type = "triangle";
        co.frequency.setValueAtTime(freqs[i], t);
        co.frequency.exponentialRampToValueAtTime(freqs[i] / 2, t + 0.8);
        cg.gain.setValueAtTime(0.001, t);
        cg.gain.linearRampToValueAtTime(0.06, t + 0.15);
        cg.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        co.connect(lp).connect(gain); // share filter chain
        co.start(t);
        co.stop(t + 0.8);
      }
      // High shimmer through bandpass + delay
      const sh = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      const sbp = audioCtx.createBiquadFilter();
      sbp.type = "bandpass";
      sbp.frequency.setValueAtTime(880, t + 0.1);
      sbp.frequency.exponentialRampToValueAtTime(440, t + 0.7);
      sbp.Q.value = 5;
      const delay = audioCtx.createDelay();
      const dfb = audioCtx.createGain();
      delay.delayTime.value = 0.12;
      dfb.gain.value = 0.4;
      sh.type = "sine";
      sh.frequency.setValueAtTime(880, t + 0.1);
      sh.frequency.exponentialRampToValueAtTime(440, t + 0.7);
      sg.gain.setValueAtTime(0.001, t);
      sg.gain.linearRampToValueAtTime(0.05, t + 0.2);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      sh.connect(sbp).connect(sg);
      sg.connect(dest);
      sg.connect(delay).connect(dfb).connect(delay);
      delay.connect(dest);
      sh.start(t);
      sh.stop(t + 0.7);
      // FM wobble: LFO → 330 Hz tone ("time decelerating")
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      const fmCarrier = audioCtx.createOscillator();
      const fmG = audioCtx.createGain();
      lfo.type = "sine";
      lfo.frequency.setValueAtTime(4, t);
      lfo.frequency.exponentialRampToValueAtTime(1, t + 0.8);
      lfoG.gain.setValueAtTime(40, t);
      lfoG.gain.exponentialRampToValueAtTime(10, t + 0.8);
      fmCarrier.type = "sine";
      fmCarrier.frequency.value = 330;
      fmG.gain.setValueAtTime(0.001, t);
      fmG.gain.linearRampToValueAtTime(0.04, t + 0.15);
      fmG.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      lfo.connect(lfoG).connect(fmCarrier.frequency);
      fmCarrier.connect(fmG).connect(dest);
      lfo.start(t);
      lfo.stop(t + 0.8);
      fmCarrier.start(t);
      fmCarrier.stop(t + 0.8);
      // Bandpass noise whisper for atmosphere
      const ns = makeNoise(0.7);
      const ng = audioCtx.createGain();
      const nbp = audioCtx.createBiquadFilter();
      nbp.type = "bandpass";
      nbp.frequency.value = 400;
      nbp.Q.value = 2;
      ng.gain.setValueAtTime(0.001, t);
      ng.gain.linearRampToValueAtTime(0.035, t + 0.1);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      ns.connect(nbp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.7);
      break;
    }

    case "alarm": {
      // Rising-falling sawtooth siren (4 cycles over 2s)
      const siren = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      siren.type = "sawtooth";
      siren.frequency.setValueAtTime(300, t);
      for (let i = 0; i < 4; i++) {
        const ct = t + i * 0.5;
        siren.frequency.linearRampToValueAtTime(800, ct + 0.25);
        siren.frequency.linearRampToValueAtTime(300, ct + 0.5);
      }
      sg.gain.setValueAtTime(0.08, t);
      sg.gain.setValueAtTime(0.08, t + 1.8);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
      siren.connect(sg).connect(dest);
      siren.start(t);
      siren.stop(t + 2.0);
      // Low rumble noise
      const rn = makeNoise(2.0);
      const rng = audioCtx.createGain();
      const rlp = audioCtx.createBiquadFilter();
      rlp.type = "lowpass";
      rlp.frequency.value = 150;
      rng.gain.setValueAtTime(0.06, t);
      rng.gain.exponentialRampToValueAtTime(0.001, t + 2.0);
      rn.connect(rlp).connect(rng).connect(dest);
      rn.start(t);
      rn.stop(t + 2.0);
      break;
    }

    case "bossExplode": {
      // Staggered multi-layered explosions
      for (let i = 0; i < 4; i++) {
        const et = t + i * 0.15;
        const eo = audioCtx.createOscillator();
        const eg = audioCtx.createGain();
        eo.type = "sawtooth";
        eo.frequency.setValueAtTime(120 - i * 20, et);
        eo.frequency.exponentialRampToValueAtTime(30, et + 0.3);
        eg.gain.setValueAtTime(0.1, et);
        eg.gain.exponentialRampToValueAtTime(0.001, et + 0.3);
        eo.connect(eg).connect(dest);
        eo.start(et);
        eo.stop(et + 0.3);
      }
      // Noise burst
      const bn = makeNoise(1.0);
      const bng = audioCtx.createGain();
      const blp = audioCtx.createBiquadFilter();
      blp.type = "lowpass";
      blp.frequency.setValueAtTime(3000, t);
      blp.frequency.exponentialRampToValueAtTime(100, t + 1.0);
      bng.gain.setValueAtTime(0.12, t);
      bng.gain.exponentialRampToValueAtTime(0.001, t + 1.0);
      bn.connect(blp).connect(bng).connect(dest);
      bn.start(t);
      bn.stop(t + 1.0);
      break;
    }
  }
}

// ── Background Music (Synthwave — 3-min evolving arrangement) ────────
let bgMusicPlaying = false;
let bgMusicNodes = null;
let bgMusicScheduler = null;

function startBGMusic() {
  if (bgMusicPlaying) return;
  if (audioCtx.state === "suspended") audioCtx.resume();
  bgMusicPlaying = true;

  // Difficulty scales BPM and percussion intensity
  const diffIntensity = { easy: 0.5, medium: 0.7, difficult: 0.9, insane: 1.1, doomsday: 1.3 };
  const intensity = diffIntensity[difficulty] || 0.7;
  const t0 = audioCtx.currentTime;
  const BPM = Math.round(110 + 30 * intensity); // 125 easy → 149 doomsday
  const beat = 60 / BPM;
  const bar = beat * 4;
  const CYCLE = bar * 96;          // 96 bars = ~3 min

  // Note frequencies
  const N = {
    C2:65.41, D2:73.42, Eb2:77.78, F2:87.31, G2:98.00, Ab2:103.83, Bb2:116.54,
    C3:130.81, D3:146.83, Eb3:155.56, F3:174.61, G3:196.00, Ab3:207.65, Bb3:233.08,
    C4:261.63, D4:293.66, Eb4:311.13, F4:349.23, G4:392.00, Ab4:415.30, Bb4:466.16,
    C5:523.25, Eb5:622.25, G5:783.99,
  };

  // ── Master chain ──
  const master = audioCtx.createGain();
  master.gain.value = 0.13;
  const compressor = audioCtx.createDynamicsCompressor();
  compressor.threshold.value = -18;
  compressor.ratio.value = 4;
  master.connect(compressor).connect(audioCtx.destination);

  // ── Kick drum (noise + sine) ──
  const kickBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.15, audioCtx.sampleRate);
  const kd = kickBuf.getChannelData(0);
  for (let i = 0; i < kd.length; i++) {
    const t = i / audioCtx.sampleRate;
    kd[i] = Math.sin(2 * Math.PI * (160 - 120 * t) * t) * Math.exp(-t * 25) * 0.8
           + (Math.random() * 2 - 1) * Math.exp(-t * 60) * 0.3;
  }

  // ── Snare (noise burst) ──
  const snareBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.1, audioCtx.sampleRate);
  const sd = snareBuf.getChannelData(0);
  for (let i = 0; i < sd.length; i++) {
    const t = i / audioCtx.sampleRate;
    sd[i] = (Math.random() * 2 - 1) * Math.exp(-t * 30) * 0.5
           + Math.sin(2 * Math.PI * 200 * t) * Math.exp(-t * 40) * 0.3;
  }

  // ── Hi-hat ──
  const hatBuf = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.04, audioCtx.sampleRate);
  const hd = hatBuf.getChannelData(0);
  for (let i = 0; i < hd.length; i++) {
    const t = i / audioCtx.sampleRate;
    hd[i] = (Math.random() * 2 - 1) * Math.exp(-t * 80);
  }

  // ── Bass oscillator ──
  const bassOsc = audioCtx.createOscillator();
  bassOsc.type = "sawtooth";
  const bassFilter = audioCtx.createBiquadFilter();
  bassFilter.type = "lowpass"; bassFilter.frequency.value = 120; bassFilter.Q.value = 4;
  const bassGain = audioCtx.createGain();
  bassGain.gain.value = 0;
  bassOsc.connect(bassFilter).connect(bassGain).connect(master);
  bassOsc.start(t0);

  // ── Pad (detuned saws) ──
  const padGain = audioCtx.createGain();
  padGain.gain.value = 0;
  const padFilter = audioCtx.createBiquadFilter();
  padFilter.type = "lowpass"; padFilter.frequency.value = 400; padFilter.Q.value = 1;
  padGain.connect(padFilter).connect(master);
  const padOscs = [];

  // ── Arp oscillator ──
  const arpOsc = audioCtx.createOscillator();
  arpOsc.type = "square";
  const arpFilter = audioCtx.createBiquadFilter();
  arpFilter.type = "lowpass"; arpFilter.frequency.value = 1200;
  const arpGain = audioCtx.createGain();
  arpGain.gain.value = 0;
  arpOsc.connect(arpFilter).connect(arpGain).connect(master);
  arpOsc.start(t0);

  // ── Lead oscillator (for melody in climax) ──
  const leadOsc = audioCtx.createOscillator();
  leadOsc.type = "sawtooth";
  const leadFilter = audioCtx.createBiquadFilter();
  leadFilter.type = "lowpass"; leadFilter.frequency.value = 3000; leadFilter.Q.value = 2;
  const leadGain = audioCtx.createGain();
  leadGain.gain.value = 0;
  const leadDelay = audioCtx.createDelay(0.5);
  leadDelay.delayTime.value = beat * 0.75;
  const leadDelayGain = audioCtx.createGain();
  leadDelayGain.gain.value = 0.3;
  leadOsc.connect(leadFilter).connect(leadGain).connect(master);
  leadGain.connect(leadDelay).connect(leadDelayGain).connect(master);
  leadOsc.start(t0);

  // ── Sub bass (sine) ──
  const subOsc = audioCtx.createOscillator();
  subOsc.type = "sine";
  const subGain = audioCtx.createGain();
  subGain.gain.value = 0;
  subOsc.connect(subGain).connect(master);
  subOsc.start(t0);

  // ── LFO on pad filter ──
  const lfo = audioCtx.createOscillator();
  lfo.type = "sine"; lfo.frequency.value = 0.12;
  const lfoGain = audioCtx.createGain();
  lfoGain.gain.value = 300;
  lfo.connect(lfoGain).connect(padFilter.frequency);
  lfo.start(t0);

  // Percussion gain bus
  const percGain = audioCtx.createGain();
  percGain.gain.value = 1.0;
  const hatHP = audioCtx.createBiquadFilter();
  hatHP.type = "highpass"; hatHP.frequency.value = 7000;
  percGain.connect(master);

  // Track all buffer sources for cleanup
  const allSources = [];

  // ── CHORD PROGRESSIONS (4 sections, each 24 bars) ──
  // Section A (bars 0-23):  Cm      | Ab      | Eb      | Bb
  // Section B (bars 24-47): Cm      | Fm      | Ab      | G
  // Section C (bars 48-71): Ab      | Bb      | Cm      | Cm
  // Section D (bars 72-95): Fm      | G       | Ab → Bb | Cm
  const chords = [
    // Section A — intro/build (24 bars, 6 repetitions of 4-bar prog)
    ...Array(6).fill([
      { bass: N.C2,  pad: [N.C3, N.Eb3, N.G3],  bars: 1 },
      { bass: N.Ab2, pad: [N.Ab3, N.C4, N.Eb4], bars: 1 },
      { bass: N.Eb2, pad: [N.Eb3, N.G3, N.Bb3], bars: 1 },
      { bass: N.Bb2, pad: [N.Bb3, N.D4, N.F4],  bars: 1 },
    ]).flat(),
    // Section B — development (24 bars)
    ...Array(6).fill([
      { bass: N.C2,  pad: [N.C3, N.Eb3, N.G3],  bars: 1 },
      { bass: N.F2,  pad: [N.F3, N.Ab3, N.C4],  bars: 1 },
      { bass: N.Ab2, pad: [N.Ab3, N.C4, N.Eb4], bars: 1 },
      { bass: N.G2,  pad: [N.G3, N.Bb3, N.D4],  bars: 1 },
    ]).flat(),
    // Section C — climax (24 bars)
    ...Array(6).fill([
      { bass: N.Ab2, pad: [N.Ab3, N.C4, N.Eb4], bars: 1 },
      { bass: N.Bb2, pad: [N.Bb3, N.D4, N.F4],  bars: 1 },
      { bass: N.C2,  pad: [N.C3, N.Eb3, N.G3],  bars: 1 },
      { bass: N.C2,  pad: [N.C3, N.Eb3, N.G3],  bars: 1 },
    ]).flat(),
    // Section D — resolution/outro (24 bars)
    ...Array(6).fill([
      { bass: N.F2,  pad: [N.F3, N.Ab3, N.C4],  bars: 1 },
      { bass: N.G2,  pad: [N.G3, N.Bb3, N.D4],  bars: 1 },
      { bass: N.Ab2, pad: [N.Ab3, N.C4, N.Eb4], bars: 1 },
      { bass: N.C2,  pad: [N.C3, N.Eb3, N.G3],  bars: 1 },
    ]).flat(),
  ];

  // ── Arp patterns per section ──
  const arpA = [N.C4, N.Eb4, N.G4, N.C5, N.G4, N.Eb4, N.C4, N.G3];
  const arpB = [N.C4, N.F4, N.Ab4, N.C5, N.Ab4, N.F4, N.C4, N.Ab3];
  const arpC = [N.C4, N.Eb4, N.G4, N.Bb4, N.C5, N.Bb4, N.G4, N.Eb4, N.C4, N.G4, N.Eb5, N.C5, N.G4, N.Eb4, N.C4, N.G3];
  const arpD = [N.C4, N.Eb4, N.G4, N.C5, N.Eb5, N.C5, N.G4, N.Eb4];

  // ── Lead melody (only in sections C & D) ──
  // Each entry: [freq, startBeat, durationBeats]
  const melodyC = [
    [N.Eb5,0,2],[N.D4,2,1],[N.C4,3,1],[N.Eb4,4,2],[N.G4,6,2],
    [N.Ab4,8,3],[N.G4,11,1],[N.Eb4,12,2],[N.D4,14,2],
    [N.C4,16,2],[N.Eb4,18,1],[N.G4,19,1],[N.C5,20,3],[N.Bb4,23,1],
    [N.Ab4,24,2],[N.G4,26,2],[N.Eb4,28,2],[N.G4,30,2],
    [N.Ab4,32,3],[N.Bb4,35,1],[N.C5,36,2],[N.Bb4,38,2],
    [N.Ab4,40,2],[N.G4,42,1],[N.Eb4,43,1],[N.C4,44,4],
  ];
  const melodyD = [
    [N.C5,0,2],[N.Bb4,2,1],[N.Ab4,3,1],[N.G4,4,2],[N.Eb4,6,2],
    [N.F4,8,3],[N.G4,11,1],[N.Ab4,12,2],[N.Bb4,14,2],
    [N.C5,16,4],[N.Bb4,20,2],[N.Ab4,22,2],
    [N.G4,24,2],[N.Ab4,26,2],[N.Bb4,28,2],[N.C5,30,2],
    [N.Eb5,32,4],[N.C5,36,2],[N.G4,38,2],
    [N.Ab4,40,2],[N.Bb4,42,2],[N.C5,44,2],[N.G5,46,2],
  ];

  function scheduleOneCycle(cycleStart) {
    // ── Schedule chord changes (bass + pad + sub) ──
    let chordTime = cycleStart;
    for (let ci = 0; ci < chords.length; ci++) {
      const ch = chords[ci];
      const dur = ch.bars * bar;
      bassOsc.frequency.setValueAtTime(ch.bass, chordTime);
      subOsc.frequency.setValueAtTime(ch.bass / 2, chordTime);
      chordTime += dur;
    }

    // Create pad oscillators fresh each cycle (reuse existing or create)
    if (padOscs.length === 0) {
      for (let i = 0; i < 6; i++) { // 3 notes × 2 (detuned)
        const o = audioCtx.createOscillator();
        o.type = "sawtooth";
        o.connect(padGain);
        o.start(cycleStart);
        padOscs.push(o);
      }
    }
    // Schedule pad note changes
    let padTime = cycleStart;
    for (let ci = 0; ci < chords.length; ci++) {
      const ch = chords[ci];
      for (let n = 0; n < 3; n++) {
        padOscs[n * 2].frequency.setValueAtTime(ch.pad[n], padTime);
        padOscs[n * 2].detune.setValueAtTime(-10, padTime);
        padOscs[n * 2 + 1].frequency.setValueAtTime(ch.pad[n], padTime);
        padOscs[n * 2 + 1].detune.setValueAtTime(10, padTime);
      }
      padTime += ch.bars * bar;
    }

    // ── Section-based volume/filter envelopes ──
    const sA = cycleStart;
    const sB = cycleStart + 24 * bar;
    const sC = cycleStart + 48 * bar;
    const sD = cycleStart + 72 * bar;
    const sEnd = cycleStart + 96 * bar;

    // Bass: silent → fade in over A, full in B-C, slight drop D end
    bassGain.gain.setValueAtTime(0, sA);
    bassGain.gain.linearRampToValueAtTime(0.35, sA + 8 * bar);
    bassGain.gain.setValueAtTime(0.35, sB);
    bassGain.gain.linearRampToValueAtTime(0.55, sC);
    bassGain.gain.setValueAtTime(0.55, sC);
    bassGain.gain.setValueAtTime(0.55, sD);
    bassGain.gain.linearRampToValueAtTime(0.35, sD + 20 * bar);
    bassGain.gain.linearRampToValueAtTime(0.1, sEnd);

    // Bass filter opens through sections
    bassFilter.frequency.setValueAtTime(120, sA);
    bassFilter.frequency.linearRampToValueAtTime(200, sB);
    bassFilter.frequency.linearRampToValueAtTime(350, sC);
    bassFilter.frequency.setValueAtTime(350, sD);
    bassFilter.frequency.linearRampToValueAtTime(150, sEnd);

    // Sub bass: only from B onward
    subGain.gain.setValueAtTime(0, sA);
    subGain.gain.setValueAtTime(0, sB);
    subGain.gain.linearRampToValueAtTime(0.25, sB + 4 * bar);
    subGain.gain.setValueAtTime(0.3, sC);
    subGain.gain.setValueAtTime(0.25, sD);
    subGain.gain.linearRampToValueAtTime(0, sD + 22 * bar);

    // Pad: quiet intro → swell → full at climax → fade
    padGain.gain.setValueAtTime(0.05, sA);
    padGain.gain.linearRampToValueAtTime(0.12, sA + 16 * bar);
    padGain.gain.setValueAtTime(0.15, sB);
    padGain.gain.linearRampToValueAtTime(0.22, sC);
    padGain.gain.setValueAtTime(0.22, sC);
    padGain.gain.setValueAtTime(0.18, sD);
    padGain.gain.linearRampToValueAtTime(0.05, sEnd);

    // Pad filter opens dramatically at climax
    padFilter.frequency.setValueAtTime(400, sA);
    padFilter.frequency.linearRampToValueAtTime(800, sB);
    padFilter.frequency.linearRampToValueAtTime(2200, sC);
    padFilter.frequency.setValueAtTime(2200, sC + 12 * bar);
    padFilter.frequency.linearRampToValueAtTime(1200, sD);
    padFilter.frequency.linearRampToValueAtTime(400, sEnd);

    // LFO speed increases toward climax
    lfo.frequency.setValueAtTime(0.08, sA);
    lfo.frequency.linearRampToValueAtTime(0.15, sB);
    lfo.frequency.linearRampToValueAtTime(0.25, sC);
    lfo.frequency.setValueAtTime(0.15, sD);

    // Arp filter opens with intensity
    arpFilter.frequency.setValueAtTime(800, sA);
    arpFilter.frequency.linearRampToValueAtTime(1500, sB);
    arpFilter.frequency.linearRampToValueAtTime(3500, sC);
    arpFilter.frequency.linearRampToValueAtTime(2000, sD);
    arpFilter.frequency.linearRampToValueAtTime(800, sEnd);

    // ── Schedule arps per section ──
    function scheduleArpSection(startTime, numBars, pattern, volume) {
      const stepDur = beat / (pattern.length / 4); // fit pattern in 1 bar
      for (let b = 0; b < numBars; b++) {
        for (let i = 0; i < pattern.length; i++) {
          const nt = startTime + b * bar + i * stepDur;
          arpOsc.frequency.setValueAtTime(pattern[i], nt);
          arpGain.gain.setValueAtTime(volume, nt);
          arpGain.gain.setValueAtTime(volume * 0.08, nt + stepDur * 0.55);
        }
      }
    }
    // A: no arp for first 8 bars, then gentle
    arpGain.gain.setValueAtTime(0, sA);
    scheduleArpSection(sA + 8 * bar, 16, arpA, 0.1);
    // B: fuller arp
    scheduleArpSection(sB, 24, arpB, 0.18);
    // C: fast intense arp (16th notes)
    scheduleArpSection(sC, 24, arpC, 0.22);
    // D: pulling back
    scheduleArpSection(sD, 20, arpD, 0.14);
    // Last 4 bars: arp fades
    arpGain.gain.setValueAtTime(0.14, sD + 20 * bar);
    arpGain.gain.linearRampToValueAtTime(0, sEnd);

    // ── Lead melody (sections C and D only) ──
    function scheduleMelody(startTime, melody) {
      for (const [freq, startBeat, durBeats] of melody) {
        const nt = startTime + startBeat * beat;
        const nd = durBeats * beat;
        leadOsc.frequency.setValueAtTime(freq, nt);
        leadGain.gain.setValueAtTime(0.18, nt);
        leadGain.gain.setValueAtTime(0.18, nt + nd * 0.7);
        leadGain.gain.linearRampToValueAtTime(0.01, nt + nd * 0.95);
      }
    }
    leadGain.gain.setValueAtTime(0, sA);
    leadGain.gain.setValueAtTime(0, sB);
    // Brief lead teaser at end of B
    scheduleMelody(sB + 20 * bar, [[N.Eb4,0,2],[N.G4,2,2],[N.C5,4,4]]);
    scheduleMelody(sC, melodyC);
    scheduleMelody(sD, melodyD);
    leadGain.gain.setValueAtTime(0.01, sD + 48 * beat);
    leadGain.gain.linearRampToValueAtTime(0, sEnd);

    // ── Drums ──
    function playBufAt(buf, time, gain, dest) {
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const g = audioCtx.createGain();
      g.gain.value = gain;
      src.connect(g).connect(dest);
      src.start(time);
      allSources.push(src);
    }

    const pI = intensity; // percussion intensity multiplier

    // Section A: intro — hats from bar 4, kick from bar 8, builds gradually
    for (let b = 2; b < 24; b++) {
      const bVol = Math.min(1, b / 16); // fade in
      for (let s = 0; s < (b < 8 ? 4 : 8); s++) {
        const ht = sA + b * bar + s * beat / (b < 8 ? 1 : 2);
        playBufAt(hatBuf, ht, (s % 2 === 0 ? 0.12 : 0.06) * bVol * pI, hatHP);
        hatHP.connect(percGain);
      }
    }
    for (let b = 8; b < 24; b++) {
      playBufAt(kickBuf, sA + b * bar, 0.45 * pI, percGain);
      playBufAt(kickBuf, sA + b * bar + 2.5 * beat, 0.25 * pI, percGain);
      // Add snare on 2 and 4 from bar 12 onward
      if (b >= 12) {
        playBufAt(snareBuf, sA + b * bar + beat, 0.2 * pI, percGain);
        playBufAt(snareBuf, sA + b * bar + 3 * beat, 0.2 * pI, percGain);
      }
      // Fill at end of section
      if (b === 23) {
        for (let r = 0; r < 6; r++)
          playBufAt(snareBuf, sA + b * bar + 2 * beat + r * beat / 3, (0.15 + r * 0.04) * pI, percGain);
      }
    }

    // Section B: full kit with syncopated kicks, 8th-note hats
    for (let b = 0; b < 24; b++) {
      const bt = sB + b * bar;
      playBufAt(kickBuf, bt, 0.6 * pI, percGain);
      playBufAt(kickBuf, bt + 1.75 * beat, 0.3 * pI, percGain);
      playBufAt(kickBuf, bt + 2.5 * beat, 0.4 * pI, percGain);
      playBufAt(snareBuf, bt + beat, 0.35 * pI, percGain);
      playBufAt(snareBuf, bt + 3 * beat, 0.35 * pI, percGain);
      // Ghost snares on higher difficulties
      if (pI > 0.8) {
        playBufAt(snareBuf, bt + 0.5 * beat, 0.1 * pI, percGain);
        playBufAt(snareBuf, bt + 2 * beat, 0.1 * pI, percGain);
      }
      for (let s = 0; s < 8; s++) {
        playBufAt(hatBuf, bt + s * beat / 2, (s % 2 === 0 ? 0.16 : 0.08) * pI, hatHP);
        hatHP.connect(percGain);
      }
      // Fill every 8 bars
      if (b % 8 === 7) {
        for (let r = 0; r < 8; r++)
          playBufAt(snareBuf, bt + 3 * beat + r * beat / 8, (0.15 + r * 0.03) * pI, percGain);
      }
    }

    // Section C: CLIMAX — heavy kick, 16th hats, snare rolls, max intensity
    for (let b = 0; b < 24; b++) {
      const bt = sC + b * bar;
      // Triple kick pattern
      playBufAt(kickBuf, bt, 0.8 * pI, percGain);
      playBufAt(kickBuf, bt + 1.25 * beat, 0.45 * pI, percGain);
      playBufAt(kickBuf, bt + 2 * beat, 0.35 * pI, percGain);
      playBufAt(kickBuf, bt + 2.75 * beat, 0.55 * pI, percGain);
      // Hard snare on 2 and 4
      playBufAt(snareBuf, bt + beat, 0.5 * pI, percGain);
      playBufAt(snareBuf, bt + 3 * beat, 0.5 * pI, percGain);
      // Extra ghost snares
      playBufAt(snareBuf, bt + 0.5 * beat, 0.15 * pI, percGain);
      playBufAt(snareBuf, bt + 1.5 * beat, 0.12 * pI, percGain);
      playBufAt(snareBuf, bt + 3.5 * beat, 0.15 * pI, percGain);
      // Snare roll every 4 bars
      if (b % 4 === 3) {
        for (let r = 0; r < 12; r++)
          playBufAt(snareBuf, bt + 3 * beat + r * beat / 12, (0.18 + r * 0.025) * pI, percGain);
      }
      // 16th hats with accents
      for (let s = 0; s < 16; s++) {
        const accent = s % 4 === 0 ? 0.2 : s % 2 === 0 ? 0.1 : 0.05;
        playBufAt(hatBuf, bt + s * beat / 4, accent * pI, hatHP);
        hatHP.connect(percGain);
      }
      // Open hat on off-beats for extra drive
      if (pI > 0.8) {
        playBufAt(hatBuf, bt + 0.5 * beat, 0.22 * pI, hatHP);
        playBufAt(hatBuf, bt + 2.5 * beat, 0.22 * pI, hatHP);
        hatHP.connect(percGain);
      }
    }

    // Section D: gradual wind-down with occasional fills
    for (let b = 0; b < 24; b++) {
      const bt = sD + b * bar;
      const decay = Math.max(0.15, 1 - b / 26);
      playBufAt(kickBuf, bt, 0.55 * decay * pI, percGain);
      playBufAt(kickBuf, bt + 2.5 * beat, 0.3 * decay * pI, percGain);
      if (b < 20) {
        playBufAt(snareBuf, bt + beat, 0.3 * decay * pI, percGain);
        playBufAt(snareBuf, bt + 3 * beat, 0.3 * decay * pI, percGain);
      }
      // Hats thin out gradually
      const hatSteps = b < 8 ? 8 : b < 16 ? 4 : 2;
      for (let s = 0; s < hatSteps; s++) {
        playBufAt(hatBuf, bt + s * bar / hatSteps, 0.12 * decay * pI, hatHP);
        hatHP.connect(percGain);
      }
      // Transition fill every 8 bars
      if (b % 8 === 7 && b < 22) {
        for (let r = 0; r < 6; r++)
          playBufAt(snareBuf, bt + 2.5 * beat + r * beat / 4, (0.12 + r * 0.02) * decay * pI, percGain);
      }
    }
  }

  // Schedule first cycle
  scheduleOneCycle(t0);

  // Re-schedule on loop using setInterval
  bgMusicScheduler = setInterval(() => {
    if (!bgMusicPlaying) { clearInterval(bgMusicScheduler); return; }
    const now = audioCtx.currentTime;
    const elapsed = now - t0;
    const nextCycle = Math.ceil(elapsed / CYCLE) * CYCLE + t0;
    if (nextCycle - now < 10) { // schedule ~10s ahead
      scheduleOneCycle(nextCycle);
    }
  }, 5000);

  bgMusicNodes = { master, bassOsc, subOsc, padOscs, arpOsc, leadOsc, lfo, percGain, allSources, compressor, hatHP, leadDelay, leadDelayGain };
}

function stopBGMusic() {
  if (!bgMusicPlaying || !bgMusicNodes) return;
  bgMusicPlaying = false;
  if (bgMusicScheduler) { clearInterval(bgMusicScheduler); bgMusicScheduler = null; }
  const t = audioCtx.currentTime;
  bgMusicNodes.master.gain.setValueAtTime(bgMusicNodes.master.gain.value, t);
  bgMusicNodes.master.gain.linearRampToValueAtTime(0, t + 0.8);
  setTimeout(() => {
    try {
      bgMusicNodes.bassOsc.stop();
      bgMusicNodes.subOsc.stop();
      bgMusicNodes.arpOsc.stop();
      bgMusicNodes.leadOsc.stop();
      bgMusicNodes.lfo.stop();
      for (const o of bgMusicNodes.padOscs) o.stop();
      for (const s of bgMusicNodes.allSources) try { s.stop(); } catch(e) {}
    } catch(e) {}
    bgMusicNodes = null;
  }, 900);
}
