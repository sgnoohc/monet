// ── Gameplay ─────────────────────────────────────────────────────────
let tabDebounce = false;
let shiftDebounce = false;

function updateGame() {
  if (gameState !== "playing") return;

  // Level transition interstitial — only tick the timer, skip gameplay
  if (levelTransitionTimer > 0) {
    levelTransitionTimer--;
    if (levelTransitionTimer === 0) {
      aliens = makeAlienGrid(DIFFICULTIES[difficulty].shootChance, level);
      totalAliens = aliens.length;
      alienMoveTimer = 0;
      alienDir = 1;
      bossPhase = false;
      mothership = null;
      bossTransitionTimer = -1;
      bossDeathTimer = -1;
      bossMinions = [];
      projectiles = [];
      asteroids = [];
      asteroidTimer = 0;
      const bunkY = FIELD_Y + FIELD_H - 60;
      const spacing = FIELD_W / 5;
      bunkers = [
        new Bunker(FIELD_X + spacing * 1 - 24, bunkY),
        new Bunker(FIELD_X + spacing * 2 - 24, bunkY),
        new Bunker(FIELD_X + spacing * 3 - 24, bunkY),
        new Bunker(FIELD_X + spacing * 4 - 24, bunkY),
      ];
    }
    return;
  }

  player.update();

  // ── Weapon cycling (Tab) ──
  const tabPressed = keys["Tab"];
  if (tabPressed && !tabDebounce) {
    const ammos = [railAmmo, bombAmmo, healAmmo, slowAmmo, cloneAmmo, homingAmmo];
    // Try to find next weapon with ammo
    let found = false;
    for (let i = 1; i <= ammos.length; i++) {
      const idx = (selectedWeapon + i) % ammos.length;
      if (ammos[idx] > 0) { selectedWeapon = idx; found = true; break; }
    }
    if (!found) selectedWeapon = (selectedWeapon + 1) % ammos.length;
    playSound("menuSelect");
  }
  tabDebounce = tabPressed;

  // ── Special weapon fire (Shift) ──
  const shiftPressed = keys["ShiftLeft"] || keys["ShiftRight"];
  if (shiftPressed && !shiftDebounce) {
    const wType = WEAPON_TYPES[selectedWeapon];
    if (wType === "rail" && railAmmo > 0 && player.cooldown <= 0) {
      railAmmo--;
      player.cooldown = PLAYER_SHOOT_COOLDOWN;
      // Collect all beam X positions (player + clones)
      const beamXs = [player.x + player.w / 2];
      if (cloneTimer > 0) {
        for (const ox of [-36, 36]) {
          beamXs.push(Math.max(FIELD_X, Math.min(FIELD_X + FIELD_W - player.w, player.x + ox)) + player.w / 2);
        }
      }
      playSound("railgun");
      const beamHalf = 24;
      for (const beamX of beamXs) {
        explosions.push(new RailBeam(beamX));
        for (const a of aliens) {
          if (!a.alive) continue;
          const aCx = a.x + a.w / 2;
          if (Math.abs(aCx - beamX) < beamHalf + a.w / 2) {
            a.alive = false;
            score += a.points;
            explosions.push(new Explosion(a.x + a.w / 2, a.y + a.h / 2));
          }
        }
        // Rail beam vs boss minions
        for (const m of bossMinions) {
          if (!m.alive) continue;
          const mCx = m.x + m.w / 2;
          if (Math.abs(mCx - beamX) < beamHalf + m.w / 2) {
            m.alive = false;
            score += m.points;
            explosions.push(new Explosion(m.x + m.w / 2, m.y + m.h / 2));
          }
        }
        // Rail beam vs mothership
        if (bossPhase && mothership && mothership.alive) {
          const mCx = mothership.x + mothership.w / 2;
          if (Math.abs(mCx - beamX) < beamHalf + mothership.w / 2) {
            const dead = mothership.takeHit(24);
            explosions.push(new Explosion(mCx, mothership.y + mothership.h / 2));
            if (dead) handleBossDeath();
          }
        }
      }
    } else if (wType === "bomb" && bombAmmo > 0 && player.cooldown <= 0) {
      bombAmmo--;
      player.cooldown = PLAYER_SHOOT_COOLDOWN;
      const bx = player.x + player.w / 2;
      const by = player.y - 4;
      projectiles.push(new Torpedo(bx, by));
      // Clone wingmen fire torpedoes too
      if (cloneTimer > 0) {
        for (const ox of [-36, 36]) {
          const cx = Math.max(FIELD_X, Math.min(FIELD_X + FIELD_W - player.w, player.x + ox)) + player.w / 2;
          projectiles.push(new Torpedo(cx, player.y));
        }
      }
      playSound("shoot");
    } else if (wType === "heal" && healAmmo > 0) {
      healAmmo--;
      for (const b of bunkers) {
        b.heal(0.4);
      }
      bunkerHealFlash = 15;
      playSound("heal");
    } else if (wType === "slow" && slowAmmo > 0) {
      slowAmmo--;
      slowTimer += 210;
      playSound("slowmo");
    } else if (wType === "clone" && cloneAmmo > 0) {
      cloneAmmo--;
      cloneTimer += Math.round(FPS * 10); // +10 seconds, stacks
      playSound("powerup");
    } else if (wType === "homing" && homingAmmo > 0 && player.cooldown <= 0) {
      homingAmmo--;
      player.cooldown = PLAYER_SHOOT_COOLDOWN;
      projectiles.push(new HomingMissile(player.x + player.w / 2, player.y - 4));
      if (cloneTimer > 0) {
        for (const ox of [-36, 36]) {
          const cx = Math.max(FIELD_X, Math.min(FIELD_X + FIELD_W - player.w, player.x + ox)) + player.w / 2;
          projectiles.push(new HomingMissile(cx, player.y));
        }
      }
      playSound("shoot");
    }
    // Auto-switch to a weapon that has ammo if current is empty
    const curAmmos = [railAmmo, bombAmmo, healAmmo, slowAmmo, cloneAmmo, homingAmmo];
    if (curAmmos[selectedWeapon] <= 0) {
      for (let i = 0; i < curAmmos.length; i++) {
        if (curAmmos[i] > 0) { selectedWeapon = i; break; }
      }
    }
  }
  shiftDebounce = shiftPressed;

  // ── Debug controls ──
  if (debugMode) {
    const dk = debugKeyDebounce;
    if (keys["Digit1"] && !dk.d1) { railAmmo += 3; selectedWeapon = 0; playSound("powerup"); }
    dk.d1 = !!keys["Digit1"];
    if (keys["Digit2"] && !dk.d2) { bombAmmo += 3; selectedWeapon = 1; playSound("powerup"); }
    dk.d2 = !!keys["Digit2"];
    if (keys["Digit3"] && !dk.d3) { healAmmo += 3; selectedWeapon = 2; playSound("powerup"); }
    dk.d3 = !!keys["Digit3"];
    if (keys["Digit4"] && !dk.d4) { slowAmmo += 3; selectedWeapon = 3; playSound("powerup"); }
    dk.d4 = !!keys["Digit4"];
    if (keys["Digit5"] && !dk.d5) { railAmmo += 3; bombAmmo += 3; healAmmo += 3; slowAmmo += 3; cloneAmmo += 3; homingAmmo += 3; playSound("powerup"); }
    dk.d5 = !!keys["Digit5"];
    if (keys["Digit0"] && !dk.d0 && difficulty !== "easy") {
      const randomType = WEAPON_TYPES[Math.floor(Math.random() * WEAPON_TYPES.length)];
      powerUps.push(new PowerUp(randomType));
      playSound("powerup");
    }
    dk.d0 = !!keys["Digit0"];
    if (keys["KeyI"] && !dk.i) { debugInvincible = !debugInvincible; playSound("menuSelect"); }
    dk.i = !!keys["KeyI"];
    if (keys["KeyK"] && !dk.k) {
      for (const a of aliens) {
        if (a.alive) { a.alive = false; score += a.points; explosions.push(new Explosion(a.x + a.w / 2, a.y + a.h / 2)); }
      }
      playSound("explode");
    }
    dk.k = !!keys["KeyK"];
    if (keys["KeyN"] && !dk.n) {
      const alive = aliens.filter(a => a.alive);
      const killCount = Math.floor(alive.length / 2);
      for (let i = 0; i < killCount; i++) {
        alive[i].alive = false;
        score += alive[i].points;
        explosions.push(new Explosion(alive[i].x + alive[i].w / 2, alive[i].y + alive[i].h / 2));
      }
      playSound("explode");
    }
    dk.n = !!keys["KeyN"];
    if (keys["KeyB"] && !dk.b) {
      if (bossPhase && mothership && mothership.alive) {
        mothership.hp = 0;
        mothership.alive = false;
        handleBossDeath();
        playSound("explode");
      }
    }
    dk.b = !!keys["KeyB"];
  }

  // ── Normal fire (Space) ──
  if (keys["Space"]) {
    const p = player.shoot();
    if (p) {
      projectiles.push(p);
      playSound("shoot");
      // Clone wingmen fire too
      if (cloneTimer > 0) {
        for (const ox of [-36, 36]) {
          const cx = Math.max(FIELD_X, Math.min(FIELD_X + FIELD_W - player.w, player.x + ox)) + player.w / 2 - 1;
          projectiles.push(new Projectile(cx, player.y, -1));
        }
      }
    }
  }

  // power-up spawning (disabled on easy)
  if (difficulty !== "easy") {
    powerUpTimer++;
    if (powerUpTimer >= powerUpInterval) {
      const randomType = Math.random() < 0.02 ? "life" : WEAPON_TYPES[Math.floor(Math.random() * WEAPON_TYPES.length)];
      powerUps.push(new PowerUp(randomType));
      powerUpTimer = 0;
      const pui2 = POWERUP_INTERVAL[difficulty];
      powerUpInterval = pui2 ? pui2.base + Math.floor(Math.random() * pui2.rand) : Infinity;
    }
    for (const pu of powerUps) pu.update();
    powerUps = powerUps.filter(pu => pu.alive);
  }

  // alien movement — speed up as aliens are destroyed
  const frozen = slowTimer > 0;
  alienMoveTimer++;
  const alive = aliens.filter(a => a.alive);
  const ratio = alive.length / totalAliens;
  const moveInterval = Math.max(1, Math.round(baseMoveInterval * ratio * ratio));
  const speed = Math.min(5, Math.max(2, Math.round(2 / (ratio * ratio + 0.04))));
  if (!frozen && alienMoveTimer >= moveInterval && alive.length > 0) {
    alienMoveTimer = 0;
    let reverse = false;
    for (const a of alive) {
      const nx = a.x + alienDir * speed;
      if (nx <= FIELD_X || nx >= FIELD_X + FIELD_W - a.w) {
        reverse = true;
        break;
      }
    }
    if (reverse) {
      alienDir *= -1;
      for (const a of alive) a.y += 16;
    } else {
      for (const a of alive) a.x += alienDir * speed;
    }
  }

  // aliens reached bottom?
  for (const a of alive) {
    if (a.y + a.h >= FIELD_Y + FIELD_H) {
      if (!debugInvincible) {
        if (invulnTimer <= 0) {
          lives--;
          invulnTimer = 60;
          playSound("playerDeath");
          if (lives <= 0) { gameState = "lost"; return; }
        }
        break;
      }
    }
  }

  // random alien shoot (suppressed while frozen)
  if (!frozen && alive.length > 0) {
    const shooter = alive[Math.floor(Math.random() * alive.length)];
    const ap = shooter.tryShoot();
    if (ap) projectiles.push(ap);
  }

  // update projectiles
  for (const p of projectiles) p.update();

  // Torpedo dies silently if it reaches top of field without hitting anything
  for (const p of projectiles) {
    if (p.isTorpedo && p.alive && p.y <= FIELD_Y) {
      p.alive = false;
    }
  }

  projectiles = projectiles.filter(p => p.alive);

  // update explosions
  for (const e of explosions) e.update();
  explosions = explosions.filter(e => e.alive);

  // collision: player projectiles -> aliens
  const remaining = [];
  for (const p of projectiles) {
    let hit = false;
    if (p.dir === -1) {
      // Check power-ups (not for torpedoes/homing)
      if (!p.isTorpedo && !p.isHoming) {
        for (const pu of powerUps) {
          if (pu.alive && rectCollide(p.x, p.y, p.w, p.h, pu.x, pu.y, pu.w, pu.h)) {
            if (pu.type === "life") {
              lives = Math.min(5, lives + 1);
            } else {
              const hadAny = railAmmo + bombAmmo + healAmmo + slowAmmo + cloneAmmo + homingAmmo > 0;
              switch (pu.type) {
                case "rail": railAmmo++; break;
                case "bomb": bombAmmo++; break;
                case "heal": healAmmo++; break;
                case "slow": slowAmmo++; break;
                case "clone": cloneAmmo++; break;
                case "homing": homingAmmo++; break;
              }
              if (!hadAny) selectedWeapon = WEAPON_TYPES.indexOf(pu.type);
            }
            explosions.push(new Explosion(pu.x + pu.w / 2, pu.y + pu.h / 2));
            pu.alive = false;
            playSound("powerup");
            hit = true;
            break;
          }
        }
      }
      // Check aliens
      if (!hit) for (const a of alive) {
        if (a.alive && rectCollide(p.x, p.y, p.w, p.h, a.x, a.y, a.w, a.h)) {
          if (p.isTorpedo) {
            triggerBombExplosion(a.x + a.w / 2, a.y + a.h / 2);
            hit = true;
            break;
          } else if (p.isHoming) {
            a.alive = false;
            score += a.points;
            explosions.push(new Explosion(a.x + a.w / 2, a.y + a.h / 2));
            playSound("explode");
            hit = true;
            break;
          } else {
            const dead = a.takeHit();
            explosions.push(new Explosion(p.x, p.y));
            playSound(dead ? "explode" : "hit");
            if (dead) score += a.points;
            hit = true;
            break;
          }
        }
      }
      // Check mothership
      if (!hit && bossPhase && mothership && mothership.alive) {
        if (rectCollide(p.x, p.y, p.w, p.h, mothership.x, mothership.y, mothership.w, mothership.h)) {
          if (p.isTorpedo) {
            const bcx = mothership.x + mothership.w / 2;
            const bcy = mothership.y + mothership.h / 2;
            explosions.push(new BombExplosion(bcx, bcy));
            playSound("torpedoBlast");
            const dead = mothership.takeHit(15);
            if (dead) handleBossDeath();
            hit = true;
          } else if (p.isHoming) {
            explosions.push(new Explosion(p.x, p.y));
            playSound("hit");
            const dead = mothership.takeHit(5);
            if (dead) handleBossDeath();
            hit = true;
          } else {
            const dead = mothership.takeHit(1);
            explosions.push(new Explosion(p.x, p.y));
            playSound(dead ? "explode" : "hit");
            if (dead) handleBossDeath();
            hit = true;
          }
        }
      }
      // Check boss minions
      if (!hit) {
        for (const m of bossMinions) {
          if (m.alive && rectCollide(p.x, p.y, p.w, p.h, m.x, m.y, m.w, m.h)) {
            const dead = m.takeHit();
            explosions.push(new Explosion(p.x, p.y));
            playSound(dead ? "explode" : "hit");
            if (dead) score += m.points;
            hit = true;
            break;
          }
        }
      }
      // Check asteroids
      if (!hit) {
        for (const ast of asteroids) {
          if (!ast.alive) continue;
          const dx = (p.x + p.w / 2) - ast.x;
          const dy = (p.y + p.h / 2) - ast.y;
          if (Math.sqrt(dx * dx + dy * dy) < ast.radius) {
            const dead = ast.takeHit();
            explosions.push(new Explosion(p.x, p.y));
            playSound(dead ? "explode" : "hit");
            if (dead) score += 75;
            hit = true;
            break;
          }
        }
      }
    } else {
      // alien projectile -> player
      if (rectCollide(p.x, p.y, p.w, p.h, player.x, player.y, player.w, player.h)) {
        if (debugInvincible) {
          hit = true;
        } else if (invulnTimer > 0) {
          hit = true;
        } else {
          lives--;
          invulnTimer = 60;
          explosions.push(new Explosion(player.x + player.w / 2, player.y + player.h / 2));
          playSound("playerDeath");
          if (lives <= 0) { gameState = "lost"; }
          hit = true;
        }
      }
      // alien projectile -> bunkers
      if (!hit) {
        for (const b of bunkers) {
          if (!b.isDestroyed && rectCollide(p.x, p.y, p.w, p.h, b.x, b.y, b.w, b.h)) {
            const radius = p.isBomb ? BOMB_BLAST_RADIUS : LASER_BLAST_RADIUS;
            if (b.damageAt(p.x, p.y, radius)) {
              explosions.push(new Explosion(p.x, p.y));
              playSound("hit");
              hit = true;
              break;
            }
          }
        }
      }
    }
    if (!hit) remaining.push(p);
  }
  projectiles = remaining;

  // ── Boss transition & fight ──
  const allAliensDead = aliens.filter(a => a.alive).length === 0;

  if (allAliensDead && !bossPhase && bossTransitionTimer < 0 && bossDeathTimer < 0) {
    // Start alarm/warning phase
    playSound("alarm");
    bossTransitionTimer = 60; // 2s at 30fps
    projectiles = [];
    powerUps = [];
  }

  if (bossTransitionTimer > 0) {
    bossTransitionTimer--;
    if (bossTransitionTimer === 0) {
      bossPhase = true;
      mothership = new Mothership(difficulty, level);
    }
  }

  // Boss update
  if (bossPhase && mothership && mothership.alive) {
    const bossProjs = mothership.update();
    for (const p of bossProjs) projectiles.push(p);
    // Spawn minions (suppressed while frozen)
    if (!frozen) {
      mothership.spawnTimer++;
      if (mothership.spawnTimer >= mothership.spawnInterval) {
        mothership.spawnTimer = 0;
        const mx = mothership.x + mothership.w / 2 + (Math.random() - 0.5) * mothership.w * 0.6;
        const my = mothership.y + mothership.h;
        bossMinions.push(new BossMinion(mx, my, mothership.shootChance));
      }
    }
  }
  // Update boss minions (frozen = no move/shoot)
  if (!frozen) {
    for (const m of bossMinions) {
      m.update();
      const mp = m.tryShoot();
      if (mp) projectiles.push(mp);
    }
  }
  bossMinions = bossMinions.filter(m => m.alive);

  // Boss death timer
  if (bossDeathTimer > 0) {
    bossDeathTimer--;
    if (bossDeathTimer === 0) {
      score += mothership.maxHp * 10;
      if (level >= 5) {
        playSound("win");
        gameState = "won";
      } else {
        level++;
        levelTransitionTimer = 90; // ~2s interstitial
      }
    }
  }

  // Win condition (only if no boss fight pending and no level transition)
  if (allAliensDead && !bossPhase && bossTransitionTimer < 0 && bossDeathTimer < 0 && levelTransitionTimer < 0 && !mothership) {
    playSound("win");
    gameState = "won";
  }

  // Asteroid spawning & update
  asteroidTimer++;
  if (asteroidTimer >= 180 + Math.floor(Math.random() * 200)) {
    asteroidTimer = 0;
    asteroids.push(new Asteroid());
  }
  for (const ast of asteroids) ast.update();
  // Asteroid collision with player
  for (const ast of asteroids) {
    if (!ast.alive) continue;
    const dx = (ast.x) - (player.x + player.w / 2);
    const dy = (ast.y) - (player.y + player.h / 2);
    if (Math.sqrt(dx * dx + dy * dy) < ast.radius + 10) {
      if (!debugInvincible && invulnTimer <= 0) {
        lives--;
        invulnTimer = 60;
        explosions.push(new Explosion(player.x + player.w / 2, player.y + player.h / 2));
        playSound("playerDeath");
        if (lives <= 0) { gameState = "lost"; return; }
      }
    }
    // Asteroid collision with bunkers
    for (const b of bunkers) {
      if (!b.isDestroyed) {
        const bCx = b.x + b.w / 2, bCy = b.y + b.h / 2;
        const bdx = ast.x - bCx, bdy = ast.y - bCy;
        if (Math.sqrt(bdx * bdx + bdy * bdy) < ast.radius + 20) {
          b.damageAt(ast.x, ast.y, ast.radius);
          ast.alive = false;
          explosions.push(new Explosion(ast.x, ast.y));
          playSound("explode");
        }
      }
    }
  }
  asteroids = asteroids.filter(a => a.alive);

  // decrement timers
  if (slowTimer > 0) slowTimer--;
  if (bunkerHealFlash > 0) bunkerHealFlash--;
  if (invulnTimer > 0) invulnTimer--;
  if (cloneTimer > 0) cloneTimer--;
}

function drawWeaponIcon(type, cx, cy, color, scale) {
  const s = scale || 1;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(s, s);
  ctx.translate(-cx, -cy);
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 1.5;
  ctx.lineCap = "round";
  if (type === "rail") {
    // Vertical beam with glow
    ctx.beginPath();
    ctx.moveTo(cx, cy - 5);
    ctx.lineTo(cx, cy + 5);
    ctx.stroke();
    ctx.lineWidth = 3;
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.moveTo(cx, cy - 5);
    ctx.lineTo(cx, cy + 5);
    ctx.stroke();
    ctx.globalAlpha = 1;
  } else if (type === "bomb") {
    // Missile/rocket pointing up
    ctx.beginPath();
    ctx.moveTo(cx, cy - 5);
    ctx.lineTo(cx - 2.5, cy + 1);
    ctx.lineTo(cx + 2.5, cy + 1);
    ctx.closePath();
    ctx.fill();
    ctx.fillRect(cx - 2, cy + 1, 4, 3);
    // Fins
    ctx.beginPath();
    ctx.moveTo(cx - 2, cy + 4);
    ctx.lineTo(cx - 4, cy + 5);
    ctx.lineTo(cx - 2, cy + 2);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + 2, cy + 4);
    ctx.lineTo(cx + 4, cy + 5);
    ctx.lineTo(cx + 2, cy + 2);
    ctx.fill();
  } else if (type === "heal") {
    // Plus/cross
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - 4, cy);
    ctx.lineTo(cx + 4, cy);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy - 4);
    ctx.lineTo(cx, cy + 4);
    ctx.stroke();
  } else if (type === "slow") {
    // Clock circle with hands
    ctx.beginPath();
    ctx.arc(cx, cy, 4.5, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx, cy - 3);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(cx + 2.5, cy + 1);
    ctx.stroke();
  } else if (type === "clone") {
    // Two small ship silhouettes side by side
    for (const ox of [-3.5, 3.5]) {
      ctx.beginPath();
      ctx.moveTo(cx + ox, cy - 4);
      ctx.lineTo(cx + ox + 2.5, cy + 3);
      ctx.lineTo(cx + ox, cy + 1);
      ctx.lineTo(cx + ox - 2.5, cy + 3);
      ctx.closePath();
      ctx.fill();
    }
  } else if (type === "homing") {
    // Crosshair/target reticle
    ctx.beginPath();
    ctx.arc(cx, cy, 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx, cy - 5); ctx.lineTo(cx, cy - 2);
    ctx.moveTo(cx, cy + 2); ctx.lineTo(cx, cy + 5);
    ctx.moveTo(cx - 5, cy); ctx.lineTo(cx - 2, cy);
    ctx.moveTo(cx + 2, cy); ctx.lineTo(cx + 5, cy);
    ctx.stroke();
  }
  ctx.restore();
}

function drawWeaponBar() {
  const weapons = [
    { type: "rail", color: "#00ccff", ammo: railAmmo },
    { type: "bomb", color: "#ff6600", ammo: bombAmmo },
    { type: "heal", color: "#00ff66", ammo: healAmmo },
    { type: "slow", color: "#9944ff", ammo: slowAmmo },
    { type: "clone", color: "#ffcc00", ammo: cloneAmmo },
    { type: "homing", color: "#ff44aa", ammo: homingAmmo },
  ];

  const iconSpacing = 12;
  const maxRepeat = 5;
  const padL = 4, padR = 4;
  const slotW = padL + maxRepeat * iconSpacing + padR;
  const slotH = 20, gap = 4;
  const totalW = weapons.length * slotW + (weapons.length - 1) * gap;
  const startX = W / 2 - totalW / 2;
  const y = FIELD_Y + FIELD_H + 4;
  const allEmpty = railAmmo + bombAmmo + healAmmo + slowAmmo + cloneAmmo + homingAmmo <= 0;

  for (let i = 0; i < weapons.length; i++) {
    const w = weapons[i];
    const x = startX + i * (slotW + gap);
    const isSelected = i === selectedWeapon;

    // Background
    ctx.fillStyle = allEmpty ? "rgba(0,0,0,0.6)" : (isSelected ? "rgba(255,255,255,0.15)" : "rgba(0,0,0,0.6)");
    ctx.fillRect(x, y, slotW, slotH);

    // Border
    if (allEmpty) {
      ctx.strokeStyle = "#333";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, slotW, slotH);
    } else if (isSelected) {
      ctx.save();
      ctx.shadowColor = w.color;
      ctx.shadowBlur = 8;
      ctx.strokeStyle = w.color;
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, slotW, slotH);
      ctx.restore();
    } else {
      ctx.strokeStyle = w.ammo > 0 ? "#555" : "#333";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, slotW, slotH);
    }

    // Ammo display: repeat icons up to 5, then show icon ×N
    const iconColor = allEmpty ? "#333" : (w.ammo > 0 ? (isSelected ? w.color : "#aaa") : "#555");
    const iconCy = y + slotH / 2;
    if (w.ammo <= maxRepeat) {
      for (let n = 0; n < w.ammo; n++) {
        const iconCx = x + padL + 5 + n * iconSpacing;
        drawWeaponIcon(w.type, iconCx, iconCy, iconColor, 0.8);
      }
    } else {
      drawWeaponIcon(w.type, x + padL + 5, iconCy, iconColor, 0.8);
      ctx.fillStyle = iconColor;
      ctx.font = "bold 10px monospace";
      ctx.textAlign = "left";
      ctx.textBaseline = "middle";
      ctx.fillText(`×${w.ammo}`, x + padL + 14, iconCy);
    }
  }
}

function drawGame() {
  // field border
  ctx.strokeStyle = COL.border;
  ctx.lineWidth = 2;
  ctx.strokeRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);

  // bunkers
  for (const b of bunkers) {
    if (!b.isDestroyed) b.draw();
  }

  // bunker heal flash
  if (bunkerHealFlash > 0) {
    const flashAlpha = 0.3 * (bunkerHealFlash / 15);
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = "#00ff66";
    for (const b of bunkers) {
      if (!b.isDestroyed) {
        ctx.fillRect(b.x - 2, b.y - 2, b.w + 4, b.h + 4);
      }
    }
    ctx.globalAlpha = 1;
  }

  // aliens
  for (const a of aliens) {
    if (a.alive) a.draw();
  }

  // mothership boss
  if (mothership) {
    mothership.draw();
  }
  // boss minions
  for (const m of bossMinions) if (m.alive) m.draw();

  // player
  if (gameState === "playing" || gameState === "won") {
    player.draw();
    // Clone wingmen (flanking the player)
    if (cloneTimer > 0) {
      const blinkOut = cloneTimer < FPS * 2 && Math.floor(cloneTimer / 3) % 2 === 0;
      if (!blinkOut) {
        const offsets = [-36, 36]; // left and right of player
        for (const ox of offsets) {
          const cloneX = Math.max(FIELD_X, Math.min(FIELD_X + FIELD_W - player.w, player.x + ox));
          const cloneY = player.y + 4;
          const ccx = cloneX + player.w / 2;
          const cby = cloneY + player.h;
          ctx.save();
          ctx.globalAlpha = 0.7;
          // Engine glow
          ctx.fillStyle = "rgba(255,200,0,0.4)";
          ctx.beginPath();
          ctx.arc(ccx, cby, 6, 0, Math.PI * 2);
          ctx.fill();
          // Fuselage
          ctx.fillStyle = "#6e6e1a";
          ctx.beginPath();
          ctx.moveTo(ccx, cloneY);
          ctx.lineTo(ccx + 4, cloneY + 6);
          ctx.lineTo(ccx + 5, cloneY + 14);
          ctx.lineTo(ccx + 3, cby);
          ctx.lineTo(ccx - 3, cby);
          ctx.lineTo(ccx - 5, cloneY + 14);
          ctx.lineTo(ccx - 4, cloneY + 6);
          ctx.closePath();
          ctx.fill();
          // Wings
          ctx.fillStyle = "#4f4f0f";
          ctx.beginPath();
          ctx.moveTo(ccx - 4, cloneY + 8);
          ctx.lineTo(cloneX, cby - 1);
          ctx.lineTo(cloneX + 2, cby);
          ctx.lineTo(ccx - 4, cloneY + 14);
          ctx.closePath();
          ctx.fill();
          ctx.beginPath();
          ctx.moveTo(ccx + 4, cloneY + 8);
          ctx.lineTo(cloneX + player.w, cby - 1);
          ctx.lineTo(cloneX + player.w - 2, cby);
          ctx.lineTo(ccx + 4, cloneY + 14);
          ctx.closePath();
          ctx.fill();
          // Wing tips
          ctx.fillStyle = "#ffcc00";
          ctx.fillRect(cloneX, cby - 3, 2, 3);
          ctx.fillRect(cloneX + player.w - 2, cby - 3, 2, 3);
          ctx.globalAlpha = 1;
          ctx.restore();
        }
      }
    }
  }

  // power-ups
  for (const pu of powerUps) if (pu.alive) pu.draw();

  // asteroids
  for (const ast of asteroids) if (ast.alive) ast.draw();

  // projectiles
  for (const p of projectiles) p.draw();

  // explosions
  for (const e of explosions) e.draw();

  // slow-mo visual indicator
  if (slowTimer > 0 && gameState === "playing") {
    // Subtle blue tint overlay
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = "#0044ff";
    ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);
    ctx.globalAlpha = 1;

    // Countdown timer text
    const secs = (slowTimer / FPS).toFixed(1);
    drawText(`SLOW: ${secs}s`, W / 2, FIELD_Y + 20, "#9944ff", 16, "center");
  }
  if (cloneTimer > 0) {
    const csecs = (cloneTimer / FPS).toFixed(1);
    drawText(`CLONE: ${csecs}s`, W / 2, FIELD_Y + (slowTimer > 0 ? 38 : 20), "#ffcc00", 16, "center");
  }

  // Boss warning overlay
  if (bossTransitionTimer > 0) {
    const flash = Math.sin(bossTransitionTimer * 0.3) > 0 ? 0.15 : 0.05;
    ctx.globalAlpha = flash;
    ctx.fillStyle = "#ff0000";
    ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);
    ctx.globalAlpha = 1;
    drawText("! WARNING !", W / 2, H / 2 - 20, "#ff0044", 32, "center");
    drawText("MOTHERSHIP INCOMING", W / 2, H / 2 + 15, "#ff3366", 18, "center");
  }

  // Level transition overlay
  if (levelTransitionTimer > 0) {
    ctx.fillStyle = "rgba(0,0,0,0.7)";
    ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);
    drawText(`LEVEL ${level}`, W / 2, H / 2 - 20, "#ffcc00", 32, "center");
    drawText("Incoming...", W / 2, H / 2 + 18, "#aaaaaa", 18, "center");
  }

  // weapon bar
  drawWeaponBar();

  // status bar
  const aliveCount = aliens.filter(a => a.alive).length;
  const diffLabel = DIFFICULTIES[difficulty].label;
  drawText(`SPACE ATTACK  [${diffLabel}] Lv.${level}`, FIELD_X + 5, FIELD_Y - 10, COL.status, 14, "left");
  // Draw lives as mini ship icons
  for (let i = 0; i < lives; i++) {
    const lx = FIELD_X + 230 + i * 14;
    const ly = FIELD_Y - 14;
    ctx.save();
    ctx.fillStyle = "#00ff66";
    ctx.beginPath();
    ctx.moveTo(lx, ly);           // nose
    ctx.lineTo(lx + 3, ly + 4);
    ctx.lineTo(lx + 6, ly + 9);  // right wing
    ctx.lineTo(lx + 2, ly + 7);
    ctx.lineTo(lx + 2, ly + 10); // bottom right
    ctx.lineTo(lx - 2, ly + 10); // bottom left
    ctx.lineTo(lx - 2, ly + 7);
    ctx.lineTo(lx - 6, ly + 9);  // left wing
    ctx.lineTo(lx - 3, ly + 4);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }
  drawText(`Score: ${score}`, FIELD_X + 300, FIELD_Y - 10, COL.status, 14, "left");
  if (bossPhase && mothership) {
    drawText(`BOSS: ${mothership.hp}/${mothership.maxHp}`, FIELD_X + 450, FIELD_Y - 10, "#ff0044", 14, "left");
  } else {
    drawText(`Aliens: ${aliveCount}`, FIELD_X + 450, FIELD_Y - 10, COL.status, 14, "left");
  }
  if (debugMode) {
    let debugLabel = "[DEBUG]";
    if (debugInvincible) debugLabel += " [INV]";
    drawText(debugLabel, FIELD_X + FIELD_W - 5, FIELD_Y - 10, "#cc8800", 11, "right");
  } else {
    drawText("Shift=Special  Tab=Cycle", FIELD_X + 590, FIELD_Y - 10, "#666666", 11, "left");
  }

  // Update mobile special button display
  if (touchActive && gameState !== "won" && gameState !== "lost") {
    const nameEl = document.getElementById('special-name');
    const countEl = document.getElementById('special-count');
    const btn = document.getElementById('btn-special');
    if (nameEl && btn) {
      const ammos = { rail: railAmmo, bomb: bombAmmo, heal: healAmmo, slow: slowAmmo, clone: cloneAmmo, homing: homingAmmo };
      const anyAmmo = railAmmo + bombAmmo + healAmmo + slowAmmo + cloneAmmo + homingAmmo > 0;
      if (anyAmmo) {
        const wType = WEAPON_TYPES[selectedWeapon];
        const curAmmo = ammos[wType];
        nameEl.textContent = WEAPON_NAMES[wType];
        if (countEl) countEl.textContent = curAmmo > 0 ? curAmmo : '0';
        btn.style.borderColor = curAmmo > 0 ? WEAPON_COLORS[wType] : '#555';
        btn.style.color = curAmmo > 0 ? WEAPON_COLORS[wType] : '#555';
        btn.style.opacity = curAmmo > 0 ? '1' : '0.5';
      } else {
        nameEl.textContent = 'SPEC';
        if (countEl) countEl.textContent = '';
        btn.style.borderColor = '#333';
        btn.style.color = '#444';
        btn.style.opacity = '0.4';
      }
    }
  }

  // end-state overlay
  if (gameState === "won" || gameState === "lost") {
    ctx.fillStyle = "rgba(0,0,0,0.75)";
    ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);

    if (showingNameInput) {
      // Name input overlay is on top — just show a minimal message
      const msg1 = gameState === "won" ? "YOU WIN!" : "GAME OVER";
      drawText(msg1, W / 2, H / 2, COL.msg, 36, "center");
    } else if (scoreSubmitted && leaderboardLoaded) {
      // Show leaderboard
      const msg1 = gameState === "won" ? "YOU WIN!" : "GAME OVER";
      const diffLabel = DIFFICULTIES[difficulty].label;
      drawText(msg1, W / 2, FIELD_Y + 30, COL.msg, 30, "center");
      drawText(`Score: ${score}`, W / 2, FIELD_Y + 58, COL.msg, 16, "center");

      // Leaderboard header
      const lbY = FIELD_Y + 85;
      drawText(`── ${diffLabel} LEADERBOARD ──`, W / 2, lbY, "#00cccc", 16, "center");

      // Draw entries
      const lbStartY = lbY + 28;
      if (leaderboardData.length === 0) {
        drawText("No scores yet", W / 2, lbStartY + 20, "#666", 14, "center");
      } else {
        for (let i = 0; i < leaderboardData.length && i < 10; i++) {
          const entry = leaderboardData[i];
          const ey = lbStartY + i * 22;
          const rank = `${i + 1}.`.padStart(3);
          const eName = (entry.name || "???").padEnd(12);
          const eScore = String(entry.score).padStart(7);
          const eLvl = `Lv${entry.level || "?"}`;
          const isMe = playerName && entry.name === playerName && entry.score === score;
          const col = isMe ? "#00ff66" : "#cccccc";
          const marker = isMe ? " ◄" : "";
          drawText(`${rank} ${eName} ${eScore}  ${eLvl}${marker}`, W / 2, ey, col, 14, "center");
        }
      }

      const restartHint = touchActive ? "RETRY = Restart    ESC = Menu" : "R = Restart    M / ESC = Menu";
      drawText(restartHint, W / 2, FIELD_Y + FIELD_H - 20, COL.status, 14, "center");
    } else {
      // Still loading / submitting
      const msg1 = gameState === "won" ? "YOU WIN!" : "GAME OVER";
      drawText(msg1, W / 2, H / 2 - 20, COL.msg, 36, "center");
      drawText(`Score: ${score}`, W / 2, H / 2 + 14, COL.msg, 20, "center");
      if (scoreSubmitted) {
        drawText("Loading leaderboard...", W / 2, H / 2 + 44, "#666", 14, "center");
      }
    }

    // Light up SPEC button as RETRY on mobile
    if (touchActive && !showingNameInput) {
      const btn = document.getElementById('btn-special');
      const nameEl = document.getElementById('special-name');
      const countEl = document.getElementById('special-count');
      if (btn && nameEl) {
        nameEl.textContent = 'RETRY';
        if (countEl) countEl.textContent = '';
        btn.style.borderColor = '#00ff88';
        btn.style.color = '#00ff88';
        btn.style.opacity = '1';
      }
    }
  }
}

// ── Leaderboard viewer (title screen) ────────────────────────────────

function enterLeaderboardView() {
  gameState = "leaderboard";
  lbViewDiff = selectedDiff;
  lbViewData = [];
  lbViewLoaded = false;
  lbViewDebounce = {};
  fetchLeaderboard(DIFF_ORDER[lbViewDiff], 10, (data) => {
    lbViewData = data;
    lbViewLoaded = true;
  });
}

function updateLeaderboardView() {
  const leftPressed = keys["ArrowLeft"] || keys["KeyA"];
  const rightPressed = keys["ArrowRight"] || keys["KeyD"];
  const escPressed = keys["Escape"] || keys["Backspace"];

  if (leftPressed && !lbViewDebounce.left) {
    lbViewDiff = (lbViewDiff - 1 + DIFF_ORDER.length) % DIFF_ORDER.length;
    lbViewLoaded = false;
    lbViewData = [];
    fetchLeaderboard(DIFF_ORDER[lbViewDiff], 10, (data) => {
      lbViewData = data;
      lbViewLoaded = true;
    });
    playSound("menuSelect");
  }
  if (rightPressed && !lbViewDebounce.right) {
    lbViewDiff = (lbViewDiff + 1) % DIFF_ORDER.length;
    lbViewLoaded = false;
    lbViewData = [];
    fetchLeaderboard(DIFF_ORDER[lbViewDiff], 10, (data) => {
      lbViewData = data;
      lbViewLoaded = true;
    });
    playSound("menuSelect");
  }
  if (escPressed && !lbViewDebounce.esc) {
    gameState = "title";
    playSound("menuSelect");
  }

  lbViewDebounce.left = leftPressed;
  lbViewDebounce.right = rightPressed;
  lbViewDebounce.esc = escPressed;
}

function drawLeaderboardView() {
  drawText("LEADERBOARD", W / 2, 60, COL.logo, 36, "center");

  // Difficulty tabs
  const tabY = 110;
  const tabWidth = FIELD_W / DIFF_ORDER.length;
  for (let i = 0; i < DIFF_ORDER.length; i++) {
    const label = DIFFICULTIES[DIFF_ORDER[i]].label;
    const tx = FIELD_X + tabWidth * i + tabWidth / 2;
    const selected = i === lbViewDiff;
    const col = selected ? "#00ff66" : "#666666";
    const sz = selected ? 16 : 13;
    drawText(label, tx, tabY, col, sz, "center");
    if (selected) {
      ctx.fillStyle = "#00ff66";
      ctx.fillRect(tx - tabWidth / 2 + 10, tabY + 12, tabWidth - 20, 2);
    }
  }

  // Separator
  ctx.fillStyle = "#333";
  ctx.fillRect(FIELD_X + 40, tabY + 20, FIELD_W - 80, 1);

  // Entries
  const startY = tabY + 45;
  if (!lbViewLoaded) {
    drawText("Loading...", W / 2, startY + 60, "#666", 16, "center");
  } else if (lbViewData.length === 0) {
    drawText("No scores yet", W / 2, startY + 60, "#666", 16, "center");
    if (!firebaseReady) {
      drawText("(Firebase not configured)", W / 2, startY + 85, "#553300", 12, "center");
    }
  } else {
    // Column headers
    drawText("RANK  NAME           SCORE    LVL", W / 2, startY, "#00cccc", 13, "center");
    for (let i = 0; i < lbViewData.length && i < 10; i++) {
      const entry = lbViewData[i];
      const ey = startY + 28 + i * 26;
      const rank = `${i + 1}.`.padStart(3);
      const eName = (entry.name || "???").padEnd(12);
      const eScore = String(entry.score).padStart(7);
      const eLvl = `Lv${entry.level || "?"}`;
      const isMe = playerName && entry.name === playerName;
      const col = isMe ? "#00ff66" : (i < 3 ? "#ffcc00" : "#cccccc");
      drawText(`${rank}  ${eName} ${eScore}   ${eLvl}`, W / 2, ey, col, 15, "center");
    }
  }

  // Navigation hint
  drawText("◄ ► = Switch Difficulty    ESC = Back", W / 2, H - 40, COL.status, 14, "center");
}

// ── Name entry + leaderboard on game end ─────────────────────────────

function showNameInput() {
  showingNameInput = true;
  scoreSubmitted = false;
  leaderboardLoaded = false;
  leaderboardData = [];
  const overlay = document.getElementById("name-overlay");
  const input = document.getElementById("player-name");
  const scoreLine = document.getElementById("overlay-score");
  if (scoreLine) {
    const diffLabel = DIFFICULTIES[difficulty].label;
    scoreLine.textContent = `${diffLabel} · Level ${level} · Score: ${score}`;
  }
  if (input) {
    input.value = playerName;
  }
  overlay.classList.add("show");
  setTimeout(() => { if (input) input.focus(); }, 100);
}

function hideNameInput() {
  showingNameInput = false;
  document.getElementById("name-overlay").classList.remove("show");
}

function doSubmitScore(skipSubmit) {
  const input = document.getElementById("player-name");
  const name = input ? input.value.trim().toUpperCase() : "";
  if (!skipSubmit && name) {
    playerName = name;
    localStorage.setItem("spaceattack_name", playerName);
    submitScore(name, score, difficulty, level).then(() => {
      scoreSubmitted = true;
      // Fetch updated leaderboard for current difficulty
      fetchLeaderboard(difficulty, 10, (data) => {
        leaderboardData = data;
        leaderboardLoaded = true;
      });
    });
  } else {
    scoreSubmitted = true;
    // Still fetch leaderboard even if skipped
    fetchLeaderboard(difficulty, 10, (data) => {
      leaderboardData = data;
      leaderboardLoaded = true;
    });
  }
  hideNameInput();
}

// Wire up the submit button and skip link
document.getElementById("submit-name").addEventListener("click", () => doSubmitScore(false));
document.getElementById("skip-name").addEventListener("click", () => doSubmitScore(true));
document.getElementById("player-name").addEventListener("keydown", (e) => {
  e.stopPropagation();
  if (e.key === "Enter") doSubmitScore(false);
});
// Prevent game key handler from eating input keystrokes
document.getElementById("player-name").addEventListener("keyup", (e) => e.stopPropagation());

// ── End-state input ──────────────────────────────────────────────────
let endKeyDebounce = {};

function updateEndState() {
  // Don't process game keys while name input is open
  if (showingNameInput) return;

  const rPressed = keys["KeyR"] || (touchActive && keys["ShiftLeft"]);
  const mPressed = keys["KeyM"] || keys["Escape"];

  if (rPressed && !endKeyDebounce.r) {
    scoreSubmitted = false;
    leaderboardLoaded = false;
    leaderboardData = [];
    startGame(difficulty);
  }
  if (mPressed && !endKeyDebounce.m) {
    scoreSubmitted = false;
    leaderboardLoaded = false;
    leaderboardData = [];
    gameState = "title";
  }

  endKeyDebounce.r = rPressed;
  endKeyDebounce.m = mPressed;
}

// ── Escape to menu during gameplay ───────────────────────────────────
let escDebounce = false;
let prevGameState = "title";

// ── Main loop ────────────────────────────────────────────────────────
function gameLoop() {
  gameFrame++;

  // Sync mobile debug bar visibility
  if (touchActive) {
    document.body.classList.toggle('debug-on', debugMode);
    const invBtn = document.getElementById('dbg-inv');
    if (invBtn) invBtn.classList.toggle('active', debugInvincible);
  }

  // Detect transition to won/lost → show name input
  if ((gameState === "won" || gameState === "lost") && prevGameState === "playing") {
    showNameInput();
  }
  prevGameState = gameState;

  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (gameState === "title") {
    if (bgMusicPlaying) stopBGMusic();
    updateTitle();
    drawTitle();
    escDebounce = false;
  } else if (gameState === "leaderboard") {
    if (bgMusicPlaying) stopBGMusic();
    updateLeaderboardView();
    drawLeaderboardView();
    escDebounce = false;
  } else if (gameState === "playing") {
    if (keys["Escape"] && !escDebounce) {
      gameState = "title";
    }
    escDebounce = !!keys["Escape"];

    updateGame();
    drawGame();
  } else {
    // won or lost
    if (bgMusicPlaying) stopBGMusic();
    updateGame();
    drawGame();
    updateEndState();
  }

  requestAnimationFrame(gameLoop);
}

// Throttle to target FPS
let lastFrame = 0;
function throttledLoop(timestamp) {
  const elapsed = timestamp - lastFrame;
  if (elapsed >= 1000 / FPS) {
    lastFrame = timestamp - (elapsed % (1000 / FPS));
    gameLoop();
  } else {
    requestAnimationFrame(throttledLoop);
  }
}

setupMobileControls();
gameLoop();
</script>
