  easy:      { count: 80,  speedMin: 0.1, speedMax: 0.3, brightMin: 0.2, brightMax: 0.5, colors: ["white"] },
  medium:    { count: 120, speedMin: 0.1, speedMax: 0.5, brightMin: 0.3, brightMax: 0.6, colors: ["white"] },
  difficult: { count: 160, speedMin: 0.2, speedMax: 0.7, brightMin: 0.3, brightMax: 0.8, colors: ["white","white","white","cyan","yellow"] },
  insane:    { count: 220, speedMin: 0.3, speedMax: 1.0, brightMin: 0.4, brightMax: 0.9, colors: ["white","cyan","magenta","yellow"] },
  doomsday:  { count: 300, speedMin: 0.5, speedMax: 1.5, brightMin: 0.5, brightMax: 1.0, colors: ["red","orange","magenta"] },
};
const STAR_COLORS_RGB = {
  white: "255,255,255",
  cyan: "0,255,255",
  yellow: "255,255,0",
  magenta: "255,0,255",
  red: "255,80,80",
  orange: "255,160,60",
};

// ── Input ────────────────────────────────────────────────────────────
const keys = {};
window.addEventListener("keydown", e => {
  keys[e.code] = true;
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Space","Tab","ShiftLeft","ShiftRight","Backquote"].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener("keyup", e => { keys[e.code] = false; });

// ── Mobile touch controls ───────────────────────────────────────────
function setupMobileControls() {
  if (!('ontouchstart' in window || navigator.maxTouchPoints > 0)) return;

  touchActive = true;
  document.body.classList.add('mobile');
  fitCanvas();

  document.addEventListener('contextmenu', e => e.preventDefault());

  const allBtns = document.querySelectorAll('.dpad-btn, .action-btn, #btn-esc, #btn-select');
  allBtns.forEach(btn => {
    const key = btn.dataset.key;
    if (!key) return;

    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      keys[key] = true;
      btn.classList.add('pressed');
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }, { passive: false });

    btn.addEventListener('touchend', e => {
      e.preventDefault();
      keys[key] = false;
      btn.classList.remove('pressed');
    }, { passive: false });

    btn.addEventListener('touchcancel', e => {
      keys[key] = false;
      btn.classList.remove('pressed');
    });
  });

  const ctrl = document.getElementById('controls');
  ctrl.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }, { passive: false });

  // Debug bar buttons (one-shot tap actions)
  document.querySelectorAll('.dbg-btn').forEach(btn => {
    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const action = btn.dataset.dbg;
      if (action === "ammo") { railAmmo += 3; bombAmmo += 3; healAmmo += 3; slowAmmo += 3; cloneAmmo += 3; homingAmmo += 3; playSound("powerup"); }
      else if (action === "spawn") {
        const rt = WEAPON_TYPES[Math.floor(Math.random() * WEAPON_TYPES.length)];
        powerUps.push(new PowerUp(rt));
        playSound("powerup");
      }
      else if (action === "inv") { debugInvincible = !debugInvincible; playSound("menuSelect"); }
      else if (action === "kill50" && aliens) {
        const al = aliens.filter(a => a.alive);
        const n = Math.floor(al.length / 2);
        for (let i = 0; i < n; i++) { al[i].alive = false; score += al[i].points; explosions.push(new Explosion(al[i].x + al[i].w / 2, al[i].y + al[i].h / 2)); }
        playSound("explode");
      }
      else if (action === "killall" && aliens) {
        for (const a of aliens) { if (a.alive) { a.alive = false; score += a.points; explosions.push(new Explosion(a.x + a.w / 2, a.y + a.h / 2)); } }
        playSound("explode");
      }
    }, { passive: false });
  });
}

// ── Utility ──────────────────────────────────────────────────────────
function drawText(text, x, y, color, size, align) {
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align || "left";
  ctx.textBaseline = "middle";
  ctx.fillText(text, x, y);
}

function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ── Entity classes ───────────────────────────────────────────────────

class Player {
  constructor() {
    this.w = 30;
    this.h = 20;
    this.x = FIELD_X + (FIELD_W - this.w) / 2;
    this.y = FIELD_Y + FIELD_H - this.h - 5;
    this.cooldown = 0;
    this.alive = true;
  }

  update() {
    if (keys["ArrowLeft"] || keys["KeyA"])  this.x -= PLAYER_SPEED;
    if (keys["ArrowRight"] || keys["KeyD"]) this.x += PLAYER_SPEED;
    this.x = Math.max(FIELD_X, Math.min(FIELD_X + FIELD_W - this.w, this.x));
    if (this.cooldown > 0) this.cooldown--;
  }

  shoot() {
    if (this.cooldown > 0) return null;
    this.cooldown = PLAYER_SHOOT_COOLDOWN;
    return new Projectile(this.x + this.w / 2 - 1, this.y - 4, -1);
  }

  draw() {
    // Flash (skip draw every other 4 frames) while invulnerable
    if (invulnTimer > 0 && Math.floor(invulnTimer / 4) % 2 === 0) return;

    const cx = this.x + this.w / 2;
    const by = this.y + this.h;
    ctx.save();

    // Engine glow
    const glowGrad = ctx.createRadialGradient(cx, by, 0, cx, by, 8);
    glowGrad.addColorStop(0, "rgba(0,200,255,0.6)");
    glowGrad.addColorStop(0.5, "rgba(0,100,255,0.2)");
    glowGrad.addColorStop(1, "rgba(0,50,255,0)");
    ctx.fillStyle = glowGrad;
    ctx.fillRect(cx - 8, by - 2, 16, 10);

    // Engine exhaust flicker
    const flicker = 2 + Math.random() * 3;
    ctx.fillStyle = "rgba(0,200,255,0.8)";
    ctx.beginPath();
    ctx.moveTo(cx - 3, by);
    ctx.lineTo(cx, by + flicker);
    ctx.lineTo(cx + 3, by);
    ctx.closePath();
    ctx.fill();

    // Main fuselage — tapered body
    ctx.fillStyle = "#1a6e1a";
    ctx.beginPath();
    ctx.moveTo(cx, this.y);                      // nose tip
    ctx.lineTo(cx + 4, this.y + 6);
    ctx.lineTo(cx + 5, this.y + 14);
    ctx.lineTo(cx + 3, by);                      // bottom right
    ctx.lineTo(cx - 3, by);                      // bottom left
    ctx.lineTo(cx - 5, this.y + 14);
    ctx.lineTo(cx - 4, this.y + 6);
    ctx.closePath();
    ctx.fill();

    // Wings — swept back
    ctx.fillStyle = "#0f4f0f";
    // Left wing
    ctx.beginPath();
    ctx.moveTo(cx - 4, this.y + 8);
    ctx.lineTo(this.x, by - 1);
    ctx.lineTo(this.x + 2, by);
    ctx.lineTo(cx - 4, this.y + 14);
    ctx.closePath();
    ctx.fill();
    // Right wing
    ctx.beginPath();
    ctx.moveTo(cx + 4, this.y + 8);
    ctx.lineTo(this.x + this.w, by - 1);
    ctx.lineTo(this.x + this.w - 2, by);
    ctx.lineTo(cx + 4, this.y + 14);
    ctx.closePath();
    ctx.fill();

    // Wing tips — accent
    ctx.fillStyle = "#00ff66";
    ctx.fillRect(this.x, by - 3, 2, 3);
    ctx.fillRect(this.x + this.w - 2, by - 3, 2, 3);

    // Cockpit canopy — gradient
    const cpGrad = ctx.createLinearGradient(cx, this.y + 4, cx, this.y + 11);
    cpGrad.addColorStop(0, "#88ffff");
    cpGrad.addColorStop(1, "#004444");
    ctx.fillStyle = cpGrad;
    ctx.beginPath();
    ctx.moveTo(cx, this.y + 3);
    ctx.lineTo(cx + 3, this.y + 8);
    ctx.lineTo(cx, this.y + 11);
    ctx.lineTo(cx - 3, this.y + 8);
    ctx.closePath();
    ctx.fill();

    // Hull panel lines
    ctx.strokeStyle = "rgba(0,255,100,0.2)";
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(cx - 4, this.y + 14);
    ctx.lineTo(cx + 4, this.y + 14);
    ctx.stroke();

    ctx.restore();
  }
}

class Alien {
  constructor(x, y, hp, shootChance, isBomber, variant) {
    this.x = x;
    this.y = y;
    this.w = 28;
    this.h = 22;
    this.hp = hp;
    this.maxHp = hp;
    this.shootChance = shootChance;
    this.isBomber = isBomber;
    this.variant = variant || 0;
    this.alive = true;
    this.points = isBomber ? 150 : 100;
  }

  get color() {
    const ratio = this.hp / this.maxHp;
    if (ratio > 0.6) {
      if (this.isBomber) return COL.bomber;
      return this.variant === 0 ? COL.fighterA : COL.fighterB;
    }
    if (ratio > 0.3) return COL.hpMid;
    return COL.hpLow;
  }

  takeHit() {
    this.hp--;
    if (this.hp <= 0) { this.alive = false; return true; }
    return false;
  }

  tryShoot() {
    if (Math.random() < this.shootChance) {
      const px = this.x + this.w / 2;
      const py = this.y + this.h;
      if (this.isBomber) return new Bomb(px, py);
      return new Projectile(px, py, 1);
    }
    return null;
  }

  draw() {
    const c = this.color;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    ctx.save();

    if (this.isBomber) {
      // Heavy bomber — bulky UFO saucer with dome
      // Main saucer body
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.ellipse(cx, cy + 3, this.w / 2 - 1, 6, 0, 0, Math.PI * 2);
      ctx.fill();

      // Darker hull plating
      ctx.fillStyle = "rgba(0,0,0,0.25)";
      ctx.beginPath();
      ctx.ellipse(cx, cy + 5, this.w / 2 - 3, 3, 0, 0, Math.PI);
      ctx.fill();

      // Top dome
      const domeGrad = ctx.createRadialGradient(cx - 2, cy - 2, 0, cx, cy, 8);
      domeGrad.addColorStop(0, c);
      domeGrad.addColorStop(1, "rgba(0,0,0,0.4)");
      ctx.fillStyle = domeGrad;
      ctx.beginPath();
      ctx.ellipse(cx, cy - 1, 7, 7, 0, Math.PI, 0);
      ctx.fill();

      // Dome glass
      ctx.fillStyle = "rgba(255,255,255,0.3)";
      ctx.beginPath();
      ctx.ellipse(cx - 1, cy - 4, 3, 2, -0.3, 0, Math.PI * 2);
      ctx.fill();

      // Underside lights
      for (let i = -2; i <= 2; i++) {
        const lx = cx + i * 5;
        const pulse = 0.5 + 0.5 * Math.sin(Date.now() * 0.005 + i);
        ctx.fillStyle = `rgba(255,100,255,${0.4 + pulse * 0.5})`;
        ctx.beginPath();
        ctx.arc(lx, cy + 8, 1.2, 0, Math.PI * 2);
        ctx.fill();
      }

      // Side weapon pods
      ctx.fillStyle = c;
      ctx.fillRect(this.x, cy + 1, 4, 5);
      ctx.fillRect(this.x + this.w - 4, cy + 1, 4, 5);

    } else if (this.variant === 0) {
      // Fighter A — insectoid with mandibles
      // Main body
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(cx, this.y + 2);                 // head top
      ctx.quadraticCurveTo(cx + 8, this.y + 4, cx + 6, cy);       // right head curve
      ctx.lineTo(cx + 4, this.y + this.h - 3);    // right body taper
      ctx.lineTo(cx - 4, this.y + this.h - 3);    // left body taper
      ctx.lineTo(cx - 6, cy);                      // left body
      ctx.quadraticCurveTo(cx - 8, this.y + 4, cx, this.y + 2);   // left head curve
      ctx.closePath();
      ctx.fill();

      // Abdomen segment lines
      ctx.strokeStyle = "rgba(0,0,0,0.3)";
      ctx.lineWidth = 0.7;
      for (let s = 0; s < 3; s++) {
        const sy = cy + 1 + s * 3;
        ctx.beginPath();
        ctx.moveTo(cx - 4 + s, sy);
        ctx.lineTo(cx + 4 - s, sy);
        ctx.stroke();
      }

      // Eyes — menacing red glow
      const eyeGlow = ctx.createRadialGradient(cx - 4, this.y + 7, 0, cx - 4, this.y + 7, 3);
      eyeGlow.addColorStop(0, "#ff0000");
      eyeGlow.addColorStop(0.5, "#880000");
      eyeGlow.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = eyeGlow;
      ctx.fillRect(cx - 7, this.y + 4, 6, 6);
      const eyeGlow2 = ctx.createRadialGradient(cx + 4, this.y + 7, 0, cx + 4, this.y + 7, 3);
      eyeGlow2.addColorStop(0, "#ff0000");
      eyeGlow2.addColorStop(0.5, "#880000");
      eyeGlow2.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = eyeGlow2;
      ctx.fillRect(cx + 1, this.y + 4, 6, 6);

      // Eye cores
      ctx.fillStyle = "#ff3333";
      ctx.beginPath();
      ctx.arc(cx - 4, this.y + 7, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + 4, this.y + 7, 1.5, 0, Math.PI * 2);
      ctx.fill();

      // Mandible legs
      ctx.strokeStyle = c;
      ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(cx - 6, cy - 2);
      ctx.lineTo(this.x, cy + 4);
      ctx.lineTo(this.x + 2, this.y + this.h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx + 6, cy - 2);
      ctx.lineTo(this.x + this.w, cy + 4);
      ctx.lineTo(this.x + this.w - 2, this.y + this.h);
      ctx.stroke();

      // Tail stinger
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(cx - 2, this.y + this.h - 3);
      ctx.lineTo(cx, this.y + this.h);
      ctx.lineTo(cx + 2, this.y + this.h - 3);
      ctx.closePath();
      ctx.fill();

    } else {
      // Fighter B — angular stealth craft
      // Main hull
      ctx.fillStyle = c;
      ctx.beginPath();
      ctx.moveTo(cx, this.y + 1);                  // nose
      ctx.lineTo(cx + 5, this.y + 6);
      ctx.lineTo(this.x + this.w - 1, cy + 2);     // right wing tip
      ctx.lineTo(cx + 4, this.y + this.h - 4);
      ctx.lineTo(cx, this.y + this.h - 2);          // tail
      ctx.lineTo(cx - 4, this.y + this.h - 4);
      ctx.lineTo(this.x + 1, cy + 2);               // left wing tip
      ctx.lineTo(cx - 5, this.y + 6);
      ctx.closePath();
      ctx.fill();

      // Hull highlight
      ctx.fillStyle = "rgba(255,255,255,0.12)";
      ctx.beginPath();
      ctx.moveTo(cx, this.y + 1);
      ctx.lineTo(cx + 4, this.y + 7);
      ctx.lineTo(cx, cy + 2);
      ctx.lineTo(cx - 4, this.y + 7);
      ctx.closePath();
      ctx.fill();

      // Panel lines
      ctx.strokeStyle = "rgba(0,0,0,0.3)";
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(cx, this.y + 1);
      ctx.lineTo(cx, this.y + this.h - 2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - 5, this.y + 6);
      ctx.lineTo(cx + 5, this.y + 6);
      ctx.stroke();

      // Eyes — sinister slits
      ctx.fillStyle = "#ff4444";
      ctx.beginPath();
      ctx.moveTo(cx - 6, this.y + 8);
      ctx.lineTo(cx - 2, this.y + 9);
      ctx.lineTo(cx - 6, this.y + 10);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + 6, this.y + 8);
      ctx.lineTo(cx + 2, this.y + 9);
      ctx.lineTo(cx + 6, this.y + 10);
      ctx.closePath();
      ctx.fill();

      // Engine nozzles at tail
      ctx.fillStyle = "rgba(255,150,0,0.5)";
      ctx.beginPath();
      ctx.arc(cx - 2, this.y + this.h - 1, 1.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(cx + 2, this.y + this.h - 1, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.restore();
  }
}

class Projectile {
  constructor(x, y, dir) {
    this.x = x;
    this.y = y;
    this.w = 3;
    this.h = 8;
    this.dir = dir;
    this.alive = true;
    this.isBomb = false;
    this.isTorpedo = false;
  }

  update() {
    const speedMult = (this.dir === 1 && slowTimer > 0) ? 0.1 : 1;
    this.y += this.dir * PROJ_SPEED * speedMult;
    if (this.y < FIELD_Y || this.y > FIELD_Y + FIELD_H) this.alive = false;
  }

  draw() {
    ctx.fillStyle = this.dir === -1 ? COL.projPlayer : COL.projAlien;
    ctx.fillRect(this.x, this.y, this.w, this.h);
  }
}

class Bomb extends Projectile {
  constructor(x, y) {
    super(x, y, 1);
    this.w = 6;
    this.h = 6;
    this.isBomb = true;
  }

  update() {
    const speedMult = slowTimer > 0 ? 0.1 : 1;
    this.y += BOMB_SPEED * speedMult;
    if (this.y > FIELD_Y + FIELD_H) this.alive = false;
  }

  draw() {
    ctx.fillStyle = COL.bomb;
    ctx.beginPath();
    ctx.arc(this.x + 3, this.y + 3, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

class Torpedo {
  constructor(x, y) {
    this.x = x - 4;
    this.y = y;
    this.w = 8;
    this.h = 10;
    this.dir = -1;
    this.alive = true;
    this.isBomb = false;
    this.isTorpedo = true;
    this.startY = y;
  }

  update() {
    this.y -= PROJ_SPEED * 0.7;
  }

  draw() {
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    ctx.save();

    // Engine exhaust glow
    const flicker = 2 + Math.random() * 4;
    ctx.fillStyle = "rgba(255,100,0,0.5)";
    ctx.beginPath();
    ctx.moveTo(cx - 3, this.y + this.h);
    ctx.lineTo(cx, this.y + this.h + flicker);
    ctx.lineTo(cx + 3, this.y + this.h);
    ctx.closePath();
    ctx.fill();

    // Nosecone
    ctx.fillStyle = "#ff6600";
    ctx.beginPath();
    ctx.moveTo(cx, this.y);
    ctx.lineTo(cx - 3.5, this.y + 4);
    ctx.lineTo(cx + 3.5, this.y + 4);
    ctx.closePath();
    ctx.fill();

    // Body
    ctx.fillRect(cx - 3, this.y + 4, 6, 5);

    // Fins
    ctx.beginPath();
    ctx.moveTo(cx - 3, this.y + 9);
    ctx.lineTo(cx - 5.5, this.y + this.h);
    ctx.lineTo(cx - 3, this.y + 7);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cx + 3, this.y + 9);
    ctx.lineTo(cx + 5.5, this.y + this.h);
    ctx.lineTo(cx + 3, this.y + 7);
    ctx.closePath();
    ctx.fill();

    // Aura glow
    ctx.globalAlpha = 0.25;
    ctx.fillStyle = "#ff4400";
    ctx.beginPath();
    ctx.arc(cx, cy, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.restore();
  }
}

class HomingMissile {
  constructor(x, y) {
    this.x = x - 3;
    this.y = y;
    this.w = 6;
    this.h = 8;
    this.dir = -1;
    this.alive = true;
    this.isBomb = false;
    this.isTorpedo = false;
    this.isHoming = true;
    this.vx = 0;
    this.vy = -PROJ_SPEED * 0.6;
    this.speed = PROJ_SPEED * 0.6;
    this.turnRate = 0.08;
    this.trail = [];
  }

  findTarget() {
    // Priority 1: boss
    if (bossPhase && mothership && mothership.alive) {
      return { x: mothership.x + mothership.w / 2, y: mothership.y + mothership.h / 2 };
    }
    // Priority 2: densest cluster of aliens
    const aliveAliens = aliens.filter(a => a.alive);
    if (aliveAliens.length === 0) return null;
    let best = null, bestCount = 0;
    for (const a of aliveAliens) {
      const cx = a.x + a.w / 2, cy = a.y + a.h / 2;
      let count = 0;
      for (const b of aliveAliens) {
        const dx = (b.x + b.w / 2) - cx, dy = (b.y + b.h / 2) - cy;
        if (dx * dx + dy * dy < 3600) count++; // 60px radius
      }
      if (count > bestCount) { bestCount = count; best = { x: cx, y: cy }; }
    }
    return best;
  }

  update() {
    const target = this.findTarget();
    if (target) {
      const dx = target.x - (this.x + this.w / 2);
      const dy = target.y - (this.y + this.h / 2);
      const desired = Math.atan2(dy, dx);
      const current = Math.atan2(this.vy, this.vx);
      let diff = desired - current;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      const turn = Math.max(-this.turnRate, Math.min(this.turnRate, diff));
      const newAngle = current + turn;
      this.vx = Math.cos(newAngle) * this.speed;
      this.vy = Math.sin(newAngle) * this.speed;
    }
    this.trail.push({ x: this.x + this.w / 2, y: this.y + this.h / 2 });
    if (this.trail.length > 8) this.trail.shift();
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < FIELD_X - 20 || this.x > FIELD_X + FIELD_W + 20 ||
        this.y < FIELD_Y - 20 || this.y > FIELD_Y + FIELD_H + 20) this.alive = false;
  }

  draw() {
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    ctx.save();
    // Trail
    for (let i = 0; i < this.trail.length; i++) {
      const t = this.trail[i];
      ctx.globalAlpha = (i / this.trail.length) * 0.4;
      ctx.fillStyle = "#ff44aa";
      ctx.beginPath();
      ctx.arc(t.x, t.y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    // Missile body
    const angle = Math.atan2(this.vy, this.vx);
    ctx.translate(cx, cy);
    ctx.rotate(angle - Math.PI / 2);
    // Nosecone
    ctx.fillStyle = "#ff44aa";
    ctx.beginPath();
    ctx.moveTo(0, -5);
    ctx.lineTo(-2.5, 0);
    ctx.lineTo(2.5, 0);
    ctx.closePath();
    ctx.fill();
    // Body
    ctx.fillRect(-2, 0, 4, 4);
    // Exhaust
    const flicker = 1 + Math.random() * 3;
    ctx.fillStyle = "rgba(255,150,200,0.6)";
    ctx.beginPath();
    ctx.moveTo(-2, 4);
    ctx.lineTo(0, 4 + flicker);
    ctx.lineTo(2, 4);
    ctx.closePath();
    ctx.fill();
    // Glow
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = "#ff44aa";
    ctx.beginPath();
    ctx.arc(0, 0, 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

class Bunker {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.w = 48;
    this.h = 30;
    this.cols = 8;
    this.rows = 5;
    this.blockW = this.w / this.cols;
    this.blockH = this.h / this.rows;
    this.grid = [];
    for (let r = 0; r < this.rows; r++) {
      this.grid[r] = [];
      for (let c = 0; c < this.cols; c++) {
        if (r >= 3 && (c === 3 || c === 4)) {
          this.grid[r][c] = false;
        } else {
          this.grid[r][c] = true;
        }
      }
    }
  }

  get isDestroyed() {
    for (let r = 0; r < this.rows; r++)
      for (let c = 0; c < this.cols; c++)
        if (this.grid[r][c]) return false;
    return true;
  }

  damageAt(gx, gy, radius) {
    let hit = false;
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (!this.grid[r][c]) continue;
        const bx = this.x + c * this.blockW + this.blockW / 2;
        const by = this.y + r * this.blockH + this.blockH / 2;
        const dx = gx - bx, dy = gy - by;
        if (Math.sqrt(dx * dx + dy * dy) < radius) {
          this.grid[r][c] = false;
          hit = true;
        }
      }
    }
    return hit;
  }

  heal(percent) {
    const destroyed = [];
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (r >= 3 && (c === 3 || c === 4)) continue;
        if (!this.grid[r][c]) destroyed.push({ r, c });
      }
    }
    const toRestore = Math.ceil(destroyed.length * percent);
    for (let i = destroyed.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [destroyed[i], destroyed[j]] = [destroyed[j], destroyed[i]];
    }
    for (let i = 0; i < Math.min(toRestore, destroyed.length); i++) {
      this.grid[destroyed[i].r][destroyed[i].c] = true;
    }
  }

  draw() {
    ctx.fillStyle = COL.bunker;
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (this.grid[r][c]) {
          ctx.fillRect(
            this.x + c * this.blockW,
            this.y + r * this.blockH,
            this.blockW - 1,
            this.blockH - 1
          );
        }
      }
    }
  }
}

class Explosion {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.frame = 0;
    this.maxFrames = 12;
    this.alive = true;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxFrames) this.alive = false;
  }

  draw() {
    const progress = this.frame / this.maxFrames;
    const radius = 8 + progress * 10;
    const alpha = 1 - progress;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = COL.explosion;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ffaa00";
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class PowerUp {
  constructor(type) {
    this.type = type || "rail";
    this.w = 24;
    this.h = 24;
    this.x = FIELD_X + 50 + Math.random() * (FIELD_W - 100);
    const thirdH = FIELD_H / 3;
    this.y = FIELD_Y + thirdH + Math.random() * thirdH;
    this.alive = true;
    this.frame = 0;
    this.maxLife = 300;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxLife) this.alive = false;
  }

  draw() {
    const pulse = 0.7 + 0.3 * Math.sin(this.frame * 0.15);
    const baseHue = WEAPON_HUES[this.type];
    const hue = (baseHue + this.frame * 2) % 360;
    const size = this.w * pulse;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    const icon = WEAPON_KEYS[this.type];

    // Outer glow
    ctx.globalAlpha = 0.3 * pulse;
    ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
    ctx.beginPath();
    ctx.arc(cx, cy, size * 0.8, 0, Math.PI * 2);
    ctx.fill();

    // Shape
    ctx.globalAlpha = 1;
    ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
    const hs = size * 0.5;
    if (this.type === "life") {
      // mini ship silhouette (green)
      ctx.fillStyle = "#00ff00";
      ctx.beginPath();
      ctx.moveTo(cx, cy - hs);             // nose
      ctx.lineTo(cx + hs * 0.3, cy - hs * 0.4);
      ctx.lineTo(cx + hs, cy + hs * 0.6);  // right wing tip
      ctx.lineTo(cx + hs * 0.2, cy + hs * 0.4);
      ctx.lineTo(cx + hs * 0.2, cy + hs);  // bottom right
      ctx.lineTo(cx - hs * 0.2, cy + hs);  // bottom left
      ctx.lineTo(cx - hs * 0.2, cy + hs * 0.4);
      ctx.lineTo(cx - hs, cy + hs * 0.6);  // left wing tip
      ctx.lineTo(cx - hs * 0.3, cy - hs * 0.4);
      ctx.closePath();
      ctx.fill();
    } else if (this.type === "clone") {
      // double ship icon (yellow)
      ctx.fillStyle = "#ffcc00";
      for (const ox of [-hs * 0.4, hs * 0.4]) {
        ctx.beginPath();
        ctx.moveTo(cx + ox, cy - hs * 0.7);
        ctx.lineTo(cx + ox + hs * 0.35, cy + hs * 0.3);
        ctx.lineTo(cx + ox, cy + hs * 0.1);
        ctx.lineTo(cx + ox - hs * 0.35, cy + hs * 0.3);
        ctx.closePath();
        ctx.fill();
      }
    } else if (this.type === "bomb") {
      // circle shape
      ctx.beginPath();
      ctx.arc(cx, cy, hs, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.type === "heal") {
      // cross shape
      ctx.fillRect(cx - hs * 0.3, cy - hs, hs * 0.6, hs * 2);
      ctx.fillRect(cx - hs, cy - hs * 0.3, hs * 2, hs * 0.6);
    } else {
      // diamond shape (rail, slow)
      ctx.beginPath();
      ctx.moveTo(cx, cy - hs);
      ctx.lineTo(cx + hs, cy);
      ctx.lineTo(cx, cy + hs);
      ctx.lineTo(cx - hs, cy);
      ctx.closePath();
      ctx.fill();
    }

    // Icon label
    ctx.fillStyle = "#fff";
    ctx.font = "bold 11px monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(icon, cx, cy);
    ctx.globalAlpha = 1;
  }
}

class RailBeam {
  constructor(x) {
    this.x = x;
    this.frame = 0;
    this.maxFrames = 21;
    this.alive = true;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxFrames) this.alive = false;
  }

  draw() {
    const cx = this.x;
    const top = FIELD_Y;
    const bot = FIELD_Y + FIELD_H;
    const f = this.frame;

    let width, alpha;
    if (f <= 5) {
      width = 2;
      alpha = 0.7 + 0.3 * (f / 5);
    } else if (f <= 12) {
      const t = (f - 5) / 7;
      width = 2 + 46 * t;
      alpha = 1;
    } else {
      const t = (f - 12) / 8;
      width = 48 * (1 - t);
      alpha = 1 - t;
    }

    if (width < 0.5 || alpha < 0.01) return;

    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = "#0044ff";
    ctx.fillRect(cx - width / 2, top, width, bot - top);

    ctx.globalAlpha = alpha * 0.6;
    ctx.fillStyle = "#00ccff";
    const midW = width * 0.6;
    ctx.fillRect(cx - midW / 2, top, midW, bot - top);

    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#ffffff";
    const coreW = Math.max(1, width * 0.25);
    ctx.fillRect(cx - coreW / 2, top, coreW, bot - top);

    ctx.globalAlpha = 1;
  }
}

// ── Mothership boss ─────────────────────────────────────────────────
const BOSS_HP = { easy: 40, medium: 60, difficult: 80, insane: 120, doomsday: 180 };

class Mothership {
  constructor(diffKey, lvl) {
    const cfg = BOSS_LEVEL_CONFIG[Math.min(lvl, 5) - 1];
    this.w = cfg.w;
    this.h = cfg.h;
    this.x = W / 2 - this.w / 2;
    this.y = FIELD_Y - this.h - 10;
    this.targetY = FIELD_Y + 30;
    this.hp = Math.round((BOSS_HP[diffKey] || 60) * cfg.hpMult);
    this.maxHp = this.hp;
    this.alive = true;
    this.deathHandled = false;
    this.entering = true;
    this.enterSpeed = (this.targetY - this.y) / 40;
    this.driftSpeed = 1.2;
    this.driftDir = 1;
    this.bobPhase = 0;
    this.shootChance = DIFFICULTIES[diffKey].shootChance;
    this.patternTimer = 0;
    this.pattern = 0;
    this.numPatterns = cfg.numPatterns;
    this.fanCount = cfg.fanCount;
    this.flashTimer = 0;
    this.frame = 0;
    this.spawnTimer = 0;
    this.spawnInterval = cfg.spawnInterval;
  }

  update() {
    this.frame++;
    const newProjectiles = [];

    if (this.entering) {
      this.y += this.enterSpeed;
      if (this.y >= this.targetY) {
        this.y = this.targetY;
        this.entering = false;
      }
      return newProjectiles;
    }

    // Frozen — no movement or shooting
    if (slowTimer > 0) return newProjectiles;

    // Horizontal drift
    this.x += this.driftSpeed * this.driftDir;
    if (this.x <= FIELD_X + 10) this.driftDir = 1;
    if (this.x + this.w >= FIELD_X + FIELD_W - 10) this.driftDir = -1;

    // Vertical bob
    this.bobPhase += 0.05;
    this.y = this.targetY + Math.sin(this.bobPhase) * 8;

    // Cycle pattern every 3s (90 frames)
    this.patternTimer++;
    if (this.patternTimer >= 90) {
      this.patternTimer = 0;
      this.pattern = (this.pattern + 1) % this.numPatterns;
    }

    // Shooting
    const cx = this.x + this.w / 2;
    const botY = this.y + this.h;
    if (Math.random() < this.shootChance) {
      switch (this.pattern) {
        case 0: // single aimed shot down
          newProjectiles.push(new Projectile(cx, botY, 1));
          break;
        case 1: { // fan of N
          const fanStep = 0.6 / Math.max(1, this.fanCount - 1);
          for (let i = 0; i < this.fanCount; i++) {
            const angle = -0.3 + i * fanStep;
            const p = new Projectile(cx + angle * 30, botY, 1);
            p.vx = angle * PROJ_SPEED;
            const origUpdate = p.update.bind(p);
            const vx = p.vx;
            p.update = function() {
              origUpdate();
              this.x += vx * (slowTimer > 0 ? 0.1 : 1);
            };
            newProjectiles.push(p);
          }
          break;
        }
        case 2: // double bombs
          newProjectiles.push(new Bomb(cx - 15, botY));
          newProjectiles.push(new Bomb(cx + 15, botY));
          break;
        case 3: { // spread of 5 random-offset shots
          for (let i = 0; i < 5; i++) {
            const offset = (Math.random() - 0.5) * 80;
            const p = new Projectile(cx + offset, botY, 1);
            const vx = (Math.random() - 0.5) * 1.5;
            const origUpdate = p.update.bind(p);
            p.update = function() {
              origUpdate();
              this.x += vx * (slowTimer > 0 ? 0.1 : 1);
            };
            newProjectiles.push(p);
          }
          break;
        }
      }
    }

    if (this.flashTimer > 0) this.flashTimer--;

    return newProjectiles;
  }

  takeHit(damage) {
    this.hp -= damage;
    this.flashTimer = 6;
    if (this.hp <= 0) {
      this.hp = 0;
      this.alive = false;
      return true;
    }
    return false;
  }

  draw() {
    if (!this.alive && this.deathHandled) return;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;

    // Engine glow
    ctx.globalAlpha = 0.4 + 0.2 * Math.sin(this.frame * 0.2);
    ctx.fillStyle = "#ff4400";
    ctx.beginPath();
    ctx.ellipse(cx - 30, this.y + this.h - 5, 10, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(cx + 30, this.y + this.h - 5, 10, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Hit flash
    const bodyColor = this.flashTimer > 0 ? "#ffffff" : COL.mothership;

    // Hexagonal body
    ctx.fillStyle = bodyColor;
    ctx.beginPath();
    ctx.moveTo(this.x + 20, this.y);
    ctx.lineTo(this.x + this.w - 20, this.y);
    ctx.lineTo(this.x + this.w, this.y + this.h * 0.4);
    ctx.lineTo(this.x + this.w - 10, this.y + this.h);
    ctx.lineTo(this.x + 10, this.y + this.h);
    ctx.lineTo(this.x, this.y + this.h * 0.4);
    ctx.closePath();
    ctx.fill();

    // Body detail lines
    ctx.strokeStyle = "#cc0044";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(this.x + 10, this.y + this.h * 0.5);
    ctx.lineTo(this.x + this.w - 10, this.y + this.h * 0.5);
    ctx.stroke();

    // Cockpit
    ctx.fillStyle = this.flashTimer > 0 ? "#ffffff" : COL.mothershipGlow;
    ctx.beginPath();
    ctx.ellipse(cx, this.y + this.h * 0.3, 18, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#000";
    ctx.beginPath();
    ctx.ellipse(cx, this.y + this.h * 0.3, 10, 7, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wing cannons
    ctx.fillStyle = bodyColor;
    ctx.fillRect(this.x - 5, this.y + this.h * 0.3, 12, 8);
    ctx.fillRect(this.x + this.w - 7, this.y + this.h * 0.3, 12, 8);

    // HP bar (above ship)
    const barW = this.w;
    const barH = 6;
    const barX = this.x;
    const barY = this.y - 12;
    const hpRatio = this.hp / this.maxHp;
    ctx.fillStyle = COL.mothershipHPBg;
    ctx.fillRect(barX, barY, barW, barH);
    let hpColor = COL.mothershipHP;
    if (hpRatio <= 0.25) hpColor = "#ffffff";
    else if (hpRatio <= 0.5) hpColor = "#ffff00";
    ctx.fillStyle = hpColor;
    ctx.fillRect(barX, barY, barW * hpRatio, barH);
    ctx.strokeStyle = "#666";
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);
  }
}

class BossMinion {
  constructor(x, y, shootChance) {
    this.w = 16;
    this.h = 14;
    this.x = x - this.w / 2;
    this.y = y;
    this.hp = 1;
    this.alive = true;
    this.points = 50;
    this.shootChance = shootChance * 0.5;
    this.vx = (Math.random() - 0.5) * 2;
    this.vy = 0.8 + Math.random() * 0.6;
    this.frame = 0;
  }

  update() {
    this.frame++;
    this.x += this.vx;
    this.y += this.vy;
    // bounce off field edges
    if (this.x <= FIELD_X) { this.x = FIELD_X; this.vx = Math.abs(this.vx); }
    if (this.x + this.w >= FIELD_X + FIELD_W) { this.x = FIELD_X + FIELD_W - this.w; this.vx = -Math.abs(this.vx); }
    // die if off bottom
    if (this.y > FIELD_Y + FIELD_H) this.alive = false;
  }

  tryShoot() {
    if (Math.random() < this.shootChance) {
      return new Projectile(this.x + this.w / 2, this.y + this.h, 1);
    }
    return null;
  }

  takeHit() {
    this.hp--;
    if (this.hp <= 0) { this.alive = false; return true; }
    return false;
  }

  draw() {
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    ctx.save();
    // Small triangular fighter
    ctx.fillStyle = "#cc4466";
    ctx.beginPath();
    ctx.moveTo(cx, this.y + this.h);        // bottom center (nose pointing down)
    ctx.lineTo(this.x, this.y);             // top left
    ctx.lineTo(this.x + this.w, this.y);    // top right
    ctx.closePath();
    ctx.fill();
    // Cockpit dot
    ctx.fillStyle = "#ff8888";
    ctx.beginPath();
    ctx.arc(cx, cy - 1, 2, 0, Math.PI * 2);
    ctx.fill();
    // Wing accents
    ctx.fillStyle = "#ff2244";
    ctx.fillRect(this.x, this.y, 2, 3);
    ctx.fillRect(this.x + this.w - 2, this.y, 2, 3);
    ctx.restore();
  }
}

class Asteroid {
  constructor() {
    this.radius = 10 + Math.random() * 18;
    // Start from top, random x, angled trajectory
    this.x = FIELD_X + Math.random() * FIELD_W;
    this.y = FIELD_Y - this.radius;
    const angle = (0.3 + Math.random() * 0.4) * (Math.random() < 0.5 ? 1 : -1); // angled
    const speed = 1.5 + Math.random() * 1.5;
    this.vx = Math.sin(angle) * speed;
    this.vy = Math.cos(angle) * speed;
    this.rot = 0;
    this.rotSpeed = (Math.random() - 0.5) * 0.08;
    this.alive = true;
    this.hp = Math.ceil(this.radius / 6);
    this.frame = 0;
    // Generate rocky shape (jagged circle)
    this.verts = [];
    const n = 8 + Math.floor(Math.random() * 5);
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      const r = 0.7 + Math.random() * 0.3;
      this.verts.push({ a, r });
    }
    // Fire trail particles
    this.particles = [];
  }

  update() {
    this.frame++;
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.rotSpeed;
    // Spawn fire trail particles
    if (this.frame % 2 === 0) {
      this.particles.push({
        x: this.x + (Math.random() - 0.5) * this.radius * 0.6,
        y: this.y + (Math.random() - 0.5) * this.radius * 0.6,
        vx: -this.vx * 0.3 + (Math.random() - 0.5) * 0.8,
        vy: -this.vy * 0.3 + (Math.random() - 0.5) * 0.8,
        life: 12 + Math.random() * 10,
        maxLife: 22,
        size: 2 + Math.random() * 3,
      });
    }
    // Update particles
    for (const pt of this.particles) {
      pt.x += pt.vx;
      pt.y += pt.vy;
      pt.life--;
    }
    this.particles = this.particles.filter(pt => pt.life > 0);
    // Off screen
    if (this.y - this.radius > FIELD_Y + FIELD_H + 20 ||
        this.x + this.radius < FIELD_X - 20 ||
        this.x - this.radius > FIELD_X + FIELD_W + 20) {
      this.alive = false;
    }
  }

  takeHit() {
    this.hp--;
    if (this.hp <= 0) { this.alive = false; return true; }
    return false;
  }

  draw() {
    // Draw fire trail particles first (behind asteroid)
    for (const pt of this.particles) {
      const t = pt.life / pt.maxLife;
      const r = Math.floor(255);
      const g = Math.floor(80 + 170 * t);
      const b = Math.floor(30 * t);
      ctx.globalAlpha = t * 0.8;
      ctx.fillStyle = `rgb(${r},${g},${b})`;
      ctx.beginPath();
      ctx.arc(pt.x, pt.y, pt.size * t, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    const cx = this.x;
    const cy = this.y;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(this.rot);

    // Outer glow (fire)
    const glowSize = this.radius * 1.6;
    const glow = ctx.createRadialGradient(0, 0, this.radius * 0.5, 0, 0, glowSize);
    glow.addColorStop(0, "rgba(255,160,30,0.4)");
    glow.addColorStop(0.5, "rgba(255,80,0,0.15)");
    glow.addColorStop(1, "rgba(255,30,0,0)");
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0, 0, glowSize, 0, Math.PI * 2);
    ctx.fill();

    // Rocky body
    ctx.fillStyle = "#665544";
    ctx.beginPath();
    const v0 = this.verts[0];
    ctx.moveTo(Math.cos(v0.a) * this.radius * v0.r, Math.sin(v0.a) * this.radius * v0.r);
    for (let i = 1; i < this.verts.length; i++) {
      const v = this.verts[i];
      ctx.lineTo(Math.cos(v.a) * this.radius * v.r, Math.sin(v.a) * this.radius * v.r);
    }
    ctx.closePath();
    ctx.fill();

    // Surface cracks/detail
    ctx.strokeStyle = "rgba(100,80,60,0.6)";
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-this.radius * 0.2, -this.radius * 0.3);
    ctx.lineTo(this.radius * 0.1, this.radius * 0.2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(this.radius * 0.15, -this.radius * 0.15);
    ctx.lineTo(-this.radius * 0.05, this.radius * 0.3);
    ctx.stroke();

    // Hot edge glow
    ctx.strokeStyle = "rgba(255,120,20,0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, this.radius * 0.85, -0.5, 0.8);
    ctx.stroke();

    ctx.restore();
  }
}

// ── Alien grid builder ───────────────────────────────────────────────
function makeAlienGrid(shootChance, lvl) {
  const grid = LEVEL_GRID[Math.min(lvl, 5) - 1];
  const cols = grid.c, rows = grid.r;
  const alienW = 28, hGap = 14, vGap = 6;
  const gridW = cols * alienW + (cols - 1) * hGap;
  const startX = FIELD_X + (FIELD_W - gridW) / 2;
  const startY = FIELD_Y + 15;
  // Bomber rows scale with level: 0 at Lv1-2, 1 at Lv3, 2 at Lv4-5
  const bomberRows = lvl <= 2 ? 0 : lvl <= 3 ? 1 : 2;
  const aliens = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const ax = startX + c * (alienW + hGap);
      const ay = startY + r * (22 + vGap);
      if (r < bomberRows) {
        aliens.push(new Alien(ax, ay, BOMBER_HP, shootChance * 0.5, true, 0));
      } else {
        aliens.push(new Alien(ax, ay, FIGHTER_HP, shootChance, false, c % 2));
      }
    }
  }
  return aliens;
}

// ── Star field background ────────────────────────────────────────────
let stars = [];
let gameFrame = 0;

function generateStars(diffKey) {
  const cfg = STAR_CONFIG[diffKey] || STAR_CONFIG.medium;
  stars = [];
  for (let i = 0; i < cfg.count; i++) {
    const colorName = cfg.colors[Math.floor(Math.random() * cfg.colors.length)];
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.5 + 0.5,
      speed: cfg.speedMin + Math.random() * (cfg.speedMax - cfg.speedMin),
      brightness: cfg.brightMin + Math.random() * (cfg.brightMax - cfg.brightMin),
      color: STAR_COLORS_RGB[colorName],
    });
  }
}

// Initialize stars with medium defaults for the title screen
generateStars("medium");

function drawStars() {
  // Doomsday pulsing background tint
  if (difficulty === "doomsday" && gameState === "playing") {
    const pulse = 0.03 + 0.02 * Math.sin(gameFrame * 0.05);
    ctx.fillStyle = `rgba(80, 0, 0, ${pulse})`;
    ctx.fillRect(0, 0, W, H);
  }

  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = `rgba(${s.color},${s.brightness})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

// ── Bomb explosion helper ────────────────────────────────────────────
function triggerBombExplosion(cx, cy) {
  explosions.push(new BombExplosion(cx, cy));
  playSound("torpedoBlast");
  const blastRadius = 120;
  for (const a of aliens) {
    if (!a.alive) continue;
    const ax = a.x + a.w / 2;
    const ay = a.y + a.h / 2;
    const dx = cx - ax, dy = cy - ay;
    if (Math.sqrt(dx * dx + dy * dy) < blastRadius) {
      a.takeHit();
      const dead = a.takeHit();
      if (dead) {
        score += a.points;
        explosions.push(new Explosion(ax, ay));
      }
    }
  }
  for (const b of bunkers) {
    if (!b.isDestroyed) {
      b.damageAt(cx, cy, blastRadius);
    }
  }
  // Blast vs boss minions
  for (const m of bossMinions) {
    if (!m.alive) continue;
    const mx2 = m.x + m.w / 2;
    const my2 = m.y + m.h / 2;
    const dx2 = cx - mx2, dy2 = cy - my2;
    if (Math.sqrt(dx2 * dx2 + dy2 * dy2) < blastRadius) {
      m.alive = false;
      score += m.points;
      explosions.push(new Explosion(mx2, my2));
    }
  }
  // Blast vs mothership
  if (bossPhase && mothership && mothership.alive) {
    const mx = mothership.x + mothership.w / 2;
    const my = mothership.y + mothership.h / 2;
    const dx = cx - mx, dy = cy - my;
    if (Math.sqrt(dx * dx + dy * dy) < blastRadius) {
      const dead = mothership.takeHit(5);
      if (dead) handleBossDeath();
    }
  }
}

// ── Boss death handler ──────────────────────────────────────────────
function handleBossDeath() {
  if (mothership.deathHandled) return;
  mothership.deathHandled = true;
  playSound("bossExplode");
  // Spawn explosions across the body
  for (let i = 0; i < 8; i++) {
    const ex = mothership.x + Math.random() * mothership.w;
    const ey = mothership.y + Math.random() * mothership.h;
    explosions.push(new BombExplosion(ex, ey));
  }
  bossDeathTimer = 30; // 1s delay before win
  // Kill remaining minions
  for (const m of bossMinions) {
    if (m.alive) {
      m.alive = false;
      explosions.push(new Explosion(m.x + m.w / 2, m.y + m.h / 2));
    }
  }
  bossMinions = [];
}

// ── Title screen ─────────────────────────────────────────────────────
let debugMode = false;
let debugInvincible = false;
let debugKeyDebounce = {};

const CHEAT_SEQ = ["U","U","D","D","L","R","L","R"];
let cheatProgress = 0;
let cheatDirDebounce = { up: false, down: false, left: false, right: false };

let titleKeyDebounce = {};

function updateTitle() {
  const upPressed = keys["ArrowUp"] || keys["KeyW"];
  const downPressed = keys["ArrowDown"] || keys["KeyS"];
  const enterPressed = keys["Enter"] || keys["Space"];

  if (upPressed && !titleKeyDebounce.up) {
    selectedDiff = (selectedDiff - 1 + DIFF_ORDER.length) % DIFF_ORDER.length;
    playSound("menuSelect");
  }
  if (downPressed && !titleKeyDebounce.down) {
    selectedDiff = (selectedDiff + 1) % DIFF_ORDER.length;
    playSound("menuSelect");
  }
  if (enterPressed && !titleKeyDebounce.enter) {
    playSound("menuConfirm");
    cheatProgress = 0;
    startGame(DIFF_ORDER[selectedDiff]);
  }

  // Leaderboard view (L key)
  const lPressed = keys["KeyL"];
  if (lPressed && !titleKeyDebounce.l) {
    playSound("menuConfirm");
    enterLeaderboardView();
  }
  titleKeyDebounce.l = lPressed;

  // Debug mode toggle (backtick on desktop)
  const backquotePressed = keys["Backquote"];
  if (backquotePressed && !titleKeyDebounce.backquote) {
    debugMode = !debugMode;
    if (!debugMode) debugInvincible = false;
    cheatProgress = 0;
    playSound("menuSelect");
  }
  titleKeyDebounce.backquote = backquotePressed;

  // Cheat code: Up Up Down Down Left Right Left Right (Konami code)
  const dirs = { up: !!keys["ArrowUp"], down: !!keys["ArrowDown"], left: !!keys["ArrowLeft"], right: !!keys["ArrowRight"] };
  const dirMap = { up: "U", down: "D", left: "L", right: "R" };
  for (const d of ["up","down","left","right"]) {
    if (dirs[d] && !cheatDirDebounce[d]) {
      if (CHEAT_SEQ[cheatProgress] === dirMap[d]) cheatProgress++; else cheatProgress = CHEAT_SEQ[0] === dirMap[d] ? 1 : 0;
    }
    cheatDirDebounce[d] = dirs[d];
  }
  if (cheatProgress >= CHEAT_SEQ.length) {
    debugMode = !debugMode;
    if (!debugMode) debugInvincible = false;
    cheatProgress = 0;
    playSound("menuConfirm");
  }

  titleKeyDebounce.up = upPressed;
  titleKeyDebounce.down = downPressed;
  titleKeyDebounce.enter = enterPressed;
}
