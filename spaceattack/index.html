<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Space Attack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { height: 100dvh; height: 100vh; }
  body {
    background: #000;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100dvh;
    height: 100vh;
    overflow: hidden;
    font-family: monospace;
  }
  @supports (height: 100dvh) {
    html, body { height: 100dvh; }
  }
  canvas {
    display: block;
    image-rendering: pixelated;
  }
  #controls { display: none; }
  body.mobile {
    flex-direction: column;
    justify-content: flex-start;
    padding-top: env(safe-area-inset-top, 0px);
    padding-bottom: env(safe-area-inset-bottom, 0px);
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  body.mobile canvas {
    touch-action: none;
    flex-shrink: 0;
  }
  body.mobile #controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    flex: 1;
    padding: 12px 24px;
    background: linear-gradient(180deg, #1a1a2e 0%, #0f0f1a 100%);
    border-top: 2px solid #333;
    touch-action: none;
    max-height: 45dvh;
    max-height: 45vh;
    min-height: 180px;
  }
  /* D-Pad */
  #dpad {
    display: grid;
    grid-template-areas:
      ".    up    ."
      "left center right"
      ".    down  .";
    grid-template-columns: repeat(3, 64px);
    grid-template-rows: repeat(3, 64px);
    gap: 4px;
  }
  .dpad-up    { grid-area: up; }
  .dpad-left  { grid-area: left; }
  .dpad-center{ grid-area: center; }
  .dpad-right { grid-area: right; }
  .dpad-down  { grid-area: down; }
  .dpad-btn {
    width: 64px;
    height: 64px;
    border: 2px solid #555;
    background: #222;
    color: #999;
    font-size: 26px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  .dpad-btn.pressed {
    background: #555;
    color: #fff;
    border-color: #999;
    box-shadow: 0 0 12px rgba(255,255,255,0.2);
  }
  .dpad-center-dot {
    grid-area: center;
    width: 64px;
    height: 64px;
    background: #1a1a1a;
    border-radius: 10px;
    border: 2px solid #333;
  }
  /* Action buttons */
  #action-btns {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
    position: relative;
  }
  .action-btn {
    width: 88px;
    height: 88px;
    border-radius: 50%;
    border: 3px solid;
    font-family: monospace;
    font-weight: bold;
    font-size: 15px;
    line-height: 1.2;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    transition: box-shadow 0.1s;
  }
  #btn-fire {
    background: radial-gradient(circle at 35% 35%, #662222, #331111);
    border-color: #ff4444;
    color: #ff6666;
  }
  #btn-fire.pressed {
    background: radial-gradient(circle at 35% 35%, #ff4444, #aa2222);
    color: #fff;
    box-shadow: 0 0 20px rgba(255,68,68,0.6);
  }
  #btn-special {
    background: radial-gradient(circle at 35% 35%, #1a3344, #0d1a22);
    border-color: #00ccff;
    color: #00ccff;
  }
  #btn-special.pressed {
    background: radial-gradient(circle at 35% 35%, #00ccff, #006688);
    color: #fff;
    box-shadow: 0 0 20px rgba(0,204,255,0.6);
  }
  #btn-special .ammo {
    display: block;
    font-size: 20px;
  }
  #btn-select {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid #888;
    background: radial-gradient(circle at 35% 35%, #444, #222);
    color: #ccc;
    font-family: monospace;
    font-size: 14px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    position: absolute;
    top: 12px;
    right: -72px;
  }
  #btn-select.pressed {
    background: radial-gradient(circle at 35% 35%, #888, #444);
    color: #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
  }
  #btn-esc {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    border: 2px solid #777;
    background: radial-gradient(circle at 35% 35%, #444, #222);
    color: #888;
    font-family: monospace;
    font-size: 13px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
    position: absolute;
    bottom: 12px;
    right: -72px;
  }
  #btn-esc.pressed {
    background: radial-gradient(circle at 35% 35%, #888, #444);
    color: #fff;
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
  }
  /* Debug bar */
  #debug-bar {
    display: none;
    width: 100%;
    justify-content: center;
    gap: 8px;
    padding: 6px 12px;
    background: #1a1200;
    border-top: 2px solid #cc8800;
    touch-action: none;
  }
  body.mobile.debug-on #debug-bar {
    display: flex;
  }
  .dbg-btn {
    flex: 1;
    max-width: 72px;
    height: 36px;
    border: 2px solid #cc8800;
    border-radius: 6px;
    background: #2a1a00;
    color: #cc8800;
    font-family: monospace;
    font-size: 12px;
    font-weight: bold;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  .dbg-btn.active {
    background: #cc8800;
    color: #000;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="debug-bar">
  <button class="dbg-btn" data-dbg="ammo">+ALL</button>
  <button class="dbg-btn" data-dbg="spawn">SPAWN</button>
  <button class="dbg-btn" data-dbg="inv" id="dbg-inv">INV</button>
  <button class="dbg-btn" data-dbg="kill50">K50%</button>
  <button class="dbg-btn" data-dbg="killall">KILL</button>
</div>
<div id="controls">
  <div id="action-btns">
    <button class="action-btn" id="btn-fire" data-key="Space">FIRE</button>
    <button class="action-btn" id="btn-special" data-key="ShiftLeft" style="border-color:#333;color:#444;opacity:0.4"><span id="special-name">SPEC</span><span class="ammo" id="special-count"></span></button>
    <button id="btn-select" data-key="Tab">SEL</button>
    <button id="btn-esc" data-key="Escape">ESC</button>
  </div>
  <div id="dpad">
    <button class="dpad-btn dpad-up" data-key="ArrowUp">&#9650;</button>
    <button class="dpad-btn dpad-left" data-key="ArrowLeft">&#9664;</button>
    <div class="dpad-center-dot"></div>
    <button class="dpad-btn dpad-right" data-key="ArrowRight">&#9654;</button>
    <button class="dpad-btn dpad-down" data-key="ArrowDown">&#9660;</button>
  </div>
</div>
<script>
"use strict";

// ── Canvas setup ─────────────────────────────────────────────────────
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = 780, H = 580;
canvas.width = W;
canvas.height = H;

let touchActive = false;

function fitCanvas() {
  const vw = window.innerWidth;
  const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
  if (touchActive) {
    const ctrl = document.getElementById('controls');
    const dbgBar = document.getElementById('debug-bar');
    const ctrlH = ctrl && ctrl.offsetHeight > 0 ? ctrl.offsetHeight : vh * 0.4;
    const dbgH = dbgBar && dbgBar.offsetHeight > 0 ? dbgBar.offsetHeight : 0;
    const availH = vh - ctrlH - dbgH;
    const scaleX = vw / W;
    const scaleY = availH / H;
    const scale = Math.min(scaleX, scaleY);
    canvas.style.width = (W * scale) + "px";
    canvas.style.height = (H * scale) + "px";
  } else {
    const scaleX = vw / W;
    const scaleY = vh / H;
    const scale = Math.min(scaleX, scaleY);
    canvas.style.width = (W * scale) + "px";
    canvas.style.height = (H * scale) + "px";
  }
}
fitCanvas();
window.addEventListener("resize", fitCanvas);
if (window.visualViewport) window.visualViewport.addEventListener("resize", fitCanvas);

// ── Sound (Web Audio API) ────────────────────────────────────────────
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// Helper: white noise buffer source
function makeNoise(duration) {
  const sr = audioCtx.sampleRate;
  const buf = audioCtx.createBuffer(1, sr * duration, sr);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  return src;
}

// Helper: sigmoid distortion curve
function makeDistortion(amount) {
  const ws = audioCtx.createWaveShaper();
  const k = amount;
  const n = 256;
  const curve = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const x = (i * 2) / n - 1;
    curve[i] = ((Math.PI + k) * x) / (Math.PI + k * Math.abs(x));
  }
  ws.curve = curve;
  ws.oversample = "2x";
  return ws;
}

function playSound(type) {
  if (audioCtx.state === "suspended") audioCtx.resume();
  const t = audioCtx.currentTime;
  const dest = audioCtx.destination;

  switch (type) {
    case "shoot": {
      // Main square with highpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.setValueAtTime(2000, t);
      hp.frequency.exponentialRampToValueAtTime(500, t + 0.1);
      osc.type = "square";
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.exponentialRampToValueAtTime(440, t + 0.1);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
      osc.connect(hp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.1);
      // Noise attack transient
      const ns = makeNoise(0.05);
      const ng = audioCtx.createGain();
      const nhp = audioCtx.createBiquadFilter();
      nhp.type = "highpass";
      nhp.frequency.value = 8000;
      ng.gain.setValueAtTime(0.08, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      ns.connect(nhp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.05);
      break;
    }

    case "hit": {
      // Main impact with distortion + lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = makeDistortion(30);
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(1500, t);
      lp.frequency.exponentialRampToValueAtTime(300, t + 0.15);
      osc.type = "square";
      osc.frequency.setValueAtTime(300, t);
      osc.frequency.exponentialRampToValueAtTime(100, t + 0.15);
      gain.gain.setValueAtTime(0.12, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.connect(dist).connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.15);
      // Percussive noise crack
      const ns = makeNoise(0.08);
      const ng = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.value = 2000;
      bp.Q.value = 2;
      ng.gain.setValueAtTime(0.1, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      ns.connect(bp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.08);
      break;
    }

    case "explode": {
      // Main body with distortion + lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = makeDistortion(40);
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(2000, t);
      lp.frequency.exponentialRampToValueAtTime(100, t + 0.3);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(30, t + 0.3);
      gain.gain.setValueAtTime(0.16, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      osc.connect(dist).connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.3);
      // Bandpass noise sweep (fireball texture)
      const ns = makeNoise(0.25);
      const ng = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(4000, t);
      bp.frequency.exponentialRampToValueAtTime(400, t + 0.25);
      bp.Q.value = 3;
      ng.gain.setValueAtTime(0.12, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      ns.connect(bp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.25);
      // Sub-bass sine for weight
      const sub = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      sub.type = "sine";
      sub.frequency.setValueAtTime(80, t);
      sub.frequency.exponentialRampToValueAtTime(20, t + 0.3);
      sg.gain.setValueAtTime(0.15, t);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
      sub.connect(sg).connect(dest);
      sub.start(t);
      sub.stop(t + 0.3);
      break;
    }

    case "playerDeath": {
      // Main descent with distortion + lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = makeDistortion(35);
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(3000, t);
      lp.frequency.exponentialRampToValueAtTime(200, t + 0.8);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.8);
      gain.gain.setValueAtTime(0.16, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.3);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc.connect(dist).connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.8);
      // Detuned oscillator for chorusing warble
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.type = "sawtooth";
      osc2.frequency.setValueAtTime(607, t);
      osc2.frequency.exponentialRampToValueAtTime(43, t + 0.8);
      g2.gain.setValueAtTime(0.1, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc2.connect(lp).connect(gain); // share filter chain
      osc2.start(t);
      osc2.stop(t + 0.8);
      // Bandpass noise for chaos/breakup
      const ns = makeNoise(0.7);
      const ng = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(5000, t);
      bp.frequency.exponentialRampToValueAtTime(500, t + 0.7);
      bp.Q.value = 2;
      ng.gain.setValueAtTime(0.08, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      ns.connect(bp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.7);
      // Bright alarm ping at start
      const ping = audioCtx.createOscillator();
      const pg = audioCtx.createGain();
      const pbp = audioCtx.createBiquadFilter();
      pbp.type = "bandpass";
      pbp.frequency.value = 1200;
      pbp.Q.value = 15;
      ping.type = "sine";
      ping.frequency.value = 1200;
      pg.gain.setValueAtTime(0.14, t);
      pg.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      ping.connect(pbp).connect(pg).connect(dest);
      ping.start(t);
      ping.stop(t + 0.15);
      break;
    }

    case "win": {
      // Lead with bandpass filter for horn-like quality
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.value = 1000;
      bp.Q.value = 3;
      osc.type = "square";
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.setValueAtTime(0.1, t + 0.5);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      osc.frequency.setValueAtTime(523, t);
      osc.frequency.setValueAtTime(659, t + 0.12);
      osc.frequency.setValueAtTime(784, t + 0.24);
      osc.frequency.setValueAtTime(1047, t + 0.36);
      osc.connect(bp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.7);
      // Triangle octave below for body
      const oct = audioCtx.createOscillator();
      const og = audioCtx.createGain();
      oct.type = "triangle";
      og.gain.setValueAtTime(0.06, t);
      og.gain.setValueAtTime(0.06, t + 0.5);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      oct.frequency.setValueAtTime(261, t);
      oct.frequency.setValueAtTime(329, t + 0.12);
      oct.frequency.setValueAtTime(392, t + 0.24);
      oct.frequency.setValueAtTime(523, t + 0.36);
      oct.connect(og).connect(dest);
      oct.start(t);
      oct.stop(t + 0.7);
      // Detuned sine for shimmer chorus
      const det = audioCtx.createOscillator();
      const dg = audioCtx.createGain();
      det.type = "sine";
      dg.gain.setValueAtTime(0.04, t);
      dg.gain.setValueAtTime(0.04, t + 0.5);
      dg.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      det.frequency.setValueAtTime(528, t);
      det.frequency.setValueAtTime(664, t + 0.12);
      det.frequency.setValueAtTime(789, t + 0.24);
      det.frequency.setValueAtTime(1052, t + 0.36);
      det.connect(dg).connect(dest);
      det.start(t);
      det.stop(t + 0.7);
      // Highpass noise flourish on final note (cymbal)
      const ns = makeNoise(0.3);
      const ng = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.value = 6000;
      ng.gain.setValueAtTime(0.001, t + 0.36);
      ng.gain.linearRampToValueAtTime(0.06, t + 0.4);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.68);
      ns.connect(hp).connect(ng).connect(dest);
      ns.start(t + 0.36);
      ns.stop(t + 0.68);
      break;
    }

    case "menuSelect": {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain).connect(dest);
      osc.type = "square";
      osc.frequency.setValueAtTime(660, t);
      gain.gain.setValueAtTime(0.08, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      osc.start(t);
      osc.stop(t + 0.05);
      break;
    }

    case "menuConfirm": {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain).connect(dest);
      osc.type = "square";
      osc.frequency.setValueAtTime(880, t);
      osc.frequency.setValueAtTime(1100, t + 0.08);
      gain.gain.setValueAtTime(0.1, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      osc.start(t);
      osc.stop(t + 0.15);
      break;
    }

    case "powerup": {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain).connect(dest);
      osc.type = "sine";
      osc.frequency.setValueAtTime(600, t);
      osc.frequency.exponentialRampToValueAtTime(2400, t + 0.3);
      gain.gain.setValueAtTime(0.15, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.start(t);
      osc.stop(t + 0.35);
      const osc2 = audioCtx.createOscillator();
      const g2 = audioCtx.createGain();
      osc2.connect(g2).connect(dest);
      osc2.type = "triangle";
      osc2.frequency.setValueAtTime(900, t + 0.05);
      osc2.frequency.exponentialRampToValueAtTime(3200, t + 0.3);
      g2.gain.setValueAtTime(0.08, t + 0.05);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc2.start(t + 0.05);
      osc2.stop(t + 0.35);
      break;
    }

    case "railgun": {
      // Main zap: sawtooth → distortion → bandpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = makeDistortion(50);
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(3000, t);
      bp.frequency.exponentialRampToValueAtTime(8000, t + 0.05);
      bp.frequency.exponentialRampToValueAtTime(2000, t + 0.35);
      bp.Q.value = 4;
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(1200, t);
      osc.frequency.exponentialRampToValueAtTime(4800, t + 0.05);
      osc.frequency.exponentialRampToValueAtTime(800, t + 0.35);
      gain.gain.setValueAtTime(0.14, t);
      gain.gain.linearRampToValueAtTime(0.1, t + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);
      osc.connect(dist).connect(bp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.35);
      // Noise crackle through highpass for electric sizzle
      const ns = makeNoise(0.2);
      const ng = audioCtx.createGain();
      const nhp = audioCtx.createBiquadFilter();
      nhp.type = "highpass";
      nhp.frequency.value = 4000;
      ng.gain.setValueAtTime(0.08, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      ns.connect(nhp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.2);
      // Shimmer tail through delay for reverberant ring
      const osc3 = audioCtx.createOscillator();
      const g3 = audioCtx.createGain();
      const delay = audioCtx.createDelay();
      const dg = audioCtx.createGain();
      delay.delayTime.value = 0.06;
      dg.gain.value = 0.3;
      osc3.type = "sine";
      osc3.frequency.setValueAtTime(2400, t + 0.05);
      osc3.frequency.exponentialRampToValueAtTime(5000, t + 0.15);
      osc3.frequency.exponentialRampToValueAtTime(1800, t + 0.4);
      g3.gain.setValueAtTime(0.001, t);
      g3.gain.linearRampToValueAtTime(0.06, t + 0.06);
      g3.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      osc3.connect(g3).connect(dest);
      g3.connect(delay).connect(dg).connect(delay); // feedback loop
      dg.connect(dest);
      osc3.start(t);
      osc3.stop(t + 0.4);
      // FM synthesis layer for metallic zing
      const mod = audioCtx.createOscillator();
      const modGain = audioCtx.createGain();
      const carrier = audioCtx.createOscillator();
      const cg = audioCtx.createGain();
      mod.type = "sine";
      mod.frequency.setValueAtTime(3200, t);
      mod.frequency.exponentialRampToValueAtTime(800, t + 0.25);
      modGain.gain.setValueAtTime(600, t);
      modGain.gain.exponentialRampToValueAtTime(50, t + 0.25);
      carrier.type = "sine";
      carrier.frequency.setValueAtTime(1600, t);
      cg.gain.setValueAtTime(0.05, t);
      cg.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
      mod.connect(modGain).connect(carrier.frequency);
      carrier.connect(cg).connect(dest);
      mod.start(t);
      mod.stop(t + 0.25);
      carrier.start(t);
      carrier.stop(t + 0.25);
      break;
    }

    case "torpedoBlast": {
      // Main body: sawtooth → distortion → lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const dist = makeDistortion(45);
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(2000, t);
      lp.frequency.exponentialRampToValueAtTime(200, t + 0.6);
      osc.type = "sawtooth";
      osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(25, t + 0.6);
      gain.gain.setValueAtTime(0.24, t);
      gain.gain.linearRampToValueAtTime(0.16, t + 0.15);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      osc.connect(dist).connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.6);
      // Bandpass noise sweep for debris
      const ns = makeNoise(0.4);
      const ng = audioCtx.createGain();
      const bp = audioCtx.createBiquadFilter();
      bp.type = "bandpass";
      bp.frequency.setValueAtTime(3000, t);
      bp.frequency.exponentialRampToValueAtTime(300, t + 0.4);
      bp.Q.value = 3;
      ng.gain.setValueAtTime(0.1, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      ns.connect(bp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.4);
      // Detuned sub-bass pair for chorus thickness
      const sub1 = audioCtx.createOscillator();
      const sub2 = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      sub1.type = "sine";
      sub1.frequency.setValueAtTime(60, t);
      sub1.frequency.exponentialRampToValueAtTime(20, t + 0.5);
      sub2.type = "sine";
      sub2.frequency.setValueAtTime(62, t);
      sub2.frequency.exponentialRampToValueAtTime(21, t + 0.5);
      sg.gain.setValueAtTime(0.2, t);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      sub1.connect(sg);
      sub2.connect(sg);
      sg.connect(dest);
      sub1.start(t);
      sub1.stop(t + 0.5);
      sub2.start(t);
      sub2.stop(t + 0.5);
      // Shrapnel sparkle (highpass noise)
      const ns2 = makeNoise(0.15);
      const ng2 = audioCtx.createGain();
      const hp = audioCtx.createBiquadFilter();
      hp.type = "highpass";
      hp.frequency.value = 5000;
      ng2.gain.setValueAtTime(0.06, t);
      ng2.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      ns2.connect(hp).connect(ng2).connect(dest);
      ns2.start(t);
      ns2.stop(t + 0.15);
      // Resonant impact ping
      const ping = audioCtx.createOscillator();
      const pg = audioCtx.createGain();
      const pbp = audioCtx.createBiquadFilter();
      pbp.type = "bandpass";
      pbp.frequency.value = 800;
      pbp.Q.value = 20;
      ping.type = "sine";
      ping.frequency.value = 800;
      pg.gain.setValueAtTime(0.1, t);
      pg.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
      ping.connect(pbp).connect(pg).connect(dest);
      ping.start(t);
      ping.stop(t + 0.12);
      break;
    }

    case "heal": {
      // Sparkle chimes through bandpass + delay
      const notes = [1200, 1600, 2000, 2400, 2800];
      const delay = audioCtx.createDelay();
      const dfb = audioCtx.createGain();
      delay.delayTime.value = 0.08;
      dfb.gain.value = 0.25;
      delay.connect(dfb).connect(delay); // feedback loop
      delay.connect(dest);
      for (let i = 0; i < notes.length; i++) {
        const hOsc = audioCtx.createOscillator();
        const hGain = audioCtx.createGain();
        const hBp = audioCtx.createBiquadFilter();
        hBp.type = "bandpass";
        hBp.frequency.value = notes[i];
        hBp.Q.value = 12;
        hOsc.type = i % 2 === 0 ? "sine" : "triangle";
        const offset = i * 0.07;
        hOsc.frequency.setValueAtTime(notes[i], t + offset);
        hOsc.frequency.exponentialRampToValueAtTime(notes[i] * 1.5, t + offset + 0.15);
        hGain.gain.setValueAtTime(0.001, t + offset);
        hGain.gain.linearRampToValueAtTime(0.07, t + offset + 0.02);
        hGain.gain.exponentialRampToValueAtTime(0.001, t + offset + 0.18);
        hOsc.connect(hBp).connect(hGain);
        hGain.connect(dest);
        hGain.connect(delay);
        hOsc.start(t + offset);
        hOsc.stop(t + offset + 0.18);
      }
      // Fairy dust shimmer (highpass noise)
      const ns = makeNoise(0.5);
      const ng = audioCtx.createGain();
      const nhp = audioCtx.createBiquadFilter();
      nhp.type = "highpass";
      nhp.frequency.value = 6000;
      ng.gain.setValueAtTime(0.001, t);
      ng.gain.linearRampToValueAtTime(0.04, t + 0.05);
      ng.gain.linearRampToValueAtTime(0.03, t + 0.3);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
      ns.connect(nhp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.5);
      // Sub-harmonic warm body
      const sub = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      sub.type = "sine";
      sub.frequency.value = 600;
      sg.gain.setValueAtTime(0.001, t);
      sg.gain.linearRampToValueAtTime(0.05, t + 0.05);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      sub.connect(sg).connect(dest);
      sub.start(t);
      sub.stop(t + 0.45);
      break;
    }

    case "slowmo": {
      // Deep drone through lowpass sweep
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      const lp = audioCtx.createBiquadFilter();
      lp.type = "lowpass";
      lp.frequency.setValueAtTime(800, t);
      lp.frequency.exponentialRampToValueAtTime(200, t + 0.8);
      lp.Q.value = 8;
      osc.type = "sine";
      osc.frequency.setValueAtTime(220, t);
      osc.frequency.exponentialRampToValueAtTime(110, t + 0.8);
      gain.gain.setValueAtTime(0.001, t);
      gain.gain.linearRampToValueAtTime(0.12, t + 0.1);
      gain.gain.linearRampToValueAtTime(0.1, t + 0.4);
      gain.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      osc.connect(lp).connect(gain).connect(dest);
      osc.start(t);
      osc.stop(t + 0.8);
      // 3 detuned oscillators for thick chorus
      const freqs = [220, 227, 215];
      for (let i = 0; i < freqs.length; i++) {
        const co = audioCtx.createOscillator();
        const cg = audioCtx.createGain();
        co.type = "triangle";
        co.frequency.setValueAtTime(freqs[i], t);
        co.frequency.exponentialRampToValueAtTime(freqs[i] / 2, t + 0.8);
        cg.gain.setValueAtTime(0.001, t);
        cg.gain.linearRampToValueAtTime(0.06, t + 0.15);
        cg.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
        co.connect(lp).connect(gain); // share filter chain
        co.start(t);
        co.stop(t + 0.8);
      }
      // High shimmer through bandpass + delay
      const sh = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      const sbp = audioCtx.createBiquadFilter();
      sbp.type = "bandpass";
      sbp.frequency.setValueAtTime(880, t + 0.1);
      sbp.frequency.exponentialRampToValueAtTime(440, t + 0.7);
      sbp.Q.value = 5;
      const delay = audioCtx.createDelay();
      const dfb = audioCtx.createGain();
      delay.delayTime.value = 0.12;
      dfb.gain.value = 0.4;
      sh.type = "sine";
      sh.frequency.setValueAtTime(880, t + 0.1);
      sh.frequency.exponentialRampToValueAtTime(440, t + 0.7);
      sg.gain.setValueAtTime(0.001, t);
      sg.gain.linearRampToValueAtTime(0.05, t + 0.2);
      sg.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      sh.connect(sbp).connect(sg);
      sg.connect(dest);
      sg.connect(delay).connect(dfb).connect(delay);
      delay.connect(dest);
      sh.start(t);
      sh.stop(t + 0.7);
      // FM wobble: LFO → 330 Hz tone ("time decelerating")
      const lfo = audioCtx.createOscillator();
      const lfoG = audioCtx.createGain();
      const fmCarrier = audioCtx.createOscillator();
      const fmG = audioCtx.createGain();
      lfo.type = "sine";
      lfo.frequency.setValueAtTime(4, t);
      lfo.frequency.exponentialRampToValueAtTime(1, t + 0.8);
      lfoG.gain.setValueAtTime(40, t);
      lfoG.gain.exponentialRampToValueAtTime(10, t + 0.8);
      fmCarrier.type = "sine";
      fmCarrier.frequency.value = 330;
      fmG.gain.setValueAtTime(0.001, t);
      fmG.gain.linearRampToValueAtTime(0.04, t + 0.15);
      fmG.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
      lfo.connect(lfoG).connect(fmCarrier.frequency);
      fmCarrier.connect(fmG).connect(dest);
      lfo.start(t);
      lfo.stop(t + 0.8);
      fmCarrier.start(t);
      fmCarrier.stop(t + 0.8);
      // Bandpass noise whisper for atmosphere
      const ns = makeNoise(0.7);
      const ng = audioCtx.createGain();
      const nbp = audioCtx.createBiquadFilter();
      nbp.type = "bandpass";
      nbp.frequency.value = 400;
      nbp.Q.value = 2;
      ng.gain.setValueAtTime(0.001, t);
      ng.gain.linearRampToValueAtTime(0.035, t + 0.1);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      ns.connect(nbp).connect(ng).connect(dest);
      ns.start(t);
      ns.stop(t + 0.7);
      break;
    }
  }
}

const keys = {};

  keys[e.code] = true;
  if (["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","Space","Tab","ShiftLeft","ShiftRight","Backquote"].includes(e.code)) {
    e.preventDefault();
  }
});
window.addEventListener("keyup", e => { keys[e.code] = false; });

// ── Mobile touch controls ───────────────────────────────────────────
function setupMobileControls() {
  if (!('ontouchstart' in window || navigator.maxTouchPoints > 0)) return;

  touchActive = true;
  document.body.classList.add('mobile');
  fitCanvas();

  document.addEventListener('contextmenu', e => e.preventDefault());

  const allBtns = document.querySelectorAll('.dpad-btn, .action-btn, #btn-esc, #btn-select');
  allBtns.forEach(btn => {
    const key = btn.dataset.key;
    if (!key) return;

    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      keys[key] = true;
      btn.classList.add('pressed');
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }, { passive: false });

    btn.addEventListener('touchend', e => {
      e.preventDefault();
      keys[key] = false;
      btn.classList.remove('pressed');
    }, { passive: false });

    btn.addEventListener('touchcancel', e => {
      keys[key] = false;
      btn.classList.remove('pressed');
    });
  });

  const ctrl = document.getElementById('controls');
  ctrl.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  canvas.addEventListener('touchstart', e => {
    e.preventDefault();
    if (audioCtx.state === 'suspended') audioCtx.resume();
  }, { passive: false });

  // Debug bar buttons (one-shot tap actions)
  document.querySelectorAll('.dbg-btn').forEach(btn => {
    btn.addEventListener('touchstart', e => {
      e.preventDefault();
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const action = btn.dataset.dbg;
      if (action === "ammo") { railAmmo += 3; bombAmmo += 3; healAmmo += 3; slowAmmo += 3; playSound("powerup"); }
      else if (action === "spawn") {
        const rt = WEAPON_TYPES[Math.floor(Math.random() * WEAPON_TYPES.length)];
        powerUp = new PowerUp(rt);
        playSound("powerup");
      }
      else if (action === "inv") { debugInvincible = !debugInvincible; playSound("menuSelect"); }
      else if (action === "kill50" && aliens) {
        const al = aliens.filter(a => a.alive);
        const n = Math.floor(al.length / 2);
        for (let i = 0; i < n; i++) { al[i].alive = false; score += al[i].points; explosions.push(new Explosion(al[i].x + al[i].w / 2, al[i].y + al[i].h / 2)); }
        playSound("explode");
      }
      else if (action === "killall" && aliens) {
        for (const a of aliens) { if (a.alive) { a.alive = false; score += a.points; explosions.push(new Explosion(a.x + a.w / 2, a.y + a.h / 2)); } }
        playSound("explode");
      }
    }, { passive: false });
  });
}

// ── Utility ──────────────────────────────────────────────────────────
function drawText(text, x, y, color, size, align) {
  ctx.fillStyle = color;
  ctx.font = `bold ${size}px monospace`;
  ctx.textAlign = align || "left";
  ctx.textBaseline = "middle";
  ctx.fillText(text, x, y);
}

function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

// ── Entity classes ───────────────────────────────────────────────────

class Player {
  constructor() {
    this.w = 30;
    this.h = 20;
    this.x = FIELD_X + (FIELD_W - this.w) / 2;
    this.y = FIELD_Y + FIELD_H - this.h - 5;
    this.cooldown = 0;
    this.alive = true;
  }

  update() {
    if (keys["ArrowLeft"] || keys["KeyA"])  this.x -= PLAYER_SPEED;
    if (keys["ArrowRight"] || keys["KeyD"]) this.x += PLAYER_SPEED;
    this.x = Math.max(FIELD_X, Math.min(FIELD_X + FIELD_W - this.w, this.x));
    if (this.cooldown > 0) this.cooldown--;
  }

  shoot() {
    if (this.cooldown > 0) return null;
    this.cooldown = PLAYER_SHOOT_COOLDOWN;
    return new Projectile(this.x + this.w / 2 - 1, this.y - 4, -1);
  }

  draw() {
    ctx.fillStyle = COL.player;
    ctx.beginPath();
    ctx.moveTo(this.x + this.w / 2, this.y);
    ctx.lineTo(this.x + this.w, this.y + this.h);
    ctx.lineTo(this.x, this.y + this.h);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = "#003300";
    ctx.fillRect(this.x + this.w / 2 - 3, this.y + 8, 6, 6);
  }
}

class Alien {
  constructor(x, y, hp, shootChance, isBomber, variant) {
    this.x = x;
    this.y = y;
    this.w = 28;
    this.h = 22;
    this.hp = hp;
    this.maxHp = hp;
    this.shootChance = shootChance;
    this.isBomber = isBomber;
    this.variant = variant || 0;
    this.alive = true;
    this.points = isBomber ? 150 : 100;
  }

  get color() {
    const ratio = this.hp / this.maxHp;
    if (ratio > 0.6) {
      if (this.isBomber) return COL.bomber;
      return this.variant === 0 ? COL.fighterA : COL.fighterB;
    }
    if (ratio > 0.3) return COL.hpMid;
    return COL.hpLow;
  }

  takeHit() {
    this.hp--;
    if (this.hp <= 0) { this.alive = false; return true; }
    return false;
  }

  tryShoot() {
    if (Math.random() < this.shootChance) {
      const px = this.x + this.w / 2;
      const py = this.y + this.h;
      if (this.isBomber) return new Bomb(px, py);
      return new Projectile(px, py, 1);
    }
    return null;
  }

  draw() {
    const c = this.color;
    ctx.fillStyle = c;
    if (this.isBomber) {
      ctx.fillRect(this.x + 2, this.y + 2, this.w - 4, this.h - 4);
      ctx.fillStyle = "#000";
      ctx.fillRect(this.x + 7, this.y + 6, 5, 5);
      ctx.fillRect(this.x + this.w - 12, this.y + 6, 5, 5);
      ctx.fillStyle = c;
      ctx.fillRect(this.x, this.y + this.h - 6, this.w, 3);
    } else if (this.variant === 0) {
      ctx.beginPath();
      ctx.moveTo(this.x + this.w / 2, this.y);
      ctx.lineTo(this.x + this.w, this.y + this.h);
      ctx.lineTo(this.x, this.y + this.h);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#000";
      ctx.fillRect(this.x + 9, this.y + 10, 4, 4);
      ctx.fillRect(this.x + 15, this.y + 10, 4, 4);
    } else {
      ctx.beginPath();
      ctx.moveTo(this.x + this.w / 2, this.y);
      ctx.lineTo(this.x + this.w, this.y + this.h / 2);
      ctx.lineTo(this.x + this.w / 2, this.y + this.h);
      ctx.lineTo(this.x, this.y + this.h / 2);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = "#000";
      ctx.fillRect(this.x + 10, this.y + 8, 3, 3);
      ctx.fillRect(this.x + 15, this.y + 8, 3, 3);
    }
  }
}

class Projectile {
  constructor(x, y, dir) {
    this.x = x;
    this.y = y;
    this.w = 3;
    this.h = 8;
    this.dir = dir;
    this.alive = true;
    this.isBomb = false;
    this.isTorpedo = false;
  }

  update() {
    const speedMult = (this.dir === 1 && slowTimer > 0) ? 0.3 : 1;
    this.y += this.dir * PROJ_SPEED * speedMult;
    if (this.y < FIELD_Y || this.y > FIELD_Y + FIELD_H) this.alive = false;
  }

  draw() {
    ctx.fillStyle = this.dir === -1 ? COL.projPlayer : COL.projAlien;
    ctx.fillRect(this.x, this.y, this.w, this.h);
  }
}

class Bomb extends Projectile {
  constructor(x, y) {
    super(x, y, 1);
    this.w = 6;
    this.h = 6;
    this.isBomb = true;
  }

  update() {
    const speedMult = slowTimer > 0 ? 0.3 : 1;
    this.y += BOMB_SPEED * speedMult;
    if (this.y > FIELD_Y + FIELD_H) this.alive = false;
  }

  draw() {
    ctx.fillStyle = COL.bomb;
    ctx.beginPath();
    ctx.arc(this.x + 3, this.y + 3, 4, 0, Math.PI * 2);
    ctx.fill();
  }
}

class Torpedo {
  constructor(x, y) {
    this.x = x - 4;
    this.y = y;
    this.w = 8;
    this.h = 10;
    this.dir = -1;
    this.alive = true;
    this.isBomb = false;
    this.isTorpedo = true;
    this.startY = y;
  }

  update() {
    this.y -= PROJ_SPEED * 0.7;
  }

  draw() {
    ctx.fillStyle = "#ff6600";
    ctx.fillRect(this.x, this.y, this.w, this.h);
    ctx.globalAlpha = 0.3;
    ctx.fillStyle = "#ff4400";
    ctx.beginPath();
    ctx.arc(this.x + this.w / 2, this.y + this.h / 2, 8, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class Bunker {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.w = 48;
    this.h = 30;
    this.cols = 8;
    this.rows = 5;
    this.blockW = this.w / this.cols;
    this.blockH = this.h / this.rows;
    this.grid = [];
    for (let r = 0; r < this.rows; r++) {
      this.grid[r] = [];
      for (let c = 0; c < this.cols; c++) {
        if (r >= 3 && (c === 3 || c === 4)) {
          this.grid[r][c] = false;
        } else {
          this.grid[r][c] = true;
        }
      }
    }
  }

  get isDestroyed() {
    for (let r = 0; r < this.rows; r++)
      for (let c = 0; c < this.cols; c++)
        if (this.grid[r][c]) return false;
    return true;
  }

  damageAt(gx, gy, radius) {
    let hit = false;
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (!this.grid[r][c]) continue;
        const bx = this.x + c * this.blockW + this.blockW / 2;
        const by = this.y + r * this.blockH + this.blockH / 2;
        const dx = gx - bx, dy = gy - by;
        if (Math.sqrt(dx * dx + dy * dy) < radius) {
          this.grid[r][c] = false;
          hit = true;
        }
      }
    }
    return hit;
  }

  heal(percent) {
    const destroyed = [];
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (r >= 3 && (c === 3 || c === 4)) continue;
        if (!this.grid[r][c]) destroyed.push({ r, c });
      }
    }
    const toRestore = Math.ceil(destroyed.length * percent);
    for (let i = destroyed.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [destroyed[i], destroyed[j]] = [destroyed[j], destroyed[i]];
    }
    for (let i = 0; i < Math.min(toRestore, destroyed.length); i++) {
      this.grid[destroyed[i].r][destroyed[i].c] = true;
    }
  }

  draw() {
    ctx.fillStyle = COL.bunker;
    for (let r = 0; r < this.rows; r++) {
      for (let c = 0; c < this.cols; c++) {
        if (this.grid[r][c]) {
          ctx.fillRect(
            this.x + c * this.blockW,
            this.y + r * this.blockH,
            this.blockW - 1,
            this.blockH - 1
          );
        }
      }
    }
  }
}

class Explosion {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.frame = 0;
    this.maxFrames = 12;
    this.alive = true;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxFrames) this.alive = false;
  }

  draw() {
    const progress = this.frame / this.maxFrames;
    const radius = 8 + progress * 10;
    const alpha = 1 - progress;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = COL.explosion;
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ffaa00";
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius * 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class BombExplosion {
  constructor(x, y) {
    this.x = x;
    this.y = y;
    this.frame = 0;
    this.maxFrames = 18;
    this.alive = true;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxFrames) this.alive = false;
  }

  draw() {
    const progress = this.frame / this.maxFrames;
    const radius = 20 + progress * 40;
    const alpha = 1 - progress;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#ff6600";
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = "#ffffff";
    ctx.beginPath();
    ctx.arc(this.x, this.y, radius * 0.4, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class PowerUp {
  constructor(type) {
    this.type = type || "rail";
    this.w = 20;
    this.h = 20;
    this.x = FIELD_X + 50 + Math.random() * (FIELD_W - 100);
    const thirdH = FIELD_H / 3;
    this.y = FIELD_Y + thirdH + Math.random() * thirdH;
    this.alive = true;
    this.frame = 0;
    this.maxLife = 300;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxLife) this.alive = false;
  }

  draw() {
    const pulse = 0.7 + 0.3 * Math.sin(this.frame * 0.15);
    const baseHue = WEAPON_HUES[this.type];
    const hue = (baseHue + this.frame * 2) % 360;
    const size = this.w * pulse;
    const cx = this.x + this.w / 2;
    const cy = this.y + this.h / 2;
    const icon = WEAPON_KEYS[this.type];

    // Outer glow
    ctx.globalAlpha = 0.3 * pulse;
    ctx.fillStyle = `hsl(${hue}, 100%, 70%)`;
    ctx.beginPath();
    ctx.arc(cx, cy, size * 0.8, 0, Math.PI * 2);
    ctx.fill();

    // Shape
    ctx.globalAlpha = 1;
    ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
    const hs = size * 0.5;
    if (this.type === "bomb") {
      // circle shape
      ctx.beginPath();
      ctx.arc(cx, cy, hs, 0, Math.PI * 2);
      ctx.fill();
    } else if (this.type === "heal") {
      // cross shape
      ctx.fillRect(cx - hs * 0.3, cy - hs, hs * 0.6, hs * 2);
      ctx.fillRect(cx - hs, cy - hs * 0.3, hs * 2, hs * 0.6);
    } else {
      // diamond shape (rail, slow)
      ctx.beginPath();
      ctx.moveTo(cx, cy - hs);
      ctx.lineTo(cx + hs, cy);
      ctx.lineTo(cx, cy + hs);
      ctx.lineTo(cx - hs, cy);
      ctx.closePath();
      ctx.fill();
    }

    // Icon label
    ctx.fillStyle = "#fff";
    ctx.font = "bold 11px monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(icon, cx, cy);
    ctx.globalAlpha = 1;
  }
}

class RailBeam {
  constructor(x) {
    this.x = x;
    this.frame = 0;
    this.maxFrames = 21;
    this.alive = true;
  }

  update() {
    this.frame++;
    if (this.frame >= this.maxFrames) this.alive = false;
  }

  draw() {
    const cx = this.x;
    const top = FIELD_Y;
    const bot = FIELD_Y + FIELD_H;
    const f = this.frame;

    let width, alpha;
    if (f <= 5) {
      width = 2;
      alpha = 0.7 + 0.3 * (f / 5);
    } else if (f <= 12) {
      const t = (f - 5) / 7;
      width = 2 + 34 * t;
      alpha = 1;
    } else {
      const t = (f - 12) / 8;
      width = 36 * (1 - t);
      alpha = 1 - t;
    }

    if (width < 0.5 || alpha < 0.01) return;

    ctx.globalAlpha = alpha * 0.3;
    ctx.fillStyle = "#0044ff";
    ctx.fillRect(cx - width / 2, top, width, bot - top);

    ctx.globalAlpha = alpha * 0.6;
    ctx.fillStyle = "#00ccff";
    const midW = width * 0.6;
    ctx.fillRect(cx - midW / 2, top, midW, bot - top);

    ctx.globalAlpha = alpha;
    ctx.fillStyle = "#ffffff";
    const coreW = Math.max(1, width * 0.25);
    ctx.fillRect(cx - coreW / 2, top, coreW, bot - top);

    ctx.globalAlpha = 1;
  }
}

// ── Alien grid builder ───────────────────────────────────────────────
function makeAlienGrid(shootChance) {
  const cols = 8, rows = 5;
  const alienW = 28, hGap = 14, vGap = 6;
  const gridW = cols * alienW + (cols - 1) * hGap;
  const startX = FIELD_X + (FIELD_W - gridW) / 2;
  const startY = FIELD_Y + 15;
  const aliens = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const ax = startX + c * (alienW + hGap);
      const ay = startY + r * (22 + vGap);
      if (r < 2) {
        aliens.push(new Alien(ax, ay, BOMBER_HP, shootChance * 0.5, true, 0));
      } else {
        aliens.push(new Alien(ax, ay, FIGHTER_HP, shootChance, false, c % 2));
      }
    }
  }
  return aliens;
}

// ── Star field background ────────────────────────────────────────────
let stars = [];
let gameFrame = 0;

function generateStars(diffKey) {
  const cfg = STAR_CONFIG[diffKey] || STAR_CONFIG.medium;
  stars = [];
  for (let i = 0; i < cfg.count; i++) {
    const colorName = cfg.colors[Math.floor(Math.random() * cfg.colors.length)];
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      size: Math.random() * 1.5 + 0.5,
      speed: cfg.speedMin + Math.random() * (cfg.speedMax - cfg.speedMin),
      brightness: cfg.brightMin + Math.random() * (cfg.brightMax - cfg.brightMin),
      color: STAR_COLORS_RGB[colorName],
    });
  }
}

// Initialize stars with medium defaults for the title screen
generateStars("medium");

function drawStars() {
  // Doomsday pulsing background tint
  if (difficulty === "doomsday" && gameState === "playing") {
    const pulse = 0.03 + 0.02 * Math.sin(gameFrame * 0.05);
    ctx.fillStyle = `rgba(80, 0, 0, ${pulse})`;
    ctx.fillRect(0, 0, W, H);
  }

  for (const s of stars) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random() * W; }
    ctx.fillStyle = `rgba(${s.color},${s.brightness})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  }
}

// ── Bomb explosion helper ────────────────────────────────────────────
function triggerBombExplosion(cx, cy) {
  explosions.push(new BombExplosion(cx, cy));
  playSound("torpedoBlast");
  const blastRadius = 120;
  for (const a of aliens) {
    if (!a.alive) continue;
    const ax = a.x + a.w / 2;
    const ay = a.y + a.h / 2;
    const dx = cx - ax, dy = cy - ay;
    if (Math.sqrt(dx * dx + dy * dy) < blastRadius) {
      a.takeHit();
      const dead = a.takeHit();
      if (dead) {
        score += a.points;
        explosions.push(new Explosion(ax, ay));
      }
    }
  }
  for (const b of bunkers) {
    if (!b.isDestroyed) {
      b.damageAt(cx, cy, blastRadius);
    }
  }
}

let gameState = "title"; // title | playing | won | lost
let selectedDiff = 1;

let alienDir, alienMoveTimer, baseMoveInterval, totalAliens, score;
let railAmmo, bombAmmo, healAmmo, slowAmmo, selectedWeapon, slowTimer;
let bunkerHealFlash;
let powerUp, powerUpTimer, powerUpInterval;

function startGame(diffKey) {
  difficulty = diffKey;
  const diff = DIFFICULTIES[diffKey];
  baseMoveInterval = diff.moveInterval;
  player = new Player();
  aliens = makeAlienGrid(diff.shootChance);
  const bunkY = FIELD_Y + FIELD_H - 60;
  const spacing = FIELD_W / 5;
  bunkers = [
    new Bunker(FIELD_X + spacing * 1 - 24, bunkY),
    new Bunker(FIELD_X + spacing * 2 - 24, bunkY),
    new Bunker(FIELD_X + spacing * 3 - 24, bunkY),
    new Bunker(FIELD_X + spacing * 4 - 24, bunkY),
  ];
  projectiles = [];
  explosions = [];
  alienDir = 1;
  alienMoveTimer = 0;
  totalAliens = aliens.length;
  score = 0;
  railAmmo = 0;
  bombAmmo = 0;
  healAmmo = 0;
  slowAmmo = 0;
  selectedWeapon = 0;
  slowTimer = 0;
  bunkerHealFlash = 0;
  powerUp = null;
  powerUpTimer = 0;
  powerUpInterval = 500 + Math.floor(Math.random() * 200);
  generateStars(diffKey);
  gameState = "playing";
}

// ── Title screen ─────────────────────────────────────────────────────
let debugMode = false;
let debugInvincible = false;
let debugKeyDebounce = {};

const CHEAT_SEQ = ["U","U","D","D","L","R","L","R"];
let cheatProgress = 0;
let cheatDirDebounce = { up: false, down: false, left: false, right: false };

let titleKeyDebounce = {};

function updateTitle() {
  const upPressed = keys["ArrowUp"] || keys["KeyW"];
  const downPressed = keys["ArrowDown"] || keys["KeyS"];
  const enterPressed = keys["Enter"] || keys["Space"];

  if (upPressed && !titleKeyDebounce.up) {
    selectedDiff = (selectedDiff - 1 + DIFF_ORDER.length) % DIFF_ORDER.length;
    playSound("menuSelect");
  }
  if (downPressed && !titleKeyDebounce.down) {
    selectedDiff = (selectedDiff + 1) % DIFF_ORDER.length;
    playSound("menuSelect");
  }
  if (enterPressed && !titleKeyDebounce.enter) {
    playSound("menuConfirm");
    cheatProgress = 0;
    startGame(DIFF_ORDER[selectedDiff]);
  }

  // Debug mode toggle (backtick on desktop)
  const backquotePressed = keys["Backquote"];
  if (backquotePressed && !titleKeyDebounce.backquote) {
    debugMode = !debugMode;
    if (!debugMode) debugInvincible = false;
    cheatProgress = 0;
    playSound("menuSelect");
  }
  titleKeyDebounce.backquote = backquotePressed;

  // Cheat code: Up Up Down Down Left Right Left Right (Konami code)
  const dirs = { up: !!keys["ArrowUp"], down: !!keys["ArrowDown"], left: !!keys["ArrowLeft"], right: !!keys["ArrowRight"] };
  const dirMap = { up: "U", down: "D", left: "L", right: "R" };
  for (const d of ["up","down","left","right"]) {
    if (dirs[d] && !cheatDirDebounce[d]) {
      if (CHEAT_SEQ[cheatProgress] === dirMap[d]) cheatProgress++; else cheatProgress = CHEAT_SEQ[0] === dirMap[d] ? 1 : 0;
    }
    cheatDirDebounce[d] = dirs[d];
  }
  if (cheatProgress >= CHEAT_SEQ.length) {
    debugMode = !debugMode;
    if (!debugMode) debugInvincible = false;
    cheatProgress = 0;
    playSound("menuConfirm");
  }

  titleKeyDebounce.up = upPressed;
  titleKeyDebounce.down = downPressed;
  titleKeyDebounce.enter = enterPressed;
}

function drawTitle() {
  const logoText = "SPACE ATTACK";
  drawText(logoText, W / 2, 100, COL.logo, 48, "center");

  drawText("~ Defend Earth from the alien invasion ~", W / 2, 155, COL.menu, 16, "center");

  ctx.fillStyle = COL.player;
  for (const ox of [-120, 120]) {
    ctx.beginPath();
    ctx.moveTo(W / 2 + ox, 80);
    ctx.lineTo(W / 2 + ox + 12, 100);
    ctx.lineTo(W / 2 + ox - 12, 100);
    ctx.closePath();
    ctx.fill();
  }

  drawText("SELECT DIFFICULTY", W / 2, 220, COL.msg, 20, "center");

  for (let i = 0; i < DIFF_ORDER.length; i++) {
    const d = DIFFICULTIES[DIFF_ORDER[i]];
    const y = 265 + i * 40;
    const selected = i === selectedDiff;
    const color = selected ? COL.menuSel : COL.menu;
    const prefix = selected ? "> " : "  ";
    const size = selected ? 18 : 16;
    drawText(`${prefix}${d.label}`, W / 2 - 140, y, color, size, "left");
    drawText(d.desc, W / 2 + 20, y, selected ? COL.menuSel : "#777777", 14, "left");
  }

  if (debugMode) {
    drawText("[DEBUG MODE]", W / 2, 180, "#cc8800", 16, "center");
    drawText("1-5=Ammo  0=Spawn  I=Invincible  K=Kill all  N=Kill 50%", W / 2, 460, "#886600", 12, "center");
  }

  drawText("UP/DOWN = Select    ENTER/SPACE = Start", W / 2, 480, COL.status, 14, "center");
  drawText("ARROWS = Move  SPACE = Shoot  SHIFT = Special  TAB = Cycle", W / 2, 505, "#666666", 12, "center");
}

// ── Gameplay ─────────────────────────────────────────────────────────
let tabDebounce = false;
let shiftDebounce = false;

function updateGame() {
  if (gameState !== "playing") return;

  player.update();

  // ── Weapon cycling (Tab) ──
  const tabPressed = keys["Tab"];
  if (tabPressed && !tabDebounce) {
    const ammos = [railAmmo, bombAmmo, healAmmo, slowAmmo];
    // Try to find next weapon with ammo
    let found = false;
    for (let i = 1; i <= 4; i++) {
      const idx = (selectedWeapon + i) % 4;
      if (ammos[idx] > 0) { selectedWeapon = idx; found = true; break; }
    }
    if (!found) selectedWeapon = (selectedWeapon + 1) % 4;
    playSound("menuSelect");
  }
  tabDebounce = tabPressed;

  // ── Special weapon fire (Shift) ──
  const shiftPressed = keys["ShiftLeft"] || keys["ShiftRight"];
  if (shiftPressed && !shiftDebounce) {
    const wType = WEAPON_TYPES[selectedWeapon];
    if (wType === "rail" && railAmmo > 0 && player.cooldown <= 0) {
      railAmmo--;
      player.cooldown = PLAYER_SHOOT_COOLDOWN;
      const beamX = player.x + player.w / 2;
      explosions.push(new RailBeam(beamX));
      playSound("railgun");
      const beamHalf = 18;
      for (const a of aliens) {
        if (!a.alive) continue;
        const aCx = a.x + a.w / 2;
        if (Math.abs(aCx - beamX) < beamHalf + a.w / 2) {
          a.alive = false;
          score += a.points;
          explosions.push(new Explosion(a.x + a.w / 2, a.y + a.h / 2));
        }
      }
    } else if (wType === "bomb" && bombAmmo > 0 && player.cooldown <= 0) {
      bombAmmo--;
      player.cooldown = PLAYER_SHOOT_COOLDOWN;
      const bx = player.x + player.w / 2;
      const by = player.y - 4;
      projectiles.push(new Torpedo(bx, by));
      playSound("shoot");
    } else if (wType === "heal" && healAmmo > 0) {
      healAmmo--;
      for (const b of bunkers) {
        b.heal(0.4);
      }
      bunkerHealFlash = 15;
      playSound("heal");
    } else if (wType === "slow" && slowAmmo > 0 && slowTimer <= 0) {
      slowAmmo--;
      slowTimer = 150;
      playSound("slowmo");
    }
  }
  shiftDebounce = shiftPressed;

  // ── Debug controls ──
  if (debugMode) {
    const dk = debugKeyDebounce;
    if (keys["Digit1"] && !dk.d1) { railAmmo += 3; selectedWeapon = 0; playSound("powerup"); }
    dk.d1 = !!keys["Digit1"];
    if (keys["Digit2"] && !dk.d2) { bombAmmo += 3; selectedWeapon = 1; playSound("powerup"); }
    dk.d2 = !!keys["Digit2"];
    if (keys["Digit3"] && !dk.d3) { healAmmo += 3; selectedWeapon = 2; playSound("powerup"); }
    dk.d3 = !!keys["Digit3"];
    if (keys["Digit4"] && !dk.d4) { slowAmmo += 3; selectedWeapon = 3; playSound("powerup"); }
    dk.d4 = !!keys["Digit4"];
    if (keys["Digit5"] && !dk.d5) { railAmmo += 3; bombAmmo += 3; healAmmo += 3; slowAmmo += 3; playSound("powerup"); }
    dk.d5 = !!keys["Digit5"];
    if (keys["Digit0"] && !dk.d0) {
      const randomType = WEAPON_TYPES[Math.floor(Math.random() * WEAPON_TYPES.length)];
      powerUp = new PowerUp(randomType);
      playSound("powerup");
    }
    dk.d0 = !!keys["Digit0"];
    if (keys["KeyI"] && !dk.i) { debugInvincible = !debugInvincible; playSound("menuSelect"); }
    dk.i = !!keys["KeyI"];
    if (keys["KeyK"] && !dk.k) {
      for (const a of aliens) {
        if (a.alive) { a.alive = false; score += a.points; explosions.push(new Explosion(a.x + a.w / 2, a.y + a.h / 2)); }
      }
      playSound("explode");
    }
    dk.k = !!keys["KeyK"];
    if (keys["KeyN"] && !dk.n) {
      const alive = aliens.filter(a => a.alive);
      const killCount = Math.floor(alive.length / 2);
      for (let i = 0; i < killCount; i++) {
        alive[i].alive = false;
        score += alive[i].points;
        explosions.push(new Explosion(alive[i].x + alive[i].w / 2, alive[i].y + alive[i].h / 2));
      }
      playSound("explode");
    }
    dk.n = !!keys["KeyN"];
  }

  // ── Normal fire (Space) ──
  if (keys["Space"]) {
    const p = player.shoot();
    if (p) { projectiles.push(p); playSound("shoot"); }
  }

  // power-up spawning
  if (powerUp === null) {
    powerUpTimer++;
    if (powerUpTimer >= powerUpInterval) {
      const randomType = WEAPON_TYPES[Math.floor(Math.random() * WEAPON_TYPES.length)];
      powerUp = new PowerUp(randomType);
      powerUpTimer = 0;
      powerUpInterval = 500 + Math.floor(Math.random() * 200);
    }
  } else {
    powerUp.update();
    if (!powerUp.alive) powerUp = null;
  }

  // alien movement — speed up as aliens are destroyed
  const slowMult = slowTimer > 0 ? 3.33 : 1;
  alienMoveTimer++;
  const alive = aliens.filter(a => a.alive);
  const ratio = alive.length / totalAliens;
  const moveInterval = Math.max(1, Math.round(baseMoveInterval * ratio * ratio * slowMult));
  const speed = Math.min(6, Math.max(2, Math.round(2 / (ratio * ratio + 0.04))));
  if (alienMoveTimer >= moveInterval && alive.length > 0) {
    alienMoveTimer = 0;
    let reverse = false;
    for (const a of alive) {
      const nx = a.x + alienDir * speed;
      if (nx <= FIELD_X || nx >= FIELD_X + FIELD_W - a.w) {
        reverse = true;
        break;
      }
    }
    if (reverse) {
      alienDir *= -1;
      for (const a of alive) a.y += 16;
    } else {
      for (const a of alive) a.x += alienDir * speed;
    }
  }

  // aliens reached bottom?
  for (const a of alive) {
    if (a.y + a.h >= FIELD_Y + FIELD_H) {
      if (!debugInvincible) {
        playSound("playerDeath");
        gameState = "lost";
        endCooldown = 30;
        return;
      }
    }
  }

  // random alien shoot
  if (alive.length > 0) {
    const shooter = alive[Math.floor(Math.random() * alive.length)];
    const ap = shooter.tryShoot();
    if (ap) projectiles.push(ap);
  }

  // update projectiles
  for (const p of projectiles) p.update();

  // Torpedo dies silently if it reaches top of field without hitting anything
  for (const p of projectiles) {
    if (p.isTorpedo && p.alive && p.y <= FIELD_Y) {
      p.alive = false;
    }
  }

  projectiles = projectiles.filter(p => p.alive);

  // update explosions
  for (const e of explosions) e.update();
  explosions = explosions.filter(e => e.alive);

  // collision: player projectiles -> aliens
  const remaining = [];
  for (const p of projectiles) {
    let hit = false;
    if (p.dir === -1) {
      // Check power-up (not for torpedoes)
      if (!p.isTorpedo && powerUp && powerUp.alive && rectCollide(p.x, p.y, p.w, p.h, powerUp.x, powerUp.y, powerUp.w, powerUp.h)) {
        const hadAny = railAmmo + bombAmmo + healAmmo + slowAmmo > 0;
        switch (powerUp.type) {
          case "rail": railAmmo++; break;
          case "bomb": bombAmmo++; break;
          case "heal": healAmmo++; break;
          case "slow": slowAmmo++; break;
        }
        if (!hadAny) selectedWeapon = WEAPON_TYPES.indexOf(powerUp.type);
        explosions.push(new Explosion(powerUp.x + powerUp.w / 2, powerUp.y + powerUp.h / 2));
        powerUp = null;
        playSound("powerup");
        hit = true;
      }
      // Check aliens
      if (!hit) for (const a of alive) {
        if (a.alive && rectCollide(p.x, p.y, p.w, p.h, a.x, a.y, a.w, a.h)) {
          if (p.isTorpedo) {
            triggerBombExplosion(a.x + a.w / 2, a.y + a.h / 2);
            hit = true;
            break;
          } else {
            const dead = a.takeHit();
            explosions.push(new Explosion(p.x, p.y));
            playSound(dead ? "explode" : "hit");
            if (dead) score += a.points;
            hit = true;
            break;
          }
        }
      }
      // Check bunkers (torpedoes pass through)
      if (!hit && !p.isTorpedo) {
        for (const b of bunkers) {
          if (!b.isDestroyed && rectCollide(p.x, p.y, p.w, p.h, b.x, b.y, b.w, b.h)) {
            if (b.damageAt(p.x, p.y, LASER_BLAST_RADIUS)) {
              explosions.push(new Explosion(p.x, p.y));
              playSound("hit");
              hit = true;
              break;
            }
          }
        }
      }
    } else {
      // alien projectile -> player
      if (rectCollide(p.x, p.y, p.w, p.h, player.x, player.y, player.w, player.h)) {
        if (debugInvincible) {
          hit = true;
        } else {
          explosions.push(new Explosion(player.x + player.w / 2, player.y + player.h / 2));
          playSound("playerDeath");
          gameState = "lost";
          endCooldown = 30;
          hit = true;
        }
      }
      // alien projectile -> bunkers
      if (!hit) {
        for (const b of bunkers) {
          if (!b.isDestroyed && rectCollide(p.x, p.y, p.w, p.h, b.x, b.y, b.w, b.h)) {
            const radius = p.isBomb ? BOMB_BLAST_RADIUS : LASER_BLAST_RADIUS;
            if (b.damageAt(p.x, p.y, radius)) {
              explosions.push(new Explosion(p.x, p.y));
              playSound("hit");
              hit = true;
              break;
            }
          }
        }
      }
    }
    if (!hit) remaining.push(p);
  }
  projectiles = remaining;

  // win condition
  if (aliens.filter(a => a.alive).length === 0) {
    playSound("win");
    gameState = "won";
    endCooldown = 30;
  }

  if (bunkers.every(b => b.isDestroyed) && !debugInvincible) {
    playSound("playerDeath");
    gameState = "lost";
    endCooldown = 30;
  }

  // decrement timers
  if (slowTimer > 0) slowTimer--;
  if (bunkerHealFlash > 0) bunkerHealFlash--;
}

function drawWeaponBar() {
  const weapons = [
    { key: "R", color: "#00ccff", ammo: railAmmo },
    { key: "B", color: "#ff6600", ammo: bombAmmo },
    { key: "+", color: "#00ff66", ammo: healAmmo },
    { key: "S", color: "#9944ff", ammo: slowAmmo },
  ];

  const slotW = 45, slotH = 16, gap = 4;
  const totalW = weapons.length * slotW + (weapons.length - 1) * gap;
  const startX = W / 2 - totalW / 2;
  const y = FIELD_Y + FIELD_H + 4;

  for (let i = 0; i < weapons.length; i++) {
    const w = weapons[i];
    const x = startX + i * (slotW + gap);
    const isSelected = i === selectedWeapon;

    // Background
    ctx.fillStyle = isSelected ? "rgba(255,255,255,0.15)" : "rgba(0,0,0,0.6)";
    ctx.fillRect(x, y, slotW, slotH);

    // Border
    if (isSelected) {
      ctx.save();
      ctx.shadowColor = w.color;
      ctx.shadowBlur = 8;
      ctx.strokeStyle = w.color;
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, slotW, slotH);
      ctx.restore();
    } else {
      ctx.strokeStyle = w.ammo > 0 ? "#555" : "#333";
      ctx.lineWidth = 1;
      ctx.strokeRect(x, y, slotW, slotH);
    }

    // Text
    const textColor = w.ammo > 0 ? (isSelected ? w.color : "#aaa") : "#555";
    ctx.fillStyle = textColor;
    ctx.font = "bold 10px monospace";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";
    ctx.fillText(`${w.key}:${w.ammo}`, x + slotW / 2, y + slotH / 2);
  }
}

function drawGame() {
  // field border
  ctx.strokeStyle = COL.border;
  ctx.lineWidth = 2;
  ctx.strokeRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);

  // bunkers
  for (const b of bunkers) {
    if (!b.isDestroyed) b.draw();
  }

  // bunker heal flash
  if (bunkerHealFlash > 0) {
    const flashAlpha = 0.3 * (bunkerHealFlash / 15);
    ctx.globalAlpha = flashAlpha;
    ctx.fillStyle = "#00ff66";
    for (const b of bunkers) {
      if (!b.isDestroyed) {
        ctx.fillRect(b.x - 2, b.y - 2, b.w + 4, b.h + 4);
      }
    }
    ctx.globalAlpha = 1;
  }

  // aliens
  for (const a of aliens) {
    if (a.alive) a.draw();
  }

  // player
  if (gameState === "playing" || gameState === "won") {
    player.draw();
  }

  // power-up
  if (powerUp && powerUp.alive) powerUp.draw();

  // projectiles
  for (const p of projectiles) p.draw();

  // explosions
  for (const e of explosions) e.draw();

  // slow-mo visual indicator
  if (slowTimer > 0 && gameState === "playing") {
    // Subtle blue tint overlay
    ctx.globalAlpha = 0.06;
    ctx.fillStyle = "#0044ff";
    ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);
    ctx.globalAlpha = 1;

    // Countdown timer text
    const secs = (slowTimer / FPS).toFixed(1);
    drawText(`SLOW: ${secs}s`, W / 2, FIELD_Y + 20, "#9944ff", 16, "center");
  }

  // weapon bar
  drawWeaponBar();

  // status bar
  const aliveCount = aliens.filter(a => a.alive).length;
  const diffLabel = DIFFICULTIES[difficulty].label;
  drawText(`SPACE ATTACK  [${diffLabel}]`, FIELD_X + 5, FIELD_Y - 10, COL.status, 14, "left");
  drawText(`Score: ${score}`, FIELD_X + 300, FIELD_Y - 10, COL.status, 14, "left");
  drawText(`Aliens: ${aliveCount}`, FIELD_X + 450, FIELD_Y - 10, COL.status, 14, "left");
  if (debugMode) {
    let debugLabel = "[DEBUG]";
    if (debugInvincible) debugLabel += " [INV]";
    drawText(debugLabel, FIELD_X + FIELD_W - 5, FIELD_Y - 10, "#cc8800", 11, "right");
  } else {
    drawText("Shift=Special  Tab=Cycle", FIELD_X + 590, FIELD_Y - 10, "#666666", 11, "left");
  }

  // Update mobile special button display
  if (touchActive) {
    const nameEl = document.getElementById('special-name');
    const countEl = document.getElementById('special-count');
    const btn = document.getElementById('btn-special');
    if (nameEl && btn) {
      const ammos = { rail: railAmmo, bomb: bombAmmo, heal: healAmmo, slow: slowAmmo };
      const anyAmmo = railAmmo + bombAmmo + healAmmo + slowAmmo > 0;
      if (anyAmmo) {
        const wType = WEAPON_TYPES[selectedWeapon];
        const curAmmo = ammos[wType];
        nameEl.textContent = WEAPON_NAMES[wType];
        if (countEl) countEl.textContent = curAmmo > 0 ? curAmmo : '0';
        btn.style.borderColor = curAmmo > 0 ? WEAPON_COLORS[wType] : '#555';
        btn.style.color = curAmmo > 0 ? WEAPON_COLORS[wType] : '#555';
        btn.style.opacity = curAmmo > 0 ? '1' : '0.5';
      } else {
        nameEl.textContent = 'SPEC';
        if (countEl) countEl.textContent = '';
        btn.style.borderColor = '#333';
        btn.style.color = '#444';
        btn.style.opacity = '0.4';
      }
    }
  }

  // end-state overlay
  if (gameState === "won" || gameState === "lost") {
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fillRect(FIELD_X, FIELD_Y, FIELD_W, FIELD_H);
    const msg1 = gameState === "won" ? "YOU WIN!" : "GAME OVER";
    drawText(msg1, W / 2, H / 2 - 30, COL.msg, 36, "center");
    drawText(`Score: ${score}`, W / 2, H / 2 + 10, COL.msg, 20, "center");
    const restartHint = touchActive ? "FIRE = Restart    ESC = Menu" : "R = Restart    M / ESC = Menu";
    drawText(restartHint, W / 2, H / 2 + 50, COL.status, 16, "center");
  }
}

// ── End-state input ──────────────────────────────────────────────────
let endKeyDebounce = {};

function updateEndState() {
  if (endCooldown > 0) { endCooldown--; return; }

  const rPressed = keys["KeyR"] || (touchActive && keys["Space"]);
  const mPressed = keys["KeyM"] || keys["Escape"];

  if (rPressed && !endKeyDebounce.r) {
    startGame(difficulty);
  }
  if (mPressed && !endKeyDebounce.m) {
    gameState = "title";
  }

  endKeyDebounce.r = rPressed;
  endKeyDebounce.m = mPressed;
}

// ── Escape to menu during gameplay ───────────────────────────────────
let escDebounce = false;

// ── Main loop ────────────────────────────────────────────────────────
function gameLoop() {
  gameFrame++;

  // Sync mobile debug bar visibility
  if (touchActive) {
    document.body.classList.toggle('debug-on', debugMode);
    const invBtn = document.getElementById('dbg-inv');
    if (invBtn) invBtn.classList.toggle('active', debugInvincible);
  }

  ctx.fillStyle = COL.bg;
  ctx.fillRect(0, 0, W, H);
  drawStars();

  if (gameState === "title") {
    updateTitle();
    drawTitle();
    escDebounce = false;
  } else if (gameState === "playing") {
    if (keys["Escape"] && !escDebounce) {
      gameState = "title";
    }
    escDebounce = !!keys["Escape"];

    updateGame();
    drawGame();
  } else {
    // won or lost
    updateGame();
    drawGame();
    updateEndState();
  }

  requestAnimationFrame(gameLoop);
}

// Throttle to target FPS
let lastFrame = 0;
function throttledLoop(timestamp) {
  const elapsed = timestamp - lastFrame;
  if (elapsed >= 1000 / FPS) {
    lastFrame = timestamp - (elapsed % (1000 / FPS));
    gameLoop();
  } else {
    requestAnimationFrame(throttledLoop);
  }
}

setupMobileControls();
gameLoop();
</script>
